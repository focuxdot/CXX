name: Release CXX

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax check
        run: |
          find daemon relay scripts -name '*.mjs' -print | sort | xargs -n1 node --check

  build-macos:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version-file: pty-host/go.mod
      - name: Build macOS app and DMG
        run: npm run build:app -- --dmg
      - name: Prepare release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets
          cp "dist/CXX-${VERSION}.dmg" release-assets/CXX-macos.dmg
          cp "dist/CXX-${VERSION}.dmg" "release-assets/CXX-${VERSION}-macos.dmg"
          cp packaging/install.sh release-assets/install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build Windows app and installer
        shell: pwsh
        run: |
          .\scripts\build-win.ps1
          .\scripts\build-win-installer.ps1
      - name: Prepare release assets
        shell: pwsh
        run: |
          $Version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist\win\installer\CXX-$Version-win-x64.exe" "release-assets\CXX-win-x64.exe"
          Copy-Item "dist\win\installer\CXX-$Version-win-x64.exe" "release-assets\CXX-$Version-win-x64.exe"
          Copy-Item "packaging\install.ps1" "release-assets\install.ps1"
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

  # Linux CLI-only SEA binary (no tray). x64 + arm64 for servers / multi-agent hosts.
  build-linux:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: cxx-linux-x64
          - runner: ubuntu-24.04-arm
            asset: cxx-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build SEA daemon
        run: npm run build:sea
      - name: Prepare release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          ASSET="${{ matrix.asset }}"
          mkdir -p release-assets
          install -m 755 dist/sea/cxx-daemon "release-assets/${ASSET}"
          # versioned alias e.g. cxx-0.1.3-linux-x64
          cp "release-assets/${ASSET}" "release-assets/cxx-${VERSION}-${ASSET#cxx-}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.asset }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    needs:
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd release-assets && rm -f checksums.txt && for f in *; do [ "$f" = "checksums.txt" ] && continue; sha256sum "$f"; done > checksums.txt)
      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          DRAFT="${{ inputs.draft || 'false' }}"
          if [[ "${GITHUB_REF}" != refs/tags/v* && "${DRAFT}" != "true" ]]; then
            echo "Ready releases must be created from a v*.*.* tag push. Use draft=true for manual dry runs." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          DRAFT: ${{ steps.meta.outputs.draft }}
        run: |
          set -euo pipefail
          draft_flag=()
          if [ "${DRAFT}" = "true" ]; then
            draft_flag=(--draft)
          fi
          # Release notes: pull this version's section out of CHANGELOG.md; fall
          # back to a generic line if the file or section is missing.
          VERSION="${TAG#v}"
          : > notes.md
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              index($0, "## [" ver "]") == 1 { grab=1; next }
              grab && index($0, "## [") == 1 { exit }
              grab && $0 == "---" { exit }
              grab {
                if (!started && $0 ~ /^[[:space:]]*$/) next   # skip leading blanks
                started=1; buf[n++]=$0
              }
              END {
                while (n>0 && buf[n-1] ~ /^[[:space:]]*$/) n--  # drop trailing blanks
                for (i=0;i<n;i++) print buf[i]
              }
            ' CHANGELOG.md > notes.md
          fi
          if [ -s notes.md ]; then
            notes_args=(--notes-file notes.md)
          else
            notes_args=(--notes "CXX release ${TAG}.")
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* --clobber
            gh release edit "${TAG}" --title "CXX ${TAG}" "${notes_args[@]}"
          else
            gh release create "${TAG}" release-assets/* "${draft_flag[@]}" --title "CXX ${TAG}" "${notes_args[@]}"
          fi
