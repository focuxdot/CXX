name: Release CXX

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Syntax check
        run: |
          find daemon relay scripts -name '*.mjs' -print | sort | xargs -n1 node --check

  build-macos:
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build macOS app and DMG
        run: npm run build:app -- --dmg
      - name: Prepare release assets
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets
          cp "dist/CXX-${VERSION}.dmg" release-assets/CXX-macos.dmg
          cp "dist/CXX-${VERSION}.dmg" "release-assets/CXX-${VERSION}-macos.dmg"
          cp packaging/install.sh release-assets/install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build Windows app and installer
        shell: pwsh
        run: |
          .\scripts\build-win.ps1
          .\scripts\build-win-installer.ps1
      - name: Prepare release assets
        shell: pwsh
        run: |
          $Version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist\win\installer\CXX-$Version-win-x64.exe" "release-assets\CXX-win-x64.exe"
          Copy-Item "dist\win\installer\CXX-$Version-win-x64.exe" "release-assets\CXX-$Version-win-x64.exe"
          Copy-Item "packaging\install.ps1" "release-assets\install.ps1"
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets/*
          if-no-files-found: error

  publish:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd release-assets && rm -f checksums.txt && for f in *; do [ "$f" = "checksums.txt" ] && continue; sha256sum "$f"; done > checksums.txt)
      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${VERSION}"
          fi
          DRAFT="${{ inputs.draft || 'false' }}"
          if [[ "${GITHUB_REF}" != refs/tags/v* && "${DRAFT}" != "true" ]]; then
            echo "Ready releases must be created from a v*.*.* tag push. Use draft=true for manual dry runs." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          DRAFT: ${{ steps.meta.outputs.draft }}
        run: |
          set -euo pipefail
          draft_flag=()
          if [ "${DRAFT}" = "true" ]; then
            draft_flag=(--draft)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* --clobber
          else
            gh release create "${TAG}" release-assets/* "${draft_flag[@]}" --title "CXX ${TAG}" --notes "CXX release ${TAG}."
          fi
