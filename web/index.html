class Session {
  constructor(daemonInfo) {
    this.info = daemonInfo;
    this.pendingRequests = new Map();
    this.nextId = 1;
    this.firstFrame = true;
    this.closedByUser = false;
    this.dead = false;          // 终态：令牌被撤销/失效，永不再重连
    this.reconnectAttempt = 0;
    this.reconnectTimer = null;
    this.connEpoch = 0;         // 连接代次：过期尝试的回调/失败一律作废，防新旧 socket 互踩
    this.hbSupported = false;   // relay 是否应答 hb（收到首个 pong 后置真）
    this.lastPong = 0;
    this.lastPingAt = 0;
    this.pingTimer = null;
    this.onNotify = () => {};
    this.onStatus = () => {};   // (patch) 链路状态增量：{link?, daemon?, lastSeen?}
    this.onReady = () => {};    // 每次（重）鉴权成功后回调，供上层重拉/重watch
    this.onAuthFail = () => {};  // 令牌被撤销/失效（403）：终态回调，上层停重连并引导重配对
    this.awaitingAuth = false;  // 本次连接的鉴权尚未确认前，不信中继乐观的 online（防"标绿却连不上"）
    this.needsReauth = false;   // 后台鉴权超时时置位，回前台由 ensureAlive 强制重连重鉴权
    this.daemonWasOffline = false; // 见过 online:false：下一次 online:true 意味着 daemon 侧会话已重置
    this.daemonEpoch = undefined;  // relay 报的 daemon 连接纪元：变化=daemon 侧重连过（顶替路径无 offline 边沿）
    // 信封序号（防中继重放）：在加密的 auth 参数里声明 caps.seq（明文字段会被恶意中继剥离降级）；
    // daemon 支持则 d2c 帧带单调递增 s，收到首个带 s 的帧后（recvSeq>0）上行帧也启用序号。
    // 收发各经一条 promise 链串行化：发送保证序号=发送顺序，接收保证"校验→解密→推进"逐帧原子。
    this.sendSeq = 0;
    this.recvSeq = 0;
    this.sendChain = Promise.resolve();
    this.recvChain = Promise.resolve();
    // 局域网直连（RTC DataChannel）：与中继并存的第二条 E2E 信道。中继连接永远是
    // 先建立的主通道（信令与回落路径）；直连就绪后数据面热切换过去，死了迁回。
    this.rtc = null;         // RtcChannel | null（在连或已就绪）
    this.rtcTimer = null;    // 直连重试排队
    this.rtcAttempts = 0;    // 重试退避指数（升级成功/中继重连时清零）
    this.lastAuth = null;    // 最近一次鉴权结果：直连切换/回落时重放 onReady 用

  async start() {
    this.closedByUser = false;
    await this.#openAndAuth();

  async #openAndAuth() {

    // 否则鉴权超时后旧连接迟到的 onclose 会误杀新连接的 pending、叠加第二个重连
    const epoch = ++this.connEpoch;

    this.ws = null;
    this.daemonWasOffline = false; // 新连接会收到全新的 status 基线
    this.daemonEpoch = undefined;
    // 序号与收发链在领号后立刻重置：晚重置会让 deriveKey 期间发起的 send 挂上旧链，
    // 若旧链在 firstFrame=true 之后才排到，就会把一次性握手字段消费在废帧上
    this.sendSeq = 0;
    this.recvSeq = 0;
    this.sendChain = Promise.resolve();
    this.recvChain = Promise.resolve();
    if (stale) try { stale.close(); } catch {}
    try {
      const { key, ephPubRaw } = await deriveKey(this.info);
      if (this.connEpoch !== epoch) return; // 已被更新的尝试顶掉
      this.key = key;
      this.ephPubRaw = ephPubRaw;
      this.firstFrame = true;
      const ws = new WebSocket(`${this.info.relay.replace(/\/$/, "")}/v1/client/${this.info.id}`);
      this.ws = ws;
      await new Promise((ok, bad) => {
        ws.onopen = ok;
        ws.onerror = () => bad(new Error(t("err.norelay")));
        ws.onclose = () => bad(new Error(t("err.norelay")));

      const authParams = this.info.fromPair
        ? { pairToken: this.info.tok, protocol: APP_PROTOCOL, name: deviceLabel(), clientId: clientId() }

      }

    } catch (err) {

    }
  }

  #onClose() {

    this.stopWatchRenewal();
    for (const [, p] of this.pendingRequests) p.reject(new Error(t("err.disconnected")));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return; // 令牌终态：主动 close 触发的 onclose 不再排重连
    // 页面不在前台就不排重连：后台无限退避重试违背"不可见即零活动"，

    if (document.visibilityState !== "visible") {
      this.onStatus({ link: "down" });
      return;
    }

    const delay = this.reconnectAttempt === 0 ? 300 : Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.onStatus({ link: "down" });
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // 鉴权超时/失败（非 403，且手机↔中继仍正常）：电脑暂不可达，退避重连重鉴权，
  // 等电脑恢复后自动接上。与 #onClose 分工：onClose 处理"中继断开"，这里处理"中继在、
  // 电脑不应答"——所以保留 link:ok，不误报成手机网络问题。
  #retryAuth() {
    if (this.closedByUser || this.dead) return;
    if (this.reconnectTimer) return; // 已有重连排队，不叠加
    if (document.visibilityState !== "visible") { this.needsReauth = true; return; } // 后台不轮询
    const delay = this.reconnectAttempt === 0 ? 800 : Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // —— 前台心跳：只在页面可见时跑，切后台/锁屏即停（零后台流量）——
  startPing() {
    this.stopPing();
    if (this.closedByUser || this.dead || document.visibilityState !== "visible") return;
    if (this.ws?.readyState !== WebSocket.OPEN) return;
    this.#sendHb(); // 立即发一拍：既是能力探测也刷新 lastPong 基线
    this.pingTimer = setInterval(() => {
      if (this.ws?.readyState !== WebSocket.OPEN) return;
      if (this.hbSupported && this.lastPong < this.lastPingAt) {
        this.#rebuild(); // 上一拍没回：readyState 说 OPEN 也不信
        return;
      }
      this.#sendHb();
    }, PING_MS);
  }

  stopPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = null;
  }

  #sendHb() {
    this.lastPingAt = Date.now();
    try { this.ws.send(HB_FRAME); } catch { this.#rebuild(); }
  }

  // 僵尸连接强制重建：摘掉旧 socket 的回调避免二次触发，立刻重开
  #rebuild() {
    const ws = this.ws;
    if (ws) { ws.onclose = null; ws.onmessage = null; try { ws.close(); } catch {} }
    this.ws = null;
    this.stopPing();
    this.stopWatchRenewal();
    for (const [, p] of this.pendingRequests) p.reject(new Error(t("err.disconnected")));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return;
    this.onStatus({ link: "connecting" });
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  // 回到前台/网络恢复时调用：断了立即重连；看似 OPEN 也要验活（iOS 僵尸 socket）
  ensureAlive() {
    if (this.closedByUser || this.dead) return;
    // 直连通道随前台一并验活/重试：iOS 后台冻结后 DataChannel 常已死而不自知
    if (this.rtc?.ready) {
      this.rtc.verify();
    } else if (!this.rtc && this.lastAuth?.caps?.rtc === 1 && !this.info.viewer) {
      if (this.rtcTimer) { clearTimeout(this.rtcTimer); this.rtcTimer = null; }
      this.rtcAttempts = 0;
      this.#startRtc();
    }
    // 后台鉴权超时留下的欠账：socket 看着还 OPEN 但从未鉴权成功，单纯 ping 没用，
    // 必须重建以重新握手+重鉴权（否则回前台会卡在"电脑离线"）。
    if (this.needsReauth) {
      this.needsReauth = false;
      this.#rebuild();
      return;
    }
    if (this.reconnectTimer) {
      clearTimeout(this.reconnectTimer);
      this.reconnectTimer = null;
    }
    if (this.ws?.readyState === WebSocket.OPEN) {
      this.startPing(); // 重启前台心跳（切后台时停了）
      if (this.hbSupported) {
        const sentAt = Date.now();
        const ws = this.ws;
        try { ws.send(HB_FRAME); } catch { this.#rebuild(); return; }
        setTimeout(() => {
          // 只裁决当时探测的那条连接；期间已重建/切后台则不动（避免误杀新连接、后台重连）
          if (this.closedByUser || this.ws !== ws) return;
          if (document.visibilityState !== "visible") return;
          if (ws.readyState === WebSocket.OPEN && this.lastPong < sentAt) this.#rebuild();
        }, HB_VERIFY_MS);
      }
      return;
    }
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  async onFrame(frame) {
    if (frame.t === "hb") {
      this.hbSupported = true;
      this.lastPong = Date.now();
      return;
    }
    if (frame.t === "status") {
      // 电脑是否可用以"鉴权成功"为准，而非中继单方面的 online：电脑断网后中继要过一会
      // 才察觉、期间仍报 online。鉴权确认前，online 只当"未知"，避免标绿却其实连不上。
      // daemon 重连的两个信号：offline→online 边沿（旧 relay 也有），以及连接纪元 epoch
      // 变化（顶替路径 relay 不广播 offline，只有 epoch 能暴露"daemon 侧连接态已重置"）。
      const epochChanged = frame.online && frame.epoch !== undefined
        && this.daemonEpoch !== undefined && frame.epoch !== this.daemonEpoch;
      if (frame.epoch !== undefined) this.daemonEpoch = frame.epoch;
      if (frame.online && (this.daemonWasOffline || epochChanged) && !this.awaitingAuth) {
        // 电脑端掉线重连后 daemon 侧连接态已重置（E2E 会话作废），旧密钥/鉴权已不存在。
        // 主动重建（重握手+重鉴权+onReady 恢复 watch），别等下一次请求被踢才恢复。
        this.daemonWasOffline = false;
        if (document.visibilityState === "visible") {
          this.#rebuild();
        } else {
          this.needsReauth = true; // 后台不折腾，回前台由 ensureAlive 重建
          this.onStatus({ link: "ok", daemon: null, lastSeen: frame.lastSeen ?? null }); // 重鉴权前不标绿
        }
        return;
      }
      if (frame.online && this.awaitingAuth && this.reconnectTimer) {
        // 正卡在"电脑离线"的鉴权退避里而电脑刚上线：立刻重试，不等满退避
        clearTimeout(this.reconnectTimer);
        this.reconnectTimer = null;
        this.#openAndAuth().catch(() => this.#onClose());
      }
      if (frame.online === false) this.daemonWasOffline = true;
      const daemon = (this.awaitingAuth && frame.online) ? null : frame.online;
      this.onStatus({ link: "ok", daemon, lastSeen: frame.lastSeen ?? null });
      return;
    }
    if (frame.t !== "msg") return;
    // 信封处理串行化：序号"校验→解密→推进"必须逐帧原子完成——并发解密时背靠背
    // 重放的两帧会同时通过校验。失败的帧整体丢弃，不推进任何状态。
    const epoch = this.connEpoch;
    this.recvChain = this.recvChain
      .then(() => this.#onEnvelope(frame.data, epoch))
      .catch(() => {}); // 解密/认证失败：丢帧即可，连接层语义不变
  }

  async #onEnvelope(env, epoch) {
    if (this.connEpoch !== epoch) return; // 重建后链上滞留的旧帧作废
    let aadD2c = AAD_D2C;
    if (env.s !== undefined) {
      if (!Number.isInteger(env.s) || env.s <= this.recvSeq) return; // 重放/回退：丢弃
      aadD2c = enc.encode(`${AAD_PREFIX}:d2c:${env.s}`); // s 绑进 AAD：被篡改/剥离即解密失败
    } else if (this.recvSeq > 0) {
      return; // daemon 已启用序号却来了无序号帧：疑似重放，丢弃
    }
    const iv = b64.from(env.n);
    const data = b64.from(env.c);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: aadD2c }, this.key, data);
    if (this.connEpoch !== epoch) return;
    // 序号只在解密认证成功后推进：否则中继注入一个带巨大 s 的伪帧（过不了 GCM）
    // 就能毒化计数器，让后续所有真帧被当"重放"静默丢弃——连接看着绿却永久失聪
    if (env.s !== undefined) this.recvSeq = env.s;
    // z:1 = daemon 压缩过：解密后先 inflate（deflate-raw）再解析
    const bytes = env.z ? await inflateRaw(new Uint8Array(plain)) : new Uint8Array(plain);
    const msg = JSON.parse(new TextDecoder().decode(bytes));
    if (msg.id !== undefined && this.pendingRequests.has(msg.id)) {
      const { resolve, reject } = this.pendingRequests.get(msg.id);
      this.pendingRequests.delete(msg.id);
      if (msg.error) {
        const e = new Error(msg.error.message);
        e.code = msg.error.code; // 保留状态码：403=令牌失效/被撤销，供上层判终态
        reject(e);
      } else resolve(msg.result);
    } else if (msg.method) {
      this.onNotify(msg);
    }
  }

  // 发送串行化：信封序号必须与实际 ws 发送顺序一致（并发 encrypt 完成顺序不定，
  // 乱序到达会被 daemon 判为"序号回退"断开）。单帧失败不阻断后续帧；
  // 跨连接的旧排队帧按代次作废（新连接是新密钥/新序列，旧帧发出去只会被当垃圾）。
  send(payload) {
    const epoch = this.connEpoch;
    const task = this.sendChain.then(() => {
      if (this.connEpoch !== epoch) throw new Error(t("err.disconnected"));
      return this.#sendNow(payload);
    });
    this.sendChain = task.catch(() => {});
    return task;
  }

  async #sendNow(payload) {
    // 先验连接可写，再消费任何一次性状态：链上滞留的废帧若先把 firstFrame 吃掉，
    // 真正的 auth 就发不出握手字段，daemon 直接断开
    if (this.ws?.readyState !== WebSocket.OPEN) throw new Error(t("err.disconnected"));
    let aadC2d = AAD_C2D;
    let s;
    if (this.recvSeq > 0) { // 见过 daemon 的带序号帧 = 双方已协商启用
      s = ++this.sendSeq;
      aadC2d = enc.encode(`${AAD_PREFIX}:c2d:${s}`);
    }
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: aadC2d }, this.key, enc.encode(JSON.stringify(payload)));
    const envelope = { n: b64.to(iv), c: b64.to(cipher) };
    if (s !== undefined) envelope.s = s;
    if (this.firstFrame) {
      envelope.v = 1;
      envelope.k = b64.to(this.ephPubRaw);
      if (CAN_INFLATE) envelope.zc = 1; // 声明能 inflate → daemon 可压缩其 d2c 大帧
      this.firstFrame = false;
    }
    this.ws.send(JSON.stringify({ t: "msg", data: envelope }));
  }

  async request(method, params = {}, timeoutMs = 15000) {
    if (method === "session.watch" && this.serverCaps?.wl === 1) {
      params = { ...params, leaseMs: WATCH_LEASE_MS };
    }
    // 直连通道就绪时数据面走直连；auth 是各通道自有的（中继重鉴权必须走中继 ws），
    // rtc.offer 是直连的信令（必须走中继转交 daemon），二者恒走中继
    let result;
    if (this.rtc?.ready && method !== "auth" && method !== "rtc.offer") {
      result = await this.rtc.request(method, params, timeoutMs);
    } else {
      result = await this.relayRequest(method, params, timeoutMs);
    }
    if (method === "session.watch" && this.serverCaps?.wl === 1 && params.wt) {
      this.#armWatchRenewal(params.wt);
    } else if (method === "session.watch.renew" && result?.ok &&
               params.wt === this.watchLeaseToken) {
      this.watchLeaseExpiresAt = Date.now() + WATCH_LEASE_MS;
    } else if (method === "session.unwatch" &&
               (!params.wt || params.wt === this.watchLeaseToken)) {
      this.stopWatchRenewal();
    }
    return result;
  }

  #armWatchRenewal(wt, refreshExpiry = true) {
    this.pauseWatchRenewal();
    this.watchLeaseToken = wt;
    if (refreshExpiry) this.watchLeaseExpiresAt = Date.now() + WATCH_LEASE_MS;
    if (document.visibilityState !== "visible") return;
    const remaining = this.watchLeaseExpiresAt - Date.now();
    if (remaining <= 0) {
      this.#restartWatchAfterLeaseLoss(wt);
      return;
    }
    // 正常每 30s 一拍；若浏览器冻结后只剩很短租期，立即/提前续，不再盲等完整周期。
    const delay = Math.max(0, Math.min(WATCH_RENEW_MS, remaining - WATCH_RENEW_SAFETY_MS));
    this.#scheduleWatchRenewal(wt, delay);
  }

  #scheduleWatchRenewal(wt, delay) {
    this.pauseWatchRenewal();
    if (document.visibilityState !== "visible" || wt !== this.watchLeaseToken) return;
    this.watchRenewTimer = setTimeout(() => {
      this.watchRenewTimer = null;
      void this.#renewWatchLease(wt);
    }, Math.max(0, delay));
  }

  async #renewWatchLease(wt) {
    if (document.visibilityState !== "visible" || wt !== this.watchLeaseToken) return;
    try {
      await this.request("session.watch.renew", { wt });
      if (wt === this.watchLeaseToken) this.#armWatchRenewal(wt, false);
    } catch (err) {
      if (wt !== this.watchLeaseToken) return;
      if (err?.code === 409 || Date.now() >= this.watchLeaseExpiresAt) {
        this.#restartWatchAfterLeaseLoss(wt);
        return;
      }
      // 瞬时网络失败不能静默等到下一完整周期；在剩余租期内以至多 5s 的节奏重试。
      const remaining = Math.max(0, this.watchLeaseExpiresAt - Date.now());
      const retry = Math.min(WATCH_RENEW_RETRY_MS, Math.max(1000, Math.floor(remaining / 2)));
      this.#scheduleWatchRenewal(wt, retry);
    }
  }

  #restartWatchAfterLeaseLoss(wt) {
    if (wt !== this.watchLeaseToken) return;
    this.pauseWatchRenewal();
    this.watchLeaseToken = null;
    this.watchLeaseExpiresAt = 0;
    // 复用既有重鉴权恢复入口重新 watch，并携带 have 游标补齐缺口。
    if (document.visibilityState === "visible") this.onReady(this.lastAuth);
  }

  pauseWatchRenewal() {
    if (this.watchRenewTimer) clearTimeout(this.watchRenewTimer);
    this.watchRenewTimer = null;
  }

  resumeWatchRenewal() {
    if (this.watchLeaseToken) this.#armWatchRenewal(this.watchLeaseToken, false);
  }

  stopWatchRenewal() {
    this.pauseWatchRenewal();
    this.watchLeaseToken = null;
    this.watchLeaseExpiresAt = 0;
  }

  // 恒经中继通道的请求（request 的直连路由旁路）：信令、回落场景的中继侧收尾用
  relayRequest(method, params = {}, timeoutMs = 15000) {
    params = injectAgent(method, params);
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      // 超时定时器随请求了结即清：不清的话每个请求都挂一个 15s 定时器到期才释放
      const timer = setTimeout(() => {
        if (this.pendingRequests.has(id)) {
          this.pendingRequests.delete(id);
          reject(new Error(t("err.reqtimeout", method)));
        }
      }, timeoutMs);
      this.pendingRequests.set(id, {
        resolve: (v) => { clearTimeout(timer); resolve(v); },
        reject: (e) => { clearTimeout(timer); reject(e); },
      });
      this.send({ id, method, params }).catch((e) => {
        // 经存进表里的包装 reject 结算（清定时器+拒绝），保持单一结算路径
        const p = this.pendingRequests.get(id);
        this.pendingRequests.delete(id);
        (p ? p.reject : reject)(e);
      });
    });
  }

  // —— 局域网直连升级（见 PROTOCOL.md §3.9）——
  // 中继鉴权成功后后台尝试：daemon 声明 caps.rtc 才发起（旧 daemon 不打搅）；
  // 观众不升级（围观走中继足矣，且 rtc.offer 被 daemon 白名单挡住）。
  // 失败/断开静默回落中继并退避重试——直连永远是锦上添花，不是依赖。
  #maybeUpgradeRtc(auth) {
    if (this.info.viewer || this.closedByUser || this.dead) return;
    if (auth?.caps?.rtc !== 1) return;
    if (typeof RTCPeerConnection === "undefined") return;
    if (this.rtc) return; // 已在连/已就绪
    if (this.rtcTimer) { clearTimeout(this.rtcTimer); this.rtcTimer = null; }
    this.rtcAttempts = 0; // 中继（重）连成功：网络环境可能变了，重置退避从头试
    this.#startRtc();
  }

  #startRtc() {
    if (this.rtc || this.closedByUser || this.dead || this.info.viewer) return;
    if (document.visibilityState !== "visible") return; // 后台零活动；回前台由 ensureAlive 触发
    const chan = new RtcChannel(this, { onDead: () => this.#onRtcDead(chan) });
    this.rtc = chan;
    chan.connect().then((auth) => {
      if (this.rtc !== chan || this.closedByUser || this.dead) { chan.close(); return; }
      this.rtcAttempts = 0;
      this.lastAuth = auth;
      this.onStatus({ direct: true });
      // 热切换：先撤中继侧的 watch 订阅（不等应答；没在 watch 也无害），再重放 onReady
      // 让上层在直连通道上重建 watch / 刷新——复用与断线重连完全相同的恢复机制
      this.relayRequest("session.unwatch", {}).catch(() => {});
      this.onReady(auth);
    }).catch(() => this.#onRtcDead(chan));
  }

  #onRtcDead(chan) {
    if (this.rtc !== chan) return; // 已被顶替/已收尾
    this.rtc = null;
    const wasReady = chan.ready;
    chan.close();
    if (this.closedByUser || this.dead) { this.onStatus({ direct: false }); return; }
    this.onStatus({ direct: false });
    // 热回落：中继通道全程没断（它一直垫底），立即在其上重建 watch；
    // 中继若也断着，其自身重连的 onReady 会恢复一切，这里不越俎代庖
    if (wasReady && this.ws?.readyState === WebSocket.OPEN && !this.awaitingAuth && this.lastAuth) {
      this.onReady(this.lastAuth);
    }
    // 退避重试（5s 起、双倍、封顶 2 分钟）：回家/换网后自动提速靠它
    const delay = Math.min(5000 * 2 ** this.rtcAttempts, 120000);
    this.rtcAttempts += 1;
    this.rtcTimer = setTimeout(() => {
      this.rtcTimer = null;
      this.#startRtc();
    }, delay);
  }

  // 换电脑/令牌撤销等终局路径的直连收尾：停止重试并关闭通道
  closeRtc() {
    if (this.rtcTimer) { clearTimeout(this.rtcTimer); this.rtcTimer = null; }
    const chan = this.rtc;
    this.rtc = null;
    if (chan) {
      chan.close();
      this.onStatus({ direct: false });
    }
  }
}

// —— 局域网直连通道（WebRTC DataChannel，PROTOCOL.md §3.9）——
// 与中继并存的第二条 E2E 信道：信令（rtc.offer）走已鉴权的中继连接做单次 offer/answer
// 往返（vanilla ICE，无 STUN/TURN——同网直连，跨网自然失败回落）；DataChannel 打开后
// 在其上重新完成 E2E 握手 + deviceToken 鉴权。直连的信任锚仍是配对时钉死的 daemon
// X25519 公钥，与 DTLS 层证书无关——传输层（中继或 P2P）恒定不受信。
// 信封格式/序号防重放/压缩协商与中继通道逐字节一致：本类的 #sendNow/#onEnvelope 是
// Session 同名逻辑的直连版（差异仅在裸信封无 {t:"msg"} 包装），协议改动两处必须同步。
class RtcChannel {
  constructor(session, { onDead }) {
    this.session = session; // 宿主中继通道：信令、凭据（deviceToken）与 onNotify 出口
    this.onDead = onDead;
    this.ready = false;     // 鉴权完成、可承载数据面
    this.dead = false;
    this.pc = null;
    this.dc = null;
    this.pendingRequests = new Map();
    this.nextId = 1;
    this.firstFrame = true;
    this.sendSeq = 0;
    this.recvSeq = 0;
    this.sendChain = Promise.resolve();
    this.recvChain = Promise.resolve();
    this.lastPong = 0;
    this.lastPingAt = 0;
    this.pingTimer = null;
  }

  async connect() {
    const info = this.session.info;
    // 每条直连各自协商会话密钥（临时密钥对即用即弃），与中继通道互不相干
    const { key, ephPubRaw } = await deriveKey(info);
    this.key = key;
    this.ephPubRaw = ephPubRaw;
    const pc = new RTCPeerConnection({ iceServers: [] });
    this.pc = pc;
    const dc = pc.createDataChannel("cxx");
    this.dc = dc;
    pc.onconnectionstatechange = () => {
      // disconnected 不等恢复直接判死：直连是易失通道，早断早回落，重试便宜
      if (["failed", "closed", "disconnected"].includes(pc.connectionState)) this.#die();
    };
    dc.onclose = () => this.#die();
    await pc.setLocalDescription(await pc.createOffer());
    // vanilla ICE：等 candidate 收集完一次性交 offer。无 STUN 时只有 host/mDNS
    // candidate，数十毫秒集齐；上限兜底防个别内核不触发 complete
    await new Promise((resolve) => {
      if (pc.iceGatheringState === "complete") return resolve();
      const cap = setTimeout(resolve, 2000);
      pc.onicegatheringstatechange = () => {
        if (pc.iceGatheringState === "complete") { clearTimeout(cap); resolve(); }
      };
    });
    if (this.dead) throw new Error("rtc aborted");
    const answer = await this.session.relayRequest("rtc.offer", {
      type: pc.localDescription.type,
      sdp: pc.localDescription.sdp,
    }, 10000);
    if (this.dead) throw new Error("rtc aborted");
    await pc.setRemoteDescription(answer);
    await new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error("datachannel open timeout")), 10000);
      dc.onopen = () => { clearTimeout(timer); resolve(); };
      if (dc.readyState === "open") { clearTimeout(timer); resolve(); }
    });
    if (this.dead) throw new Error("rtc aborted");
    dc.onmessage = (e) => {
      // 与中继同款串行化：序号"校验→解密→推进"逐帧原子，失败帧整体丢弃
      this.recvChain = this.recvChain.then(() => this.#onEnvelope(e.data)).catch(() => {});
    };
    // 直连信道上的连接对 daemon 是一个全新 ClientSession：重新鉴权（deviceToken 路径）
    const auth = await this.request("auth", {
      deviceToken: info.deviceToken,
      protocol: APP_PROTOCOL,
      name: deviceLabel(),
      clientId: clientId(),
      caps: { seq: 1, img: 1 },
    }, 10000);
    if (this.dead) throw new Error("rtc aborted");
    this.ready = true;
    this.startPing();
    return auth;
  }

  // —— 前台心跳（应用层 ping/pong，PROTOCOL.md §3.5）——
  // 直连没有中继层 hb 可借：DataChannel 在 iOS 切网/锁屏后同样会僵而不报。
  // 只在页面可见时跑；上一拍没回即判死回落中继。
  startPing() {
    this.stopPing();
    if (this.dead || document.visibilityState !== "visible") return;
    this.lastPong = Date.now();
    this.lastPingAt = 0;
    this.pingTimer = setInterval(() => {
      if (this.dead) return;
      if (this.lastPingAt && this.lastPong < this.lastPingAt) { this.#die(); return; }
      this.lastPingAt = Date.now();
      this.send({ method: "ping", params: {} }).catch(() => this.#die());
    }, PING_MS);
  }

  stopPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = null;
  }

  // 回前台验活：先看通道状态，再发一拍限时验收（与中继 ensureAlive 的 hb 验活同款）
  verify() {
    if (this.dead) return;
    if (this.dc?.readyState !== "open") { this.#die(); return; }
    this.startPing();
    const sentAt = Date.now();
    this.lastPingAt = sentAt;
    this.send({ method: "ping", params: {} }).catch(() => this.#die());
    setTimeout(() => {
      if (!this.dead && this.lastPong < sentAt) this.#die();
    }, HB_VERIFY_MS);
  }

  async #onEnvelope(raw) {
    if (this.dead) return;
    const env = JSON.parse(raw);
    let aadD2c = AAD_D2C;
    if (env.s !== undefined) {
      if (!Number.isInteger(env.s) || env.s <= this.recvSeq) return; // 重放/回退：丢弃
      aadD2c = enc.encode(`${AAD_PREFIX}:d2c:${env.s}`);
    } else if (this.recvSeq > 0) {
      return; // 已启用序号却来了无序号帧：疑似重放，丢弃
    }
    const iv = b64.from(env.n);
    const data = b64.from(env.c);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: aadD2c }, this.key, data);
    if (this.dead) return;
    if (env.s !== undefined) this.recvSeq = env.s; // 只在认证成功后推进（防伪帧毒化计数器）
    const bytes = env.z ? await inflateRaw(new Uint8Array(plain)) : new Uint8Array(plain);
    const msg = JSON.parse(new TextDecoder().decode(bytes));
    if (msg.method === "pong") {
      this.lastPong = Date.now(); // 通道级活性信号，不上抛
      return;
    }
    if (msg.id !== undefined && this.pendingRequests.has(msg.id)) {
      const { resolve, reject } = this.pendingRequests.get(msg.id);
      this.pendingRequests.delete(msg.id);
      if (msg.error) {
        const e = new Error(msg.error.message);
        e.code = msg.error.code;
        reject(e);
      } else resolve(msg.result);
    } else if (msg.method) {
      this.session.onNotify(msg); // 通知与中继同一出口：上层对传输层无感知
    }
  }

  send(payload) {
    const task = this.sendChain.then(() => {
      if (this.dead) throw new Error(t("err.disconnected"));
      return this.#sendNow(payload);
    });
    this.sendChain = task.catch(() => {});
    return task;
  }

  async #sendNow(payload) {
    if (this.dc?.readyState !== "open") throw new Error(t("err.disconnected"));
    let aadC2d = AAD_C2D;
    let s;
    if (this.recvSeq > 0) { // 见过 daemon 的带序号帧 = 双方已协商启用
      s = ++this.sendSeq;
      aadC2d = enc.encode(`${AAD_PREFIX}:c2d:${s}`);
    }
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: aadC2d }, this.key, enc.encode(JSON.stringify(payload)));
    const envelope = { n: b64.to(iv), c: b64.to(cipher) };
    if (s !== undefined) envelope.s = s;
    if (this.firstFrame) {
      envelope.v = 1;
      envelope.k = b64.to(this.ephPubRaw);
      if (CAN_INFLATE) envelope.zc = 1;
      this.firstFrame = false;
    }
    if (this.dc?.readyState !== "open") throw new Error(t("err.disconnected"));
    this.dc.send(JSON.stringify(envelope)); // 裸信封，无中继的 {t:"msg"} 包装
  }

  request(method, params = {}, timeoutMs = 15000) {
    params = injectAgent(method, params);
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        if (this.pendingRequests.has(id)) {
          this.pendingRequests.delete(id);
          reject(new Error(t("err.reqtimeout", method)));
        }
      }, timeoutMs);
      this.pendingRequests.set(id, {
        resolve: (v) => { clearTimeout(timer); resolve(v); },
        reject: (e) => { clearTimeout(timer); reject(e); },
      });
      this.send({ id, method, params }).catch((e) => {
        const p = this.pendingRequests.get(id);
        this.pendingRequests.delete(id);
        (p ? p.reject : reject)(e);
      });
    });
  }

  // 通道死亡（断开/验活失败）：收尾并上报宿主回落。close 是调用方收尾，不回调
  #die() {
    if (this.dead) return;
    this.#teardown();
    this.onDead();
  }

  close() {
    this.#teardown();
  }

  #teardown() {
    if (this.dead) return;
    this.dead = true;
    this.ready = false;
    this.stopPing();
    for (const [, p] of this.pendingRequests) p.reject(new Error(t("err.disconnected")));
    this.pendingRequests.clear();
    try { this.dc?.close(); } catch {}
    try { this.pc?.close(); } catch {}
  }
}

// —— rollout 条目渲染 ——
// 关键：codex 把每条逻辑消息写两遍——语义事件 `event_msg`（agent_message/
// user_message）+ OpenAI API 格式 `response_item`（message）。二者内容相同，
// 若都渲染就会重复（"两条收到"）。只认 event_msg 语义流，response_item 一律跳过。
function extractText(value, depth = 0) {
  if (depth > 4 || value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) return value.map((v) => extractText(v, depth + 1)).filter(Boolean).join("\n");
  if (typeof value === "object") {
    for (const k of ["text", "message", "content", "command", "aggregated_output"]) {
      if (k in value) {
        const got = extractText(value[k], depth + 1);
        if (got) return got;
      }
    }
  }
  return "";
}

// —— rollout item -> 渲染指令 ——
// 对话正文认 event_msg（user_message/agent_message）；工具调用认 response_item
// （function_call + function_call_output 以 call_id 配对，这是现行 codex 记录命令
// 的唯一位置——event_msg 早已不含 exec_command_*，但保留旧格式兼容）。
// 返回值：null | {cls:"user"|"assistant", text, refs?}
//        | {cls:"tool", icon, label, detail, callId}   工具调用折叠行
//        | {cls:"toolout", callId, text, code}          工具输出（并入对应折叠行）
//        | {cls:"diff", files:[{path,kind,diff}], ok}   文件改动
const EXEC_NAME_RE = /exec|shell|bash|command/i;

function parseJson(str) {
  try { return JSON.parse(str ?? "{}") ?? {}; } catch { return {}; }
}

// 新版桌面 Codex 会将宿主工具调用包进 custom_tool_call:exec；真正的工具、命令和
// 人类可读标题嵌在 input 的 JavaScript 中。这里只做展示用的只读提取，绝不执行该字符串。
function jsStringField(source, key) {
  const esc = String(key).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp(`(?:["']${esc}["']|\\b${esc})\\s*:\\s*("(?:\\\\.|[^"\\\\])*"|'(?:\\\\.|[^'\\\\])*')`);
  const raw = String(source ?? "").match(re)?.[1];
  if (!raw) return "";
  if (raw[0] === '"') {
    try { return String(JSON.parse(raw)); } catch {}
  }
  return raw.slice(1, -1).replace(/\\([\\'"nrt])/g, (_, c) => ({ n: "\n", r: "\r", t: "\t" }[c] ?? c));
}

function describeCustomToolCall(name, input) {
  const detail = String(input ?? "");
  const inner = detail.match(/\btools\.([A-Za-z][\w]*)\s*\(/)?.[1] ?? "";
  const title = jsStringField(detail, "title");
  const command = jsStringField(detail, "cmd") || jsStringField(detail, "command");
  if (title) return { icon: /node_repl|browser/i.test(inner) ? "⌕" : "⚙", label: title, detail, activity: inner };
  if (command) return { icon: "$", label: command, detail, activity: "exec_command" };
  if (inner) return { icon: "⚙", label: inner.replace(/^mcp__/, "").replaceAll("__", " · "), detail, activity: inner };
  return { icon: "⚙", label: name || t("tool.call"), detail, activity: name };
}

// GUI 版 exec 输出带 harness 前言（Chunk ID/Wall time/…/Output:），剥掉只留正文与退出码
function cleanExecOutput(raw) {
  const m = raw.match(/Process exited with code (\d+)/);
  const idx = raw.indexOf("Output:\n");
  if (!m && idx < 0) return { code: null, body: raw };
  return { code: m ? Number(m[1]) : null, body: idx >= 0 ? raw.slice(idx + 8).replace(/^---\n/, "") : raw };
}

function parseCodexDirectives(text) {
  const directives = [];
  const lines = String(text ?? "").split(/\r?\n/);
  const body = [];
  for (const line of lines) {
    const m = line.trim().match(/^::([a-z][\w-]*)\{.*\}\s*$/);
    if (m) {
      directives.push(m[1]);
    } else {
      body.push(line);
    }
  }
  return { text: body.join("\n").trim(), directives };
}

function stripCodexDirectives(text) {
  return parseCodexDirectives(text).text;
}

function itemToBubble(item) {
  const ty = item?.type;
  const p = item?.payload ?? {};
  // daemon 可能把超大的底层 JSONL 记录瘦身成 truncated 占位来保护传输帧大小。
  // 这些记录常是 response_item/message 等前端本来会跳过的重复/内部记录，不能渲染成
  // “内容已截断”的用户提示；可见文本以 event_msg 或工具行的实际可渲染内容为准。
  if (p.truncated) return null;
  if (ty === "event_msg") {
    const pt = p.type;
    if (pt === "user_message" || pt === "agent_message") {
      const raw = String(p.message ?? "").trim();
      if (pt === "agent_message") {
        const parsed = parseCodexDirectives(raw);
        return parsed.text ? { cls: "assistant", text: parsed.text, directives: parsed.directives } : null;
      }
      return raw ? { cls: "user", text: raw } : null;
    }
    if (pt === "patch_apply_end") {
      const files = Object.entries(p.changes ?? {}).map(([path, c]) => ({
        path, kind: c?.type ?? "update", diff: String(c?.unified_diff ?? ""),
      }));
      return files.length ? { cls: "diff", files, ok: p.success !== false } : null;
    }
    if (pt === "web_search_end") {
      const q = String(p.query ?? "").trim();
      return q ? { cls: "tool", icon: "⌕", label: q, detail: q, callId: null } : null; // 图标已表意
    }
    // 旧格式兼容：现行版本命令在 response_item 里，见到过 function_call 就跳过这两类避免重复
    if (pt === "exec_command_begin" && !app.sawFunctionCalls) {
      const cmd = Array.isArray(p.command) ? p.command.join(" ") : (p.command ?? "");
      return cmd ? { cls: "tool", icon: "$", label: cmd, detail: cmd, callId: p.call_id ?? null } : null;
    }
    if (pt === "exec_command_end" && !app.sawFunctionCalls) {
      const out = String(p.aggregated_output ?? p.stdout ?? "").trim();
      const code = p.exit_code ?? (p.success === false ? 1 : 0);
      return out || code ? { cls: "toolout", callId: p.call_id ?? null, text: out, code } : null;
    }
    return null; // task_started/token_count/mcp_tool_call_end（与 response_item 重复）等跳过
  }
  if (ty === "response_item") {
    const pt = p.type;
    if (pt === "image_generation_call") {
      // 生成图：daemon 已把 base64 抽出缓存，这里只剩引用
      return p.imageRef ? { cls: "images", refs: [p.imageRef], user: false } : null;
    }
    if (pt === "message" && Array.isArray(p.content)) {
      // 文本部分与 event_msg 重复（跳过），但用户贴的图只存在于这里
      const refs = p.content.map((c) => c?.imageRef).filter(Boolean);
      if (refs.length) {
        if (p.role === "user") {
          const texts = p.content.map((c) => String(c?.text ?? c?.input_text ?? "").trim()).filter(Boolean);
          return { cls: "user", text: texts.join("\n\n"), refs };
        }
        return { cls: "images", refs, user: false };
      }
      return null;
    }
    if (pt === "function_call") {
      app.sawFunctionCalls = true;
      const args = parseJson(p.arguments);
      if (/^wait$/i.test(p.name ?? "")) {
        return { cls: "tool", icon: "◌", label: t("tool.wait"),
                 detail: JSON.stringify(args, null, 2), callId: p.call_id ?? null };
      }
      if (EXEC_NAME_RE.test(p.name ?? "")) {
        const cmd = args.cmd ?? args.command;
        const text = (Array.isArray(cmd) ? cmd.join(" ") : cmd) || "";
        return { cls: "tool", icon: "$", label: text || p.name,
                 detail: text || JSON.stringify(args, null, 2), callId: p.call_id ?? null };
      }
      return { cls: "tool", icon: "⚙", label: p.name || t("tool.call"),
               detail: JSON.stringify(args, null, 2), callId: p.call_id ?? null };
    }
    if (pt === "function_call_output" || pt === "custom_tool_call_output") {
      app.sawFunctionCalls = true;
      const raw = String(typeof p.output === "string" ? p.output : extractText(p.output)).trim();
      if (!raw) return null;
      const { code, body } = cleanExecOutput(raw);
      return { cls: "toolout", callId: p.call_id ?? null, text: body.trim() || raw, code };
    }
    if (pt === "custom_tool_call") {
      const tool = describeCustomToolCall(p.name, p.input);
      return { cls: "tool", ...tool, callId: p.call_id ?? null };
    }
    return null; // message/reasoning（与 event_msg 重复或不外显）等跳过
  }
  if (["turn_context", "session_meta", "compacted"].includes(ty)) return null;
  // 更老格式（无 event_msg）：回退通用提取，保持旧会话兼容
  const parsed = parseCodexDirectives(extractText(p ?? item));
  const text = parsed.text;
  if (!text) return null;
  const kind = `${ty ?? ""}:${p?.type ?? ""}`;
  if (/user/i.test(kind)) return { cls: "user", text };
  if (/command|exec|shell/i.test(kind)) return { cls: "tool", icon: "$", label: text, detail: text, callId: null };
  if (/agent|assistant|message/i.test(kind)) return { cls: "assistant", text, directives: parsed.directives };
  return null; // 未知且非消息：不渲染，避免噪声
}

// —— 轻量 markdown 渲染（纯 DOM 构建，无 innerHTML，天然防注入）——
// 支持：段落、标题、无序/有序列表、围栏代码块、行内代码、粗体、链接、引用、分隔线。
function mdInline(text) {
  const frag = document.createDocumentFragment();
  const re = /(`[^`\n]+`)|(\*\*[^*\n]+\*\*)|\[([^\]\n]+)\]\((<[^>\n]+>|[^\s)\n]+)\)/g;
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    if (m[1]) {
      const c = document.createElement("code");
      c.textContent = m[1].slice(1, -1);
      frag.appendChild(c);
    } else if (m[2]) {
      const b = document.createElement("strong");
      b.textContent = m[2].slice(2, -2);
      frag.appendChild(b);
    } else {
      const a = document.createElement("a");
      const href = m[4].startsWith("<") ? m[4].slice(1, -1) : m[4];
      a.textContent = m[3];
      a.title = href;
      if (/^https?:\/\//i.test(href)) {
        a.href = href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      }
      frag.appendChild(a);
    }
    last = re.lastIndex;
  }
  if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

function mdRender(text) {
  const root = document.createElement("div");
  root.className = "md";
  const lines = text.split("\n");
  const para = [];
  const flushPara = () => {
    if (!para.length) return;
    const p = document.createElement("p");
    para.forEach((l, idx) => {
      if (idx) p.appendChild(document.createElement("br"));
      p.appendChild(mdInline(l));
    });
    root.appendChild(p);
    para.length = 0;
  };
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) {
      flushPara();
      const buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++; // 跳过闭合围栏
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.textContent = buf.join("\n");
      pre.appendChild(code);
      root.appendChild(pre);
      continue;
    }
    const h = line.match(/^(#{1,4})\s+(.*)/);
    if (h) {
      flushPara();
      // # -> h3 起步：对话流里不需要巨型标题
      const el = document.createElement(`h${Math.min(h[1].length + 2, 6)}`);
      el.appendChild(mdInline(h[2]));
      root.appendChild(el);
      i++;
      continue;
    }
    // 表格：| a | b | 行 + 紧随的 |---|---| 分隔行
    const sep = lines[i + 1] ?? "";
    if (/^\s*\|/.test(line) && /^\s*\|?[\s:|-]+\|?\s*$/.test(sep) && sep.includes("-")) {
      flushPara();
      const rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i])) rows.push(lines[i++]);
      const cells = (row) => row.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map((c) => c.trim());
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      for (const c of cells(rows[0])) {
        const th = document.createElement("th");
        th.appendChild(mdInline(c));
        headRow.appendChild(th);
      }
      thead.appendChild(headRow);
      const tbody = document.createElement("tbody");
      for (const row of rows.slice(2)) {
        const tr = document.createElement("tr");
        for (const c of cells(row)) {
          const td = document.createElement("td");
          td.appendChild(mdInline(c));
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.append(thead, tbody);
      root.appendChild(table);
      continue;
    }
    const li = line.match(/^\s*([-*]|\d+[.、])\s+(.*)/);
    if (li) {
      flushPara();
      const listEl = document.createElement(/^\d/.test(li[1]) ? "ol" : "ul");
      while (i < lines.length) {
        const m2 = lines[i].match(/^\s*([-*]|\d+[.、])\s+(.*)/);
        if (!m2) break;
        const item = document.createElement("li");
        item.appendChild(mdInline(m2[2]));
        listEl.appendChild(item);
        i++;
      }
      root.appendChild(listEl);
      continue;
    }
    if (/^>\s?/.test(line)) {
      flushPara();
      const bq = document.createElement("blockquote");
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/, ""));
      buf.forEach((l, idx) => {
        if (idx) bq.appendChild(document.createElement("br"));
        bq.appendChild(mdInline(l));
      });
      root.appendChild(bq);
      continue;
    }
    if (/^(---+|\*\*\*+)\s*$/.test(line)) { flushPara(); root.appendChild(document.createElement("hr")); i++; continue; }
    if (/^\s*$/.test(line)) { flushPara(); i++; continue; }
    para.push(line);
    i++;
  }
  flushPara();
  return root;
}

// —— 气泡构建 ——
const CLIP = 6000;
const clip = (text) => (text.length > CLIP ? `${text.slice(0, CLIP)}…` : text);

// 工具调用折叠行：头部一行摘要（图标 + 命令/工具名 + 状态角标），
// 点开看完整调用与输出。输出到达时经 attachToolOutput 按 call_id 并入。
function toolRow({ icon, label, detail, callId }) {
  const wrap = document.createElement("div");
  wrap.className = "tool";
  const head = document.createElement("div");
  head.className = "tool-head";
  const chev = document.createElement("span");
  chev.className = "tchev";
  chev.textContent = "›"; // 清亮角括号，展开时 CSS 旋转 90° 指向下方（取代实心 ▶）
  const cmd = document.createElement("span");
  cmd.className = "tcmd";
  cmd.textContent = `${icon} ${(label || "").split("\n")[0]}`;
  const stat = document.createElement("span");
  stat.className = "tstat";
  head.append(chev, cmd, stat);
  const body = document.createElement("div");
  body.className = "tool-body";
  const tin = document.createElement("div");
  tin.textContent = clip(detail || label || "");
  const tout = document.createElement("div");
  tout.className = "tout";
  body.append(tin, tout);
  head.onclick = () => wrap.classList.toggle("open");
  wrap.append(head, body);
  if (callId) app.toolNodes.set(callId, { stat, tout });
  return wrap;
}

// 工具输出并入对应折叠行；找不到（如快照被截断）则退化为独立行
function attachToolOutput({ callId, text, code }) {
  const ref = callId ? app.toolNodes.get(callId) : null;
  if (!ref) {
    return text ? toolRow({ icon: "↳", label: t("tool.output", code), detail: text, callId: null }) : null;
  }
  if (text) {
    ref.tout.textContent = clip(text);
    ref.tout.style.display = "block";
  }
  if (code !== null && code !== undefined) {
    // 成功是常态，不占位；只在失败时留下 ✗ 提示
    if (code === 0) {
      ref.stat.textContent = "";
    } else {
      ref.stat.textContent = `✗ ${code}`;
      ref.stat.classList.add("err");
    }
  }
  return null; // 已并入，无新节点
}

function questionNode({ callId, questions }) {
  const wrap = document.createElement("div");
  wrap.className = "question";
  const head = document.createElement("div");
  head.className = "qhead";
  head.textContent = "需要你的选择";
  wrap.appendChild(head);
  const states = [];
  for (const raw of Array.isArray(questions) ? questions : []) {
    const q = raw && typeof raw === "object" ? raw : {};
    const question = String(q.question || "").trim();
    if (!question) continue;
    const item = document.createElement("div");
    item.className = "qitem";
    const title = document.createElement("div");
    title.className = "qtitle";
    title.textContent = q.header ? `${q.header} · ${question}` : question;
    const options = document.createElement("div");
    options.className = "qoptions";
    const state = { question, multi: q.multiSelect === true, selected: new Set(), other: null, buttons: [] };
    for (const optRaw of Array.isArray(q.options) ? q.options : []) {
      const opt = optRaw && typeof optRaw === "object" ? optRaw : {};
      const label = String(opt.label || "").trim();
      if (!label) continue;
      const button = document.createElement("button");
      button.type = "button";
      button.className = "qoption";
      const labelEl = document.createElement("span");
      labelEl.className = "qlabel";
      labelEl.textContent = label;
      button.appendChild(labelEl);
      if (opt.description) {
        const desc = document.createElement("span");
        desc.className = "qdesc";
        desc.textContent = String(opt.description);
        button.appendChild(desc);
      }
      button.onclick = () => {
        if (wrap.classList.contains("answered")) return;
        if (!state.multi) state.selected.clear();
        if (state.selected.has(label)) state.selected.delete(label);
        else state.selected.add(label);
        for (const entry of state.buttons) entry.button.classList.toggle("sel", state.selected.has(entry.label));
        updateSend();
      };
      state.buttons.push({ label, button });
      options.appendChild(button);
    }
    const other = document.createElement("input");
    other.className = "qother";
    other.placeholder = "其他回答（可选）";
    other.maxLength = 4000;
    other.oninput = updateSend;
    state.other = other;
    item.append(title, options, other);
    wrap.appendChild(item);
    states.push(state);
  }
  const result = document.createElement("div");
  result.className = "qresult";
  const send = document.createElement("button");
  send.type = "button";
  send.className = "qsend";
  send.textContent = "提交回答";
  const answers = () => Object.fromEntries(states.map((state) => {
    const other = state.other?.value.trim();
    const value = [...state.selected, ...(other ? [other] : [])].join(", ");
    return [state.question, value];
  }));
  function updateSend() {
    send.disabled = !states.length || states.some((state) => !state.selected.size && !state.other?.value.trim());
  }
  send.onclick = async () => {
    if (send.disabled || !callId || app.agent !== "claude" || !app.currentId) return;
    send.disabled = true;
    wrap.classList.add("answering");
    result.textContent = "正在提交…";
    try {
      await app.session.request("question.respond", { sessionId: app.currentId, toolUseId: callId, answers: answers() }, 30000);
      // 等 session tail 的 tool_result 做最终确认，避免写入失败或别的设备抢答时本地误显示已完成。
      result.textContent = "已提交，等待 Claude 继续…";
    } catch (err) {
      wrap.classList.remove("answering");
      result.textContent = "";
      updateSend();
      showBanner(`提交回答失败: ${err.message}`);
    }
  };
  wrap.append(result, send);
  updateSend();
  if (callId) app.questionNodes.set(callId, { wrap, result, send, states });
  return wrap;
}

function attachQuestionResult({ callId, text }) {
  const ref = callId ? app.questionNodes.get(callId) : null;
  if (!ref) return null;
  ref.wrap.classList.remove("answering");
  ref.wrap.classList.add("answered");
  ref.send.remove();
  for (const state of ref.states) {
    for (const { button } of state.buttons) button.disabled = true;
    state.other.disabled = true;
  }
  ref.result.textContent = text || "已回答";
  return null;
}

// 每个文件：路径标题 + 着色 diff 行（会话流的改动卡与审批卡共用）
function appendDiffFiles(container, files) {
  for (const f of files) {
    const h = document.createElement("div");
    h.className = "dfile";
    h.textContent = `${f.kind === "add" ? "＋" : f.kind === "delete" ? "－" : "±"} ${f.path}`;
    container.appendChild(h);
    for (const line of clip(f.diff || "").split("\n")) {
      if (!line && f.diff === "") continue; // delete 类无 diff，不渲染空行
      const div = document.createElement("div");
      if (/^\+/.test(line)) div.className = "dl-add";
      else if (/^-/.test(line)) div.className = "dl-del";
      else if (/^@@/.test(line)) div.className = "dl-hunk";
      div.textContent = line || " ";
      container.appendChild(div);
    }
  }
}

// 文件改动卡：标题 + 每个文件的着色 diff
function diffNode({ files, ok, callId }) {
  const wrap = toolRow({
    icon: "✎",
    label: files.length === 1 ? t("diff.one", files[0].path.split(/[\\/]/).pop()) : t("diff.many", files.length),
    detail: "", callId: callId ?? null,
  });
  const stat = wrap.querySelector(".tstat");
  // ChatGPT/codex（patch_apply_end）创建即知成败；Claude 传 ok:null + callId，成败由 tool_result
  // 回执经 attachToolOutput 并入（同一配对通道），故保留 tout 只撤掉调用参数文本行
  if (ok !== null && ok !== undefined) {
    // 成功是常态，不占位；只在失败时留下 ✗ 提示
    if (ok) {
      stat.textContent = "";
    } else {
      stat.textContent = "✗";
      stat.classList.add("err");
    }
  }
  const body = wrap.querySelector(".tool-body");
  const tout = wrap.querySelector(".tout");
  body.firstChild.remove(); // tin：diff 卡不需要"详情=标签"的占位文本
  const dwrap = document.createElement("div");
  appendDiffFiles(dwrap, files);
  body.insertBefore(dwrap, tout);
  return wrap;
}

// —— 图片：优先收 daemon 推送流（image.chunk），
// 回落逐块拉取（image.fetch，旧 daemon / 推送缺块时）。拼装完成的 data URL 进内存
// LRU：重开会话/断点续传重渲染同一张图零流量、零等待。——
const imageDataCache = new Map(); // id -> dataURL（Map 迭代序即插入序，当 LRU 用）
let imageDataChars = 0;
const IMAGE_DATA_BUDGET = 24 * 1024 * 1024; // 手机内存有限：约 18MB 原始字节
function imageDataPut(id, dataURL) {
  if (!id || imageDataCache.has(id)) return;
  imageDataCache.set(id, dataURL);
  imageDataChars += dataURL.length;
  for (const [k, v] of imageDataCache) {
    if (imageDataChars <= IMAGE_DATA_BUDGET) break;
    if (k === id) break; // 单图超预算：至少留住刚存的这张
    imageDataCache.delete(k);
    imageDataChars -= v.length;
  }
}
function imageDataGet(id) {
  const v = imageDataCache.get(id);
  if (v !== undefined) { imageDataCache.delete(id); imageDataCache.set(id, v); } // 命中重插：真 LRU，热图不被先挤掉
  return v;
}
const imgRx = new Map();      // id -> {data, mime} 推送流拼装缓冲
const imgWaiters = new Map(); // id -> Set<fn> 等待该图拼装完成的渲染点
function onImageChunk(p) {
  if (typeof p?.id !== "string" || typeof p.data !== "string") return;
  let a = imgRx.get(p.id);
  if (p.offset === 0) {
    // 首块：无论有无残缓冲一律重开（断线重连后的重推覆盖上次的半截）
    a = { data: "", mime: p.mime || "image/png" };
    imgRx.set(p.id, a);
  } else if (!a) {
    return; // 半途开始（前块已丢）：不拼，交给拉取兜底
  }
  if (p.offset !== a.data.length) { imgRx.delete(p.id); return; } // 乱序/缺块：作废
  a.data += p.data;
  if (a.data.length > 16_000_000) { imgRx.delete(p.id); return; } // 体积兜底
  if (p.eof) {
    imgRx.delete(p.id);
    imageDataPut(p.id, `data:${a.mime};base64,${a.data}`);
    const ws = imgWaiters.get(p.id);
    if (ws) { imgWaiters.delete(p.id); for (const fn of ws) fn(); }
  }
}
// 等推送拼装完成：daemon 未声明 caps.img（旧 daemon/观众连接）立即回 false 走拉取；
// 超时兜底覆盖"daemon 已推过本连接但客户端缓存已挤掉"的缺口
function waitImagePush(id, ms) {
  // 观众连接 daemon 不推流（也不回执 caps.img，双保险），直接走拉取
  if (app.isViewer || app.session?.serverCaps?.img !== 1) return Promise.resolve(false);
  if (imageDataCache.has(id)) return Promise.resolve(true);
  return new Promise((resolve) => {
    let ws = imgWaiters.get(id);
    if (!ws) { ws = new Set(); imgWaiters.set(id, ws); }
    const done = (ok) => {
      clearTimeout(timer);
      ws.delete(fn);
      if (!ws.size) imgWaiters.delete(id); // 空集回收，长期挂机不积垃圾
      resolve(ok);
    };
    const fn = () => done(true);
    ws.add(fn);
    const timer = setTimeout(() => done(false), ms);
  });
}

async function loadImage(ref, box) {
  box.textContent = t("img.loading");
  box.onclick = null;
  const show = (dataURL) => {
    const img = document.createElement("img");
    img.src = dataURL;
    box.textContent = "";
    box.appendChild(img);
  };
  const hit = imageDataGet(ref.id);
  if (hit) { show(hit); return; }
  try {
    // 新 daemon 随快照/tail 主动推流：等拼装完成即显示，零拉取往返。
    // 分级等待：短宽限内首块未到（旧 daemon/已推过本连接但本地被挤出/推送被中止）
    // 立即回落拉取，不再盲等固定 4s；拼装已开始且在长进就继续等推送到齐
    let lastLen = -1;
    for (let round = 0; round < 20; round++) {
      if (await waitImagePush(ref.id, 1600)) { show(imageDataGet(ref.id)); return; }
      const len = imgRx.get(ref.id)?.data.length ?? -1;
      if (len < 0 || len === lastLen) break; // 没开始/没进展：交给拉取兜底
      lastLen = len;
    }
    let data = "";
    let offset = 0;
    let mime = ref.mime || "image/png";
    for (;;) {
      const r = await app.session.request("image.fetch", { id: ref.id, offset }, 20000);
      data += r.data;
      offset += r.data.length;
      mime = r.mime || mime;
      if (r.eof) break;
      if (offset > 16_000_000) throw new Error(t("img.toolarge"));
    }
    const dataURL = `data:${mime};base64,${data}`;
    imageDataPut(ref.id, dataURL);
    show(dataURL);
  } catch (err) {
    box.textContent = t("img.loadfail", err.message);
    box.onclick = () => loadImage(ref, box);
  }
}

function imagesNode({ refs, user }) {
  const fresh = refs.filter((r) => !(r.id && app.seenImages.has(r.id)));
  if (!fresh.length) return null; // 生成图的多帧进度会重复出现同一张，只渲染一次
  const msg = document.createElement("div");
  msg.className = `msg${user ? " user" : ""}`;
  const col = document.createElement("div");
  col.style.cssText = user ? "max-width:85%" : "width:100%";
  for (const ref of fresh) {
    if (ref.id) app.seenImages.add(ref.id);
    const box = document.createElement("div");
    box.className = "imgbox";
    if (ref.tooLarge || !ref.id) {
      box.textContent = t("img.toolargeview");
    } else {
      loadImage(ref, box);
    }
    col.appendChild(box);
  }
  msg.appendChild(col);
  return msg;
}

function actionButton(label, svg, onclick) {
  const b = document.createElement("button");
  b.type = "button";
  b.innerHTML = svg;
  b.title = label;
  b.setAttribute("aria-label", label);
  b.onclick = onclick;
  return b;
}

  return directives.some((d) => /^git-(?:stage|commit|push|create-branch|create-pr)$/.test(d));
}

function appendAssistantActions(msg, text, directives = []) {
  if (app.isViewer || !hasGitDirective(directives) || msg.querySelector(".msg-actions")) return;
  const actions = document.createElement("div");
  actions.className = "msg-actions";
  actions.appendChild(actionButton(
    t("a11y.copyoutput"),
    SVG(`<rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>`),
    async (e) => {
      e.stopPropagation();
      showToast((await copyText(text)) ? t("toast.outputcopied") : t("toast.copyfail"));
    },
  ));
  if (app.agent === "codex" && app.currentId && !isDraftSession()) {
    actions.appendChild(actionButton(
      t("a11y.forksession"),
      CODEX_FORK_ICON,
      async (e) => {
        e.stopPropagation();
        openForkConfirm();
      },
    ));
  }
  msg.appendChild(actions);
}

function finalizeAssistantActions(msg) {
  if (!msg?.classList?.contains("assistant")) return;
  appendAssistantActions(msg, msg.__czrText || "", msg.__czrDirectives || []);
}

function markAssistantFinal(msg) {
  if (!msg?.classList?.contains("assistant")) return null;
  msg.dataset.actionsFinalized = "1";
  finalizeAssistantActions(msg);
  return msg;
}

function bubbleNode({ cls, text = "", directives = [], refs = [] }) {
  const msg = document.createElement("div");
  msg.className = `msg ${cls}`;
  if (cls === "user") {
    const addText = (parent) => {
      if (!text) return;
      const b = document.createElement("div");
      b.className = "bubble";
      b.textContent = clip(text);
      parent.appendChild(b);
    };
    if (refs.length) {
      const col = document.createElement("div");
      col.className = "echocol";
      const row = document.createElement("div");
      row.className = "userimgs";
      for (const ref of refs) {
        const box = document.createElement("div");
        box.className = "imgbox";
        if (ref.tooLarge || !ref.id) box.textContent = t("img.toolargeview");
        else loadImage(ref, box);
        row.appendChild(box);
      }
      col.appendChild(row);
      addText(col);
      msg.appendChild(col);
    } else {
      addText(msg);
    }
  } else {
    msg.appendChild(mdRender(clip(text)));
    // 超长回复不再一刀切：点开看全部
    if (text.length > CLIP) {
      const more = document.createElement("button");
      more.className = "morelink";
      more.textContent = t("bubble.expandall", Math.round(text.length / 1000));
      more.onclick = () => {
        msg.innerHTML = "";
        msg.appendChild(mdRender(text));
        if (msg.dataset.actionsFinalized === "1") finalizeAssistantActions(msg);
      };
      msg.appendChild(more);
    }
    msg.__czrText = text;
    msg.__czrDirectives = directives;
  }
  return msg;
}

  deepLink: null,          // 通知深链带来的 sessionId（#s=...）
  deepLinkAgent: null,     // 深链带的 agent（#s=..&a=claude）：开会话前先切到该后端
  refreshTimer: null,
  listGen: 0,              // 列表数据空间代次（resetListModel 递增）：切电脑/切 agent 后，
                           // 在途的 loadHome/预取按代次作废，旧空间的数据不污染新模型与快照
  watchToken: null,        // 当前 watch 的令牌（每次 watch 换新，daemon 原样打在快照/事件帧上）：
                           // 快速重开同一会话时凭它丢弃被顶替的旧 watch 在途帧
  prefetching: false,      // 后台全量预取进行中（把所有项目会话拉进缓存，令展开秒开）
  prefetchAt: 0,           // 上次预取完成时刻（节流：短时间内不重复全量预取）
  isViewer: false,         // 观众态（围观链接进入）：只读，无列表/操作/审批
  viewerEnded: false,      // 围观终态（被踢/过期）：停止重连，显示"围观已结束"
  replayMode: false,       // 回放模式（已结束会话从头读）：翻页方向由"加载更早"倒转为"继续加载"
  replayDone: false,       // 回放已读到末条
  replayLoading: false,
  replayLastAt: 0,         // 客户端自限 ≥2s，与 daemon 的 viewer 频控对齐
  archivingSessionId: null, // 本机发起归档时抑制 board.changed 触发的二次返回
  // —— Terminal Mode（internal/TERMINAL-MODE.md）——
  homeTab: localStorage.getItem("czr-hometab") || "chat", // 首页模式：chat 会话 | term 终端（记忆）
  terminals: [],           // terminal.list / terminal.listChanged 的最新列表
  termPresets: null,       // terminal.presets 结果缓存 {presets, recentCwds}
  termCwds: [],            // 新建窗口 Sheet 的工作目录全量候选（MRU、去重），供输入框实时筛选
  term: null,              // 当前终端页状态（openTerminal 建，closeTerminalPage 清）
  deepLinkTerminal: null,  // 通知深链带来的 terminalId（#t=...）
};

let bannerTimer = null;
// 横幅默认 5 秒后自动消失；带点按动作（onTap）或明确 sticky（如"正在新建…"进度）的横幅常驻，不自动消
function showBanner(text, onTap, sticky) {
  const b = $("banner");
  b.style.display = text ? "block" : "none";
  b.textContent = text || "";
  b.classList.toggle("action", Boolean(onTap));
  b.onclick = onTap || null;
  clearTimeout(bannerTimer);
  bannerTimer = null;
  if (text && !onTap && !sticky) {
    bannerTimer = setTimeout(() => showBanner(""), 5000);
  }
}

function isUnknownMethodError(err, method) {
  const msg = err?.message || String(err || "");
  return msg.includes(`未知方法: ${method}`) || msg.includes(`Unknown method: ${method}`);
}

// 轻量瞬时提示（如"再按一次返回退出"），自动淡出，不占布局
let toastTimer = null;
function showToast(text, ms = 1600) {
  const t = $("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms);
}

// 设置标题文本
function setTitle(text) {
  const h = $("title");
  h.firstChild.textContent = text;
}

// 上下文用量：常显标签已按需求移除，只留数据入口（记在 app.ctxPct，将来做逼近上限预警可用）
function setCtx(info) {
  const total = info?.total_token_usage?.total_tokens;
  const win = info?.model_context_window;
  if (!total || !win) return;
  app.ctxPct = Math.min(100, Math.round((total / win) * 100));
}

// 轮次结束后回填会话名（codex 首轮后才起名，"新会话"要变成真名）。防抖：快照回放只触发一次
function refreshTitle() {
  if (app.isViewer) return; // 观众无 sessions.list 权限；会话名来自 auth 的 sessionName
  if (app.titleTimer) clearTimeout(app.titleTimer);
  app.titleTimer = setTimeout(async () => {
    app.titleTimer = null;
    if (app.view !== "session" || !app.currentId) return;
    try {
      // 只需当前会话（刚跑完一轮、必在最近一页）的新名字，拉首页一页即可，不整份翻页。
      const res = await app.session.request("sessions.list", { limit: 150 });
      const sessions = res?.sessions ?? [];
      ingestSessions(sessions); // 并入统一表（含深链冷启动补底），供 sessionDirLabel/搜索
      updateStatusPill(); // 深链直进会话时 knownById 原本为空，此刻才能补出项目名
      const s = app.knownById.get(app.currentId);
      const name = s?.name || s?.preview?.slice(0, 24);
      if (name && name !== app.currentTitle) {
        app.currentTitle = name;
        app.sessionNames.set(app.currentId, name);
        setTitle(name);
        localStorage.setItem("czr-last", JSON.stringify({ id: app.currentId, title: name }));
      }
    } catch {}
  }, 600);
}

function relTime(sec) {
  if (!sec) return "";
  const d = Date.now() / 1000 - sec;
  if (d < 60) return t("time.justnow");
  if (d < 3600) return t("time.minago", Math.floor(d / 60));
  if (d < 86400) return t("time.hourago", Math.floor(d / 3600));
  if (d < 7 * 86400) return t("time.dayago", Math.floor(d / 86400));
  return new Date(sec * 1000).toLocaleDateString();
}

// 智能滚动：只在用户本就贴近底部时跟随新内容，翻历史不被打断；
// 离底时显示「↓」浮动按钮
function nearBottom() {
  return window.innerHeight + window.scrollY >= document.body.scrollHeight - 160;
}
function scrollToBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}
function updateJump() {
  $("jump").classList.toggle("show", app.view === "session" && !nearBottom());
}

// —— 状态胶囊 + 分层连接诊断 ——
// 胶囊只显示"最深的断层"；点开弹层看三层各自的状态与建议
// 局域网直连的 WiFi 图标：内联 SVG（stroke: currentColor）随所在文本的色系走——
// emoji 做不到跟色，且 🛜 是 2023 年才入 Unicode 的字形，旧设备会显示方框
function wifiIcon() {
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", "none");
  svg.setAttribute("stroke", "currentColor");
  svg.setAttribute("stroke-width", "2.4");
  svg.setAttribute("stroke-linecap", "round");
  svg.setAttribute("aria-hidden", "true");
  svg.classList.add("wifiico");
  for (const d of [
    "M2 8.8a15 15 0 0 1 20 0",
    "M5.5 12.6a10 10 0 0 1 13 0",
    "M9 16.4a5 5 0 0 1 6 0",
    "M12 20h.01",
  ]) {
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", d);
    svg.appendChild(path);
  }
  return svg;
}

function updateStatusPill() {
  if (app.viewerEnded) return; // 围观终态：pill 固定「已结束」，不被连接层状态覆盖
  const el = $("status");
  el.className = "";
  // 直连活着时电脑必然可达：中继层的断连/离线信号不该盖过它（外网抖断、直连照常干活
  // 正是直连的价值场景）。直连时左侧绿点换成绿色 WiFi 图标，"当前走哪条路"肉眼可见。
  if (net.direct || net.daemon === true) {
    if (!net.direct && net.link === "connecting") {
      el.textContent = t("status.connecting");
    } else if (!net.direct && net.link === "down") {
      el.textContent = t("status.reconnecting");
      el.className = "down";
    } else if (net.engine === "down") {
      el.textContent = t("status.codexrestart");
      el.className = "warn";
    } else {
      // 一切正常：首页副标题是电脑名；会话页对标官方 App 的「项目文件夹 · 机器名」
      const dir = sessionDirLabel();
      const pc = app.session?.info.name || t("status.connected");
      el.textContent = dir ? `${dir} · ${pc}` : pc;
      if (net.direct) el.prepend(wifiIcon());
      el.className = net.direct ? "online direct" : "online";
    }
  } else if (net.link === "connecting") {
    el.textContent = t("status.connecting");
  } else if (net.link === "down") {
    el.textContent = t("status.reconnecting");
    el.className = "down";
  } else if (net.daemon === false) {
    el.textContent = t("status.pcoffline");
    el.className = "down";
  } else {
    el.textContent = t("status.connecting");
  }
  // 离线时禁用发送并在占位符里说明，而不是发送后才报错。直连就绪即在线。
  const offline = !net.direct && (net.link !== "ok" || net.daemon === false);
  $("send").disabled = offline;
  $("input").placeholder = offline ? t("input.offline") : inputPh();
  if ($("diagsheet").classList.contains("open")) renderDiag();
}

// 会话页副标题的项目名：当前会话 cwd 的目录名。托管聊天目录（目录名=聊天名，
// 非用户项目）不展示，避免和标题重复
function sessionDirLabel() {
  if (app.view !== "session" || !app.currentId) return "";
  if (isDraftSession()) {
    const cwd = app.draft?.cwd || "";
    return cwd && !isManagedChatDir(cwd) ? (cwd.split(/[\\/]/).pop() || "") : "";
  }
  const s = app.knownById.get(app.currentId);
  const cwd = s?.cwd || "";
  if (!cwd || isManagedChatDir(cwd)) return "";
  return cwd.split(/[\\/]/).pop() || "";
}

function diagPoint(state, title, sub, linkAfter = "") {
  return { state, title, sub, linkAfter };
}

function diagLinkState(left, right) {
  if (left.state === "down" || right.state === "down") return "down";
  if (left.state === "warn" || right.state === "warn") return "warn";
  if (left.state === "ok" && right.state === "ok") return "ok";
  return "";
}

function diagChain(items) {
  const chain = document.createElement("div");
  chain.className = "diagchain";
  const steps = document.createElement("div");
  steps.className = items.length === 2 ? "diagsteps two" : "diagsteps";
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const link = i < items.length - 1 ? (item.linkAfter || diagLinkState(item, items[i + 1])) : "";
    const step = document.createElement("div");
    step.className = `diagstep${link ? ` link-${link}` : ""}`;
    const dot = document.createElement("span");
    dot.className = `diagdot${item.state ? ` ${item.state}` : ""}`;
    dot.setAttribute("aria-hidden", "true");
    step.appendChild(dot);
    steps.appendChild(step);
  }
  const labels = document.createElement("div");
  labels.className = items.length === 2 ? "diaglabels two" : "diaglabels";
  for (const item of items) {
    const label = document.createElement("div");
    label.className = "diaglabel";
    const title = document.createElement("div");
    title.className = "diagtitle";
    title.textContent = item.title;
    const sub = document.createElement("div");
    sub.className = "diagsub";
    sub.textContent = item.sub;
    label.append(title, sub);
    labels.appendChild(label);
  }
  chain.append(steps, labels);
  return chain;
}

// 诊断页的补充信息行（链路图下方）：标题 + 说明，可选 WiFi 图标
function diagInfoRow(titleText, subText, withIcon) {
  const row = document.createElement("div");
  row.className = "diaglabel";
  const title = document.createElement("div");
  title.className = "diagtitle";
  title.textContent = titleText;
  if (withIcon) title.prepend(wifiIcon());
  const sub = document.createElement("div");
  sub.className = "diagsub";
  sub.textContent = subText;
  row.append(title, sub);
  return row;
}

function renderDiag() {
  const box = $("diaglist");
  box.innerHTML = "";
  const relayHost = (app.session?.info.relay || "").replace(/^wss?:\/\//, "").replace(/[/?#].*$/, "");
  const pcName = app.session?.info.name || t("diag.pc");

  // 直连态：链路如实画成 手机 ↔ 电脑 两点直达（数据面不经中继）。
  if (net.direct) {
    let pcState = "ok";
    let pcSub = `${pcName} · ${t("diag.codex_ok")}`;
    if (net.engine === "down") {
      pcState = "warn";
      pcSub = `${pcName} · ${t("diag.codex_down")}`;
    } else if (net.engine !== "ok") {
      pcSub = `${pcName} · ${t("diag.codex_oldremote")}`;
    }
    box.appendChild(diagChain([
      diagPoint("ok", t("diag.phone"), t("diag.phone_direct_sub"), "ok"),
      diagPoint(pcState, t("diag.pc"), pcSub),
    ]));
    box.appendChild(diagInfoRow(t("diag.direct"), t("diag.direct_on"), true));
    return;
  }
  const phoneRelayLink = net.link === "ok" ? "ok" : net.link === "down" ? "down" : "";
  const relayPcLink = net.link !== "ok" ? "" : net.daemon === true ? "ok" : net.daemon === false ? "down" : "";
  let phoneState = "";
  let phoneSub = t("status.connecting");
  let relayState = "";
  let relaySub = t("diag.waiting");
  let pcState = "";
  let pcSub = t("diag.codex_unknown");

  // 1. 手机：浏览器到中继的连接
  if (net.link === "ok") {
    phoneState = "ok";
    phoneSub = t("diag.connected_host", relayHost);
  } else if (net.link === "connecting") {
    phoneSub = t("status.connecting");
  } else {
    phoneState = "down";
    phoneSub = t("diag.phone_relay_down");
  }

  // 2. 中继：手机连上中继后，中继本身可达
  if (net.link !== "ok") {
    relaySub = t("diag.unknown_relay");
  } else {
    relayState = "ok";
    relaySub = t("diag.connected_host", relayHost);
  }

  // 3. 电脑：电脑 Remote 与本机 ChatGPT/Claude 引擎状态
  if (net.link !== "ok") {
    pcSub = t("diag.codex_unknown");
  } else if (net.daemon === true) {
    if (net.engine === "down") {
      pcState = "warn";
      pcSub = `${pcName} · ${t("diag.codex_down")}`;
    } else if (net.engine === "ok") {
      pcState = "ok";
      pcSub = `${pcName} · ${t("diag.codex_ok")}`;
    } else {
      // 已连上且鉴权成功，但电脑端 Remote 较旧、没带运行状态字段——程序其实在跑
      pcState = "ok";
      pcSub = `${pcName} · ${t("diag.codex_oldremote")}`;
    }
  } else if (net.daemon === false) {
    const seen = net.lastSeen ? t("diag.lastseen", relTime(net.lastSeen / 1000)) : "";
    pcState = "down";
    pcSub = t("diag.pc_offline_detail", seen);
  } else {
    pcSub = t("diag.waiting");
  }

  box.appendChild(diagChain([
    diagPoint(phoneState, t("diag.phone"), phoneSub, phoneRelayLink),
    diagPoint(relayState, t("diag.relay"), relaySub, relayPcLink),
    diagPoint(pcState, t("diag.pc"), pcSub),
  ]));

  // 局域网直连状态（走到这里必然未建立——建立态在上方走两点直达分支）。
  // 观众恒走中继，不展示此行。
  if (!app.isViewer && app.session && !app.session.info.viewer) {
    box.appendChild(diagInfoRow(t("diag.direct"), t("diag.direct_off")));
  }
}

function openDiag() {
  if (!app.session) return; // 未配对时无从诊断
  renderDiag();
  $("diagsheet").classList.add("open");
}

// —— 列表页：状态看板 ——
function sessionRow(s, inproj = false) {
  // running（daemon 正在驱动，权威）与 active（文件近期有写入的启发式）分开呈现：
  // 前者是"运行中"+脉冲，后者是弱化的"桌面活动"——别把刚写过文件的会话谎报成在跑
  const act = !s.running && activeFresh(s);
  const row = document.createElement("div");
  row.className = `row${s.approvals ? " appr" : ""}${inproj ? " inproj" : ""}`;
  const dot = document.createElement("span");
  dot.className = `dot${s.approvals ? " appr" : s.running ? " run" : act ? " act" : ""}`;
  const main = document.createElement("div");
  main.className = "rowmain";
  const title = document.createElement("div");
  title.className = "rowtitle";
  title.textContent = s.name || s.preview || t("session.untitled");
  main.appendChild(title);
  // 对标 ChatGPT 官方 App：列表行只留标题。摘要不显示（也不再走网络，见 daemon 侧），
  // 时间不显示（列表本就按更新时间新→旧排）。仅在有状态或目录信息时补一行小字。
  const sub = document.createElement("div");
  sub.className = "rowsub";
  if (s.approvals) {
    const st = document.createElement("span");
    st.className = "st appr";
    st.textContent = t("row.waiting");
    sub.appendChild(st);
  } else if (s.running) {
    const st = document.createElement("span");
    st.className = "st run";
    st.textContent = t("row.running");
    sub.appendChild(st);
  } else if (act) {
    const st = document.createElement("span");
    st.className = "st act";
    st.textContent = t("row.active");
    sub.appendChild(st);
  }
  // 项目分组里目录是组头信息，行内不再重复；托管的每聊天目录名（new-chat-7…）无意义也不显示。
  // split 用 [\\/] 兼容 Windows 反斜杠路径，否则会把整条 C:\…\x 当成 basename。
  const dir = (inproj || isManagedChatDir(s.cwd)) ? "" : (s.cwd || "").split(/[\\/]/).pop() || s.cwd || "";
  if (dir) sub.appendChild(document.createTextNode(`${sub.childNodes.length ? " · " : ""}${dir}`));
  if (sub.childNodes.length) main.appendChild(sub);
  row.append(dot, main);
  row.onclick = () => openSession(s.id, s.name || s.preview?.slice(0, 24) || t("session.fallback"));
  return row;
}

// 看板：需要注意的事置顶（审批 > 运行），其余按组织方式排布（按项目 / 时间线）
// 会话是否命中搜索词（名称/摘要/目录）。q 为空即全部命中。
function sessionMatches(s, q) {
  if (!q) return true;
  return `${s.name ?? ""} ${s.preview ?? ""} ${s.cwd ?? ""}`.toLowerCase().includes(q);
}

// 首页看板。数据源为「项目优先」新模型（loadHome 填充）：需要注意的事从 knownById 挑，
// 项目从 app.projects，项目内会话按需懒加载。参数已废弃——旧调用点仍传 app.lastSessions，
// 无害忽略；一律读 app 状态。
function renderList() {
  const q = app.filter.trim().toLowerCase();
  const list = $("list");
  list.innerHTML = "";

  // 需要注意的事：审批 / 运行 / 活跃（activeFresh 本地衰减，过期不再算）。daemon 的
  // projects.list 保证运行/待审批的会话一定进了 knownById（attention 数组），故这里从
  // knownById 全量挑即完整，跨来源稳健。
  const attention = [...app.knownById.values()].filter((s) => s.approvals || s.running || activeFresh(s));
  const attnIds = new Set(attention.map((s) => s.id));

  // 大字状态行只在有事发生时出现（对标官方的安静首页）。三档分开数：
  // 审批 > 运行中（daemon 驱动的任务）> 桌面活动（文件活跃启发式，不冒充"任务在跑"）
  const apprN = attention.filter((s) => s.approvals).length;
  const runN = attention.filter((s) => !s.approvals && s.running).length;
  const actN = attention.length - apprN - runN;
  if (apprN || runN || actN) {
    const headline = document.createElement("div");
    headline.id = "headline";
    if (apprN) {
      headline.className = "warn";
      headline.textContent = t("home.approvalsN", apprN);
    } else if (runN) {
      headline.textContent = t("home.runningN", runN);
    } else {
      headline.textContent = t("home.activeN", actN);
    }
    // 副行报下一档：有审批时报运行数，没审批有运行时报桌面活动数
    const subText = apprN && runN ? t("home.alsoRunningN", runN)
      : (apprN || runN) && actN ? t("home.alsoActiveN", actN)
      : "";
    if (subText) {
      const sub = document.createElement("span");
      sub.className = "sub";
      sub.textContent = subText;
      headline.appendChild(sub);
    }
    list.appendChild(headline);
  }

  const attnVis = attention.filter((s) => sessionMatches(s, q));
  attnVis.sort((a, b) => (b.approvals || 0) - (a.approvals || 0) || (b.updatedAt || 0) - (a.updatedAt || 0));
  if (attnVis.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = t("sect.active");
    list.appendChild(h);
    for (const s of attnVis) list.appendChild(sessionRow(s));
  }

  if (app.organize === "proj") renderProjects(list, attnIds, q);
  else renderTimeline(list, attnIds, q);

  // 空态：列表里既无会话行也无项目头
  if (!list.querySelector(".row, .proj, .sect-toggle")) {
    const n = document.createElement("div");
    n.className = "notice";
    n.textContent = q ? t("list.nomatch") : t("list.empty");
    list.appendChild(n);
  }

  scheduleActiveRecheck(); // 有"桌面活动"行时到期复核，没有则自动歇手
}

// 时间线模式：懒加载分页（底部「加载更多」），不再一次性拉全量。
function renderTimeline(list, attnIds, q) {
  const tl = app.timeline;
  const last = JSON.parse(localStorage.getItem("czr-last") || "null");
  const rows = tl.sessions.filter((s) => !attnIds.has(s.id) && sessionMatches(s, q));
  const h = document.createElement("div");
  h.className = "secthead";
  h.textContent = t("sect.recent");
  list.appendChild(h);
  const lastSession = last && !attnIds.has(last.id) ? rows.find((s) => s.id === last.id) : null;
  if (lastSession) {
    const r = sessionRow(lastSession);
    r.querySelector(".rowsub")?.prepend(document.createTextNode(t("row.lastviewed")));
    list.appendChild(r);
  }
  for (const s of rows) {
    if (lastSession && s.id === lastSession.id) continue;
    list.appendChild(sessionRow(s));
  }
  if (!tl.done) list.appendChild(loadMoreRow(() => loadMoreTimeline()));
  // 首次进入时间线且尚未加载：拉第一页
  if (!tl.sessions.length && !tl.loading && !tl.done) loadMoreTimeline();
}

// 「加载更多」行：点击触发 fn（项目内翻页 / 时间线翻页共用）
function loadMoreRow(fn) {
  const d = document.createElement("div");
  d.className = "notice loadmore";
  d.textContent = t("list.loadmore");
  d.onclick = fn;
  return d;
}

// —— 外观：未手动选择时跟随系统，菜单只展示 light / dark 两档（头部有防闪烁的提前应用）——
function getTheme() {
  const t = localStorage.getItem("czr-theme");
  return t === "light" || t === "dark" ? t : "auto";
}

function getSystemTheme() {
  return matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

function getEffectiveTheme() {
  const t = getTheme();
  return t === "auto" ? getSystemTheme() : t;
}

function applyTheme(mode) {
  if (mode === "light" || mode === "dark") {
    localStorage.setItem("czr-theme", mode);
    document.documentElement.dataset.theme = mode;
  } else {
    localStorage.removeItem("czr-theme");
    delete document.documentElement.dataset.theme;
  }
  // 状态栏/浏览器 UI 跟着走：手动锁定时两个 media meta 都写成锁定色，auto 恢复各自默认
  const dark = "#171b22", light = "#ffffff";
  $("mtcdark").content = mode === "light" ? light : dark;
  $("mtclight").content = mode === "dark" ? dark : light;
}

function updateThemeChecks() {
  const t = getEffectiveTheme();
  setMenuOption("th-light", t === "light", "ckthlight");
  setMenuOption("th-dark", t === "dark", "ckthdark");
}
