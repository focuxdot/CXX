// —— 快捷指令：纯前端偏好，一份普通文本列表，不扩展 daemon 协议 ——
// 语言只决定"从没保存过时"给哪套默认项（可以/继续 vs OK/Continue）；用户一旦编辑保存，
// 就是与语言无关的一份列表，切换界面语言不再改动它。
const QUICK_COMMANDS_KEY = "czr-quick-commands";
const QUICK_COMMANDS_MAX = 8;
const QUICK_COMMANDS_TEXT_MAX = 80;
let quickCommandsDraft = null;

function newQuickCommandId() {
  return globalThis.crypto?.randomUUID?.() || `quick-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
}

// 默认项随当前语言给几个固定建议——只在本地无存档时使用，且未保存前不落盘。
function defaultQuickCommands() {
  const items = LANG === "zh"
    ? [{ id: "ok", text: "可以" }, { id: "continue", text: "继续" }]
    : [{ id: "ok", text: "OK" }, { id: "continue", text: "Continue" }];
  return { version: 2, enabled: false, items };
}

// 兼容旧的 {zh,en} 成对结构：合并成单一 text（优先当前语言，回落另一语言）。
function quickItemText(item) {
  if (typeof item?.text === "string") return item.text;
  if (typeof item?.[LANG] === "string" && item[LANG].trim()) return item[LANG];
  const other = LANG === "zh" ? "en" : "zh";
  if (typeof item?.[other] === "string") return item[other];
  return "";
}

function copyQuickCommands(value) {
  return {
    version: 2,
    enabled: !!value?.enabled,
    items: (value?.items || []).map((item) => ({
      id: typeof item?.id === "string" && item.id ? item.id : newQuickCommandId(),
      text: quickItemText(item),
    })),
  };
}

function loadQuickCommands() {
  try {
    const saved = JSON.parse(localStorage.getItem(QUICK_COMMANDS_KEY) || "null");
    if (saved && Array.isArray(saved.items)) return copyQuickCommands(saved);
  } catch {}
  return copyQuickCommands(defaultQuickCommands());
}

function saveQuickCommands(value) {
  localStorage.setItem(QUICK_COMMANDS_KEY, JSON.stringify(copyQuickCommands(value)));
}

function quickCommandText(item) {
  return String(item?.text || "").trim();
}

function renderQuickCommandBar() {
  const bar = $("quickcommandbar");
  if (!bar) return;
  bar.innerHTML = "";
  const settings = loadQuickCommands();
  const show = !app?.isViewer && app?.view === "session" && settings.enabled;
  bar.classList.toggle("on", show && settings.items.length > 0);
  if (!show) return;
  for (const item of settings.items) {
    const text = quickCommandText(item);
    if (!text) continue;
    const button = document.createElement("button");
    button.type = "button";
    button.className = "quickcommand";
    button.textContent = text;
    button.title = text;
    button.setAttribute("aria-label", t("quick.send_aria", text));
    button.onclick = () => { sendQuickCommand(text).catch(() => {}); };
    bar.appendChild(button);
  }
  bar.classList.toggle("on", bar.childElementCount > 0);
}

async function sendQuickCommand(text) {
  const command = String(text || "").trim();
  if (!command || app.isViewer || app.view !== "session" || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner(t("banner.offline_send"));
    return;
  }
  // 不借 input/sendMessage：用户正在编辑的草稿和附件必须原样保留。
  if (app.running && app.driver === "daemon") enqueue(command, []);
  else await dispatch(command, []);
}

function renderQuickCommandsSheet() {
  const list = $("quickcommandlist");
  const enabled = $("quickcommandsenabled");
  const error = $("quickcommanderror");
  if (!quickCommandsDraft || !list || !enabled || !error) return;
  enabled.checked = quickCommandsDraft.enabled;
  error.textContent = "";
  list.innerHTML = "";
  const count = $("quickcommandcount");
  if (count) count.textContent = `${quickCommandsDraft.items.length}/${QUICK_COMMANDS_MAX}`;
  if (!quickCommandsDraft.items.length) {
    const empty = document.createElement("div");
    empty.className = "quickempty";
    empty.textContent = t("quick.empty");
    list.appendChild(empty);
  }
  quickCommandsDraft.items.forEach((item, index) => {
    const row = document.createElement("label");
    row.className = "quickitem";
    const field = document.createElement("div");
    field.className = "quickfield";
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = QUICK_COMMANDS_TEXT_MAX;
    input.value = item.text || "";
    input.placeholder = t("quick.placeholder");
    const counter = document.createElement("span");
    counter.className = "qcount";
    const paint = () => {
      counter.textContent = `${input.value.length}/${QUICK_COMMANDS_TEXT_MAX}`;
      counter.classList.toggle("warn", input.value.length >= QUICK_COMMANDS_TEXT_MAX);
    };
    paint();
    input.addEventListener("input", () => { quickCommandsDraft.items[index].text = input.value; paint(); });
    field.append(input, counter);
    const remove = document.createElement("button");
    remove.type = "button";
    remove.className = "quickdelete";
    remove.setAttribute("aria-label", t("quick.remove"));
    remove.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14M10 11v6M14 11v6"/></svg>';
    remove.onclick = () => {
      quickCommandsDraft.items.splice(index, 1);
      renderQuickCommandsSheet();
    };
    row.append(field, remove);
    list.appendChild(row);
  });
  $("quickcommandadd").disabled = quickCommandsDraft.items.length >= QUICK_COMMANDS_MAX;
}

function openQuickCommandsSheet() {
  quickCommandsDraft = loadQuickCommands();
  renderQuickCommandsSheet();
  $("quickcommandssheet").classList.add("open");
}

function closeQuickCommandsSheet() {
  quickCommandsDraft = null;
  $("quickcommandssheet").classList.remove("open");
}

function saveQuickCommandsSheet() {
  if (!quickCommandsDraft) return;
  // 一份普通列表：留有内容的条目，空白项直接忽略（不再当作错误）。
  const items = quickCommandsDraft.items
    .map((item) => ({ id: item.id || newQuickCommandId(), text: String(item.text || "").trim() }))
    .filter((item) => item.text);
  const clean = copyQuickCommands({ version: 2, enabled: quickCommandsDraft.enabled, items });
  try {
    saveQuickCommands(clean);
  } catch {
    $("quickcommanderror").textContent = t("quick.save_failed");
    return;
  }
  closeQuickCommandsSheet();
  renderQuickCommandBar();
}

// 归一路径分隔符为 /、去尾分隔符，让同一套规则同时匹配 Windows(\) 与 POSIX(/)。
function normSep(cwd) {
  return (cwd || "").trim().replace(/[\\/]+$/, "").replace(/\\/g, "/");
}
// 桌面版 ChatGPT/codex 给每个新聊天在 <家>/Documents/Codex/<日期>/<聊天名> 建的托管目录：
// 目录名是聊天名（new-chat-7、csv-markdown…）而非用户项目，既不该进"项目"，
// 行内副标题也不该重复展示这个目录名。
function isManagedChatDir(cwd) {
  return /(?:^|\/)Documents\/Codex(?:\/|$)/i.test(normSep(cwd));
}

// "项目"只留真正的工作目录，其余算散聊天：
// - 桌面版 ChatGPT/codex 托管的每聊天目录（见 isManagedChatDir）
// - 家目录本身、桌面/文档/下载、临时目录、盘符根/根目录
// 分隔符与大小写均归一，兼容 Windows(C:\Users\…\Documents\Codex) 与 POSIX(/Users、/home)。
function isProjectDir(cwd) {
  const p = normSep(cwd);
  if (!p || p === "/" || p === "/root" || /^[a-z]:$/i.test(p)) return false; // 根 / 盘符根
  if (isManagedChatDir(p)) return false;                                     // Documents/Codex 托管目录
  if (/^(?:[a-z]:)?\/(?:Users|home)\/[^/]+$/i.test(p)) return false;         // 家目录本身
  if (/^(?:[a-z]:)?\/(?:Users|home)\/[^/]+\/(?:Desktop|Documents|Downloads)$/i.test(p)) return false;
  if (/^(?:\/private)?\/tmp(?:\/|$)/i.test(p) || /^\/var(?:\/|$)/i.test(p)) return false; // POSIX 临时
  if (/\/AppData\/Local\/Temp(?:\/|$)/i.test(p) || /^[a-z]:\/Windows\/Temp(?:\/|$)/i.test(p)) return false; // Windows 临时
  return true;
}

function renderProjects(list, attnIds, q) {
  // 项目来自 daemon 聚合（app.projects，一帧全量），不再从已加载会话现推——故与会话总量
  // 无关也能列全所有项目。每个项目的会话在展开时才懒加载（sessions.list{cwd}，恒定有界）。
  const projs = app.projects.filter((p) => isProjectDir(p.cwd) && (!q || projMatches(p, q)));
  if (projs.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = t("sect.projects");
    list.appendChild(h);
  }
  for (const p of projs) {
    const norm = normSep(p.cwd);
    const closed = !app.expanded.has(norm);
    const head = document.createElement("div");
    head.className = "proj";
    if (p.approvals) head.classList.add("appr"); // 项目内有待审批：高亮（对齐会话行）
    head.innerHTML = FOLDER_SVG;
    const name = document.createElement("span");
    name.className = "pname";
    name.textContent = p.cwd.split(/[\\/]/).pop() || p.cwd;
    const meta = document.createElement("span");
    meta.className = "pmeta";
    // 徽标：待审批 > 运行 > 会话数
    if (p.approvals) meta.textContent = t("proj.badge.appr", p.approvals);
    else if (p.runningCount) meta.textContent = t("proj.badge.run", p.runningCount);
    else meta.textContent = String(p.count);
    const chev = document.createElement("span");
    chev.className = "pchev";
    chev.textContent = "›"; // 统一角括号；展开态旋转 90°（取代 ▸/▾ 双字形）
    chev.style.transform = closed ? "" : "rotate(90deg)";
    head.append(name, meta, chev);
    const actions = document.createElement("span");
    actions.className = "pactions";
    const add = document.createElement("button");
    add.className = "pact pnew";
    add.innerHTML = COMPOSE_SVG;
    add.setAttribute("aria-label", t("proj.newin", name.textContent));
    add.onclick = (e) => {
      e.stopPropagation();
      if (net.link !== "ok" || net.daemon === false) { showBanner(t("banner.offline_newsession")); return; }
      openDraftSession(p.cwd);
    };
    actions.append(add);
    head.appendChild(actions);
    setupProjectRowActions(head, p, name.textContent, norm);
    list.appendChild(head);
    if (!closed) {
      const cache = app.projSessions.get(norm);
      const rows = (cache?.sessions || []).filter((s) => !attnIds.has(s.id) && sessionMatches(s, q));
      for (const s of rows) list.appendChild(sessionRow(s, true));
      if ((cache?.loading || app.prefetching) && !rows.length) list.appendChild(loadingRow());
      else if (cache?.nextCursor) list.appendChild(loadMoreRow(() => ensureProjectLoaded(norm, p.cwd, { more: true })));
    }
  }
  // 散聊天：headSessions 里的非项目目录会话（近端一页），去重 attention。
  // 对标桌面 ChatGPT：「对话」整段可折叠，且和项目一样默认折叠（搜索时强制展开以露出命中）。
  const chats = app.headSessions.filter((s) => !isProjectDir(s.cwd) && !attnIds.has(s.id) && sessionMatches(s, q));
  if (chats.length) {
    const closed = !app.expanded.has(CHATS_KEY) && !q;
    const h = document.createElement("div");
    h.className = "secthead sect-toggle";
    const label = document.createElement("span");
    label.textContent = t("sect.chats"); // 与桌面版侧栏的分区文案一致
    const chev = document.createElement("span");
    chev.className = "pchev";
    chev.textContent = "›"; // 统一角括号；展开态旋转 90°（取代 ▸/▾ 双字形）
    chev.style.transform = closed ? "" : "rotate(90deg)";
    h.append(label, chev);
    h.onclick = () => toggleExpandKey(CHATS_KEY);
    list.appendChild(h);
    if (!closed) for (const s of chats) list.appendChild(sessionRow(s, true));
  }
}

function openProjectActions(project) {
  if (!project?.cwd || app.isViewer) return;
  const name = project.name || project.cwd.split(/[\\/]/).pop() || project.cwd;
  projectActionTarget = { cwd: project.cwd, name };
  $("projectsheethead").textContent = name;
  $("projectarchive").querySelector(".dico").innerHTML = ARCHIVE_SVG;
  $("projectsheet").classList.add("open");
}

function closeProjectActions() {
  $("projectsheet").classList.remove("open");
  projectActionTarget = null;
}

function setupProjectRowActions(head, project, name, norm) {
  let pressTimer = null;
  let startX = 0;
  let startY = 0;
  let suppressClickUntil = 0;
  const clearPress = () => {
    if (pressTimer) clearTimeout(pressTimer);
    pressTimer = null;
  };
  const openHiddenActions = () => {
    suppressClickUntil = Date.now() + 1600;
    clearPress();
    openProjectActions({ cwd: project.cwd, name });
  };

  head.oncontextmenu = (e) => {
    if (e.target.closest("button")) return;
    e.preventDefault();
    openHiddenActions();
  };
  head.onpointerdown = (e) => {
    if (e.target.closest("button") || e.button !== 0 || e.pointerType === "mouse") return;
    startX = e.clientX;
    startY = e.clientY;
    clearPress();
    pressTimer = setTimeout(openHiddenActions, 650);
  };
  head.onpointermove = (e) => {
    if (!pressTimer) return;
    if (Math.hypot(e.clientX - startX, e.clientY - startY) > 10) clearPress();
  };
  head.onpointerup = clearPress;
  head.onpointercancel = clearPress;
  head.onpointerleave = clearPress;
  head.onclick = (e) => {
    if (Date.now() < suppressClickUntil) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    toggleProject(norm, project.cwd);
  };
}

// 「对话」段的折叠态 key（存进 app.expanded；用不会与真实 cwd 冲突的前缀）
const CHATS_KEY = "::chats";

// 折叠态通用切换（项目用 cwd、对话用固定 key，共用 app.expanded 内存态，不持久化）
function toggleExpandKey(key) {
  if (app.expanded.has(key)) app.expanded.delete(key);
  else app.expanded.add(key);
  renderList();
}

// 项目命中搜索：名称/摘要/目录，或已加载的组内会话命中
function projMatches(p, q) {
  if (`${p.latestName ?? ""} ${p.latestPreview ?? ""} ${p.cwd}`.toLowerCase().includes(q)) return true;
  const cache = app.projSessions.get(normSep(p.cwd));
  return !!cache?.sessions.some((s) => sessionMatches(s, q));
}

function loadingRow() {
  const d = document.createElement("div");
  d.className = "notice";
  d.textContent = t("common.loading");
  return d;
}

// 展开/折叠项目：展开即懒加载它的会话
function toggleProject(norm, cwd) {
  if (app.expanded.has(norm)) app.expanded.delete(norm);
  else { app.expanded.add(norm); ensureProjectLoaded(norm, cwd); }
  renderList();
}

// 懒加载某项目的会话（sessions.list 带 cwd 过滤，只拉该项目、恒定有界）。
// more=继续下一页；refresh=从头重拉（刷新时保持已展开项目内容）。
async function ensureProjectLoaded(norm, cwd, { more = false, refresh = false } = {}) {
  if (app.prefetching && !more && !refresh) return; // 后台全量预取中：预取会填充，别重复按需拉
  let c = app.projSessions.get(norm);
  if (!c) { c = { sessions: [], nextCursor: null, done: false, loading: false }; app.projSessions.set(norm, c); }
  if (c.loading) return;
  if (refresh) { c.sessions = []; c.nextCursor = null; c.done = false; }
  else if (!more && c.sessions.length) return; // 已加载首页且非翻页：无需再拉
  if (c.done && !more) return;
  c.loading = true;
  if (app.view === "list") renderList();
  const gen = app.listGen;
  try {
    const res = await app.session.request("sessions.list", { cwd, cursor: c.nextCursor ?? null, limit: 2000 });
    if (gen !== app.listGen) return; // 数据空间已切换（换电脑/换 agent）：旧 agent 的会话不入新模型
    const batch = res?.sessions ?? [];
    const seen = new Set(c.sessions.map((s) => s.id));
    for (const s of batch) if (s?.id && !seen.has(s.id)) c.sessions.push(s);
    c.sessions.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    c.nextCursor = res?.nextCursor ?? null;
    c.done = !c.nextCursor;
    ingestSessions(batch);
  } catch {
    // 保留已加载内容；用户可再点展开/加载更多重试
  } finally {
    c.loading = false;
    if (app.view === "list") renderList();
  }
}

// 首页渲染后台全量预取：把所有会话按批（1000/批，稳过 15s 超时）拉下来、按项目分组，
// 全部成功后一次性提交进 per-project 缓存并标记 done——这样展开项目即「已在内存」秒开，
// 而不是点开才拉。与首页初次渲染解耦、不阻塞；失败/超时不提交，展开时按需拉兜底。
// 分批用 1000（非 2000）：单请求更稳地压在 15s 请求超时内，后台多翻几次无所谓。
async function prefetchAllProjects() {
  if (app.prefetching) return;
  if (app.prefetchAt && Date.now() - app.prefetchAt < 20000) return; // 20s 内不重复全量预取
  app.prefetching = true;
  const gen = app.listGen; // 数据空间代次：切电脑/切 agent 后本次预取作废，不混装两个空间的会话
  if (app.view === "list") renderList(); // 展开中的空项目立即显示「加载中」
  try {
    const grouped = new Map(); // norm -> {sessions, seen}
    let cursor = null;
    for (let guard = 0; guard < 120; guard++) { // 兜底上限 120*1000，防跑飞
      let res;
      try {
        res = await app.session.request("sessions.list", cursor ? { cursor, limit: 1000 } : { limit: 1000 });
      } catch { return; } // 超时/断网：不提交，展开时按需拉兜底（finally 会复位标志）
      if (gen !== app.listGen) return; // 已切换：前几页属旧空间，整批放弃（finally 会补跑新空间的预取）
      const batch = res?.sessions ?? [];
      ingestSessions(batch);
      for (const s of batch) {
        if (!s?.id) continue;
        const norm = normSep(s.cwd);
        let g = grouped.get(norm);
        if (!g) { g = { sessions: [], seen: new Set() }; grouped.set(norm, g); }
        if (!g.seen.has(s.id)) { g.seen.add(s.id); g.sessions.push(s); }
      }
      cursor = res?.nextCursor ?? null;
      if (!cursor) break;
    }
    // 全量成功：提交进缓存并标记 done（展开秒开、不再触发网络）。覆盖既有按需缓存无妨——同样完整。
    for (const [norm, g] of grouped) {
      g.sessions.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      app.projSessions.set(norm, { sessions: g.sessions, nextCursor: null, done: true, loading: false });
    }
    if (app.view === "list") renderList();
  } finally {
    app.prefetching = false;
    if (gen === app.listGen) {
      app.prefetchAt = Date.now();
    } else {
      // 本次占位期间新空间的预取请求被 prefetching 闸掉了：立即替它补跑
      // （prefetchAt 已被 resetListModel 归零，不会撞 20s 节流）
      prefetchAllProjects();
    }
  }
}

// 时间线模式翻页（底部「加载更多」触发；无 cwd，按更新时间全量分页）
async function loadMoreTimeline() {
  const tl = app.timeline;
  if (tl.loading || tl.done) return;
  tl.loading = true;
  const gen = app.listGen;
  try {
    const res = await app.session.request("sessions.list", { cursor: tl.cursor ?? null, limit: 2000 });
    if (gen !== app.listGen) return; // 数据空间已切换：旧 agent 的会话不入新模型
    const batch = res?.sessions ?? [];
    const seen = new Set(tl.sessions.map((s) => s.id));
    for (const s of batch) if (s?.id && !seen.has(s.id)) tl.sessions.push(s);
    tl.sessions.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    tl.cursor = res?.nextCursor ?? null;
    tl.done = !tl.cursor;
    ingestSessions(batch);
  } catch {
    // 忽略；用户可再点加载更多
  } finally {
    tl.loading = false;
    if (app.view === "list" && app.organize === "time") renderList();
  }
}

// 分页拉取全部会话：单帧受 relay 256KiB 限制装不下上千条，改为按游标翻页累计
// （每页约 100 条 ≈ 65KiB，安全过帧）。累计后去重、按更新时间新→旧统一排序，
// 首页「按项目」聚合才能覆盖到全部项目（含很久没碰、排在很深处的）。
async function fetchAllSessions({ cap = 1500, maxPages = 20, onProgress } = {}) {
  const acc = [];
  const seen = new Set();
  let cursor = null;
  for (let page = 0; page < maxPages && acc.length < cap; page++) {
    const params = cursor ? { cursor, limit: 2000 } : { limit: 2000 };
    const res = await app.session.request("sessions.list", params);
    const batch = res?.sessions ?? [];
    for (const s of batch) {
      if (s?.id && !seen.has(s.id)) { seen.add(s.id); acc.push(s); }
    }
    cursor = res?.nextCursor ?? null;
    // 每批到达即回调一次（新→旧排序后）：一批约 250 条，逐批渲染让项目陆续出现，
    // 而不是空等到最后一次性刷出。
    if (onProgress) { acc.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)); onProgress(acc.slice()); }
    if (!cursor || batch.length === 0) break; // 没有下一批
  }
  acc.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  return acc;
}

// 各来源会话合并进统一表 knownById（就地合并保持引用稳定，看板补丁不丢），
// 同步会话名，并刷新 lastSessions 数组视图（散落消费点兜底）。
// seenAt：这批数据从 daemon 取到的时刻（快照回灌时传快照落盘时刻）。active 的本地衰减靠它。
function ingestSessions(arr, seenAt = Date.now()) {
  for (const s of arr || []) {
    if (!s?.id) continue;
    const ex = app.knownById.get(s.id);
    if (ex) Object.assign(ex, s, { seenAt });
    else app.knownById.set(s.id, { ...s, seenAt });
    app.sessionNames.set(s.id, s.name || s.preview?.slice(0, 24) || t("session.fallback"));
  }
  app.lastSessions = [...app.knownById.values()];
}

// active（文件近 60s 有写入）是 daemon 取数那一刻的快照布尔，之后没有任何翻转推送
// （桌面驱动的会话不产生 board.changed）——不衰减的话"运行中"会冻结在屏幕上。
// 按取数时刻本地过期，到期由 scheduleActiveRecheck 向 daemon 复核。
const ACTIVE_TTL = 60_000;
function activeFresh(s) {
  return !!s?.active && Date.now() - (s.seenAt || 0) < ACTIVE_TTL;
}

// 屏上还有"桌面活动"会话时，在最早到期时刻复核一次：文件仍在写 → 刷回 true 续亮；
// 桌面停了 → 自然熄灭。复核失败（断网等）降级为纯本地重绘，衰减照样生效。
let activeRecheckTimer = null;
function scheduleActiveRecheck() {
  clearTimeout(activeRecheckTimer);
  activeRecheckTimer = null;
  let due = Infinity;
  for (const s of app.knownById.values()) {
    if (s.approvals || s.running || !activeFresh(s)) continue;
    due = Math.min(due, (s.seenAt || 0) + ACTIVE_TTL);
  }
  if (due === Infinity) return;
  activeRecheckTimer = setTimeout(() => {
    activeRecheckTimer = null;
    if (app.view !== "list" || document.visibilityState !== "visible") return;
    refreshList().catch(() => renderList());
  }, Math.max(5_000, due - Date.now() + 1_000));
}

function removeSessionFromLists(id) {
  if (!id) return;
  app.knownById.delete(id);
  app.headSessions = app.headSessions.filter((s) => s.id !== id);
  app.timeline.sessions = app.timeline.sessions.filter((s) => s.id !== id);
  for (const c of app.projSessions.values()) {
    c.sessions = c.sessions.filter((s) => s.id !== id);
  }
  app.lastSessions = [...app.knownById.values()];
}

function removeSessionsForCwd(cwd) {
  const norm = normSep(cwd);
  if (!norm) return;
  for (const [id, s] of [...app.knownById.entries()]) {
    if (normSep(s.cwd) === norm) app.knownById.delete(id);
  }
  app.headSessions = app.headSessions.filter((s) => normSep(s.cwd) !== norm);
  app.timeline.sessions = app.timeline.sessions.filter((s) => normSep(s.cwd) !== norm);
  app.projects = app.projects.filter((p) => normSep(p.cwd) !== norm);
  app.projByCwd.delete(norm);
  app.projSessions.delete(norm);
  app.expanded.delete(norm);
  app.lastSessions = [...app.knownById.values()];
}

let confirmSheetResolve = null;
let confirmSheetFocus = null;

function closeConfirmSheet(result = false) {
  $("confirmsheet").classList.remove("open");
  const resolve = confirmSheetResolve;
  confirmSheetResolve = null;
  if (confirmSheetFocus?.focus) {
    try { confirmSheetFocus.focus({ preventScroll: true }); } catch {}
  }
  confirmSheetFocus = null;
  if (resolve) resolve(Boolean(result));
}

function openConfirmSheet({ title, body, okText, icon = ARCHIVE_SVG, danger = false } = {}) {
  if (confirmSheetResolve) closeConfirmSheet(false);
  confirmSheetFocus = document.activeElement;
  $("confirmtitle").textContent = title || "";
  $("confirmdesc").textContent = body || "";
  $("confirmdesc").style.display = body ? "" : "none";
  $("confirmok").textContent = okText || t("common.archive");
  $("confirmicon").innerHTML = icon || "";
  $("confirmicon").classList.toggle("danger", danger); // 破坏性操作红调
  $("confirmok").classList.toggle("danger", danger);
  $("confirmsheet").classList.add("open");
  setTimeout(() => {
    try { $("confirmok").focus({ preventScroll: true }); }
    catch { $("confirmok").focus(); }
  }, 0);
  return new Promise((resolve) => { confirmSheetResolve = resolve; });
}

async function archiveCurrentSession() {
  if (!app.currentId || isDraftSession() || app.isViewer) return;
  if (net.link !== "ok" || net.daemon === false) { showBanner(t("banner.offline_archive")); return; }
  const ok = await openConfirmSheet({
    title: t("confirm.archive_session.title"),
    body: t("confirm.archive_session.body"),
    okText: t("common.archive"),
  });
  if (!ok) return;
  $("topmenu").classList.remove("open");
  const id = app.currentId;
  app.archivingSessionId = id;
  try {
    await app.session.request("session.archive", { sessionId: id }, 90000);
    removeSessionFromLists(id);
    transcriptCache.delete(transcriptKey(id));
    showToast(t("toast.archived"));
    scheduleListRefresh();
    if (app.view === "session" && app.currentId === id) history.back();
  } catch (err) {
    showBanner(isUnknownMethodError(err, "session.archive")
      ? t("banner.oldremote_archive")
      : t("banner.archive_fail", err.message));
  } finally {
    if (app.archivingSessionId === id) app.archivingSessionId = null;
  }
}

async function archiveProject(cwd, name) {
  if (!cwd || app.isViewer) return;
  if (net.link !== "ok" || net.daemon === false) { showBanner(t("banner.offline_archive")); return; }
  const ok = await openConfirmSheet({
    title: t("confirm.archive_project.title"),
    body: t("confirm.archive_project.body", name || cwd),
    okText: t("common.archive"),
  });
  if (!ok) return;
  try {
    const res = await app.session.request("project.archive", { cwd }, 120000);
    removeSessionsForCwd(cwd);
    showToast(t("toast.project_archived", res?.archived ?? 0));
    renderList();
    scheduleListRefresh();
  } catch (err) {
    showBanner(isUnknownMethodError(err, "project.archive")
      ? t("banner.oldremote_archive")
      : t("banner.archive_fail", err.message));
  }
}

function isUnknownMethodErr(e) {
  return e?.code === 400 && /未知方法|unknown method/i.test(String(e?.message || ""));
}

// ===== Agent 切换器：列出 daemon 可用后端 + 运行时切换（切换后按新 agent 重取首页）=====
// 老 daemon 无 agents.list → 静默回落仅 codex；只有一个后端时切换器隐藏（无从切换）。
async function loadAgents() {
  const daemonId = app.session?.info?.id;
  try {
    const res = await app.session.request("agents.list", {});
    const raw = Array.isArray(res?.agents) ? res.agents : (Array.isArray(res) ? res : []);
    // 只暴露前端有渲染路径的后端（见 AGENT_UI_READY）：codex 始终在 daemon 注册，故至少留 codex
    const list = cleanAgentList(raw);
    app.agents = list;
    // 当前 agent 不在可用列表（如 daemon 未起 claude）→ 回落到第一个可用
    if (list.length && !list.some((a) => a.id === app.agent)) app.agent = list[0].id || "codex";
    saveAgentSnapshot(daemonId);
  } catch (err) {
    // 老 daemon 无 agents.list：静默，仅 codex；瞬时断线/超时则保留本地快照，避免按钮闪没。
    if (isUnknownMethodErr(err)) {
      app.agents = [];
      try { if (daemonId) localStorage.removeItem(agentSnapKey(daemonId)); } catch {}
    } else if (!app.agents.length) {
      app.agents = [];
    }
  }
  renderAgentPick();
}

function agentSnapKey(daemonId) {
  return `czr-agents:${daemonId}`;
}

function cleanAgentList(raw) {
  if (!Array.isArray(raw)) return [];
  return raw
    .map((a) => {
      const id = a?.id || a?.agent;
      if (!AGENT_UI_READY.has(id)) return null;
      return { id, name: agentLabel(id), healthy: a.healthy !== false };
    })
    .filter(Boolean);
}

function applyAgentList(list) {
  app.agents = cleanAgentList(list);
  if (app.agents.length && !app.agents.some((a) => a.id === app.agent)) app.agent = app.agents[0].id || "codex";
  renderAgentPick();
}

function saveAgentSnapshot(daemonId) {
  if (!daemonId || app.isViewer) return;
  try {
    localStorage.setItem(agentSnapKey(daemonId), JSON.stringify({ v: 1, agents: cleanAgentList(app.agents) }));
  } catch {}
}

function hydrateAgentSnapshot(daemonId) {
  if (app.isViewer || !daemonId) return;
  let snap = null;
  try { snap = JSON.parse(localStorage.getItem(agentSnapKey(daemonId)) || "null"); } catch {}
  if (snap?.v === 1 && Array.isArray(snap.agents)) {
    applyAgentList(snap.agents);
  } else {
    app.agent = "codex";
    app.agents = [];
    renderAgentPick();
  }
}

  return id === "claude" ? "Claude" : id === "codex" ? "ChatGPT" : id;
}

function renderAgentPick() {
  const box = $("agentpick");
  if (!box) return;
  const list = app.agents || [];
  const hasTerm = termCapable();
  const termMode = hasTerm && app.homeTab === "term";
  // 可选项 = 后端 agent + 终端（若可用）。少于 2 个无从切换、不展示。
  const optionCount = list.length + (hasTerm ? 1 : 0);
  if (app.view !== "list" || app.isViewer || optionCount < 2) {
    box.style.display = "none";
    box.classList.remove("open");
    box.innerHTML = "";
    return;
  }
  box.style.display = "flex";
  box.classList.remove("open");
  box.innerHTML = "";
  const trigger = document.createElement("button");
  trigger.type = "button";
  trigger.className = "agentbtn";
  trigger.setAttribute("aria-haspopup", "menu");
  trigger.setAttribute("aria-expanded", "false");
  const triggerText = document.createElement("span");
  triggerText.textContent = termMode ? t("term.mode_term") : agentLabel(app.agent);
  const triggerChev = document.createElement("span");
  triggerChev.className = "agentchev";
  triggerChev.textContent = "▾";
  trigger.append(termMode ? terminalIconNode() : agentIconNode(app.agent), triggerText, triggerChev);
  trigger.onclick = (e) => {
    e.stopPropagation();
    const open = !box.classList.contains("open");
    $("topmenu").classList.remove("open");
    box.classList.toggle("open", open);
    trigger.setAttribute("aria-expanded", open ? "true" : "false");
  };
  const menu = document.createElement("div");
  menu.className = "agentmenu";
  menu.setAttribute("role", "menu");
  const addOpt = (icon, label, on, warn, onClick) => {
    const opt = document.createElement("button");
    opt.type = "button";
    opt.className = `agentopt${on ? " active" : ""}`;
    opt.setAttribute("role", "menuitemradio");
    opt.setAttribute("aria-checked", on ? "true" : "false");
    const name = document.createElement("span");
    name.className = "agentname";
    name.textContent = label;
    opt.append(icon, name);
    if (warn) {
      const w = document.createElement("span");
      w.className = "agentwarn";
      w.textContent = "!";
      opt.appendChild(w);
    }
    const ck = document.createElement("span");
    ck.className = "agentck";
    ck.textContent = on ? "✓" : "";
    opt.appendChild(ck);
    opt.onclick = (e) => {
      e.stopPropagation();
      box.classList.remove("open");
      onClick();
    };
    menu.appendChild(opt);
  };
  // 后端 agent（终端模式下均不勾选——当前视图是终端）
  for (const a of list) {
    const id = a.id || a.agent;
    addOpt(agentIconNode(id), agentLabel(id), !termMode && id === app.agent, a.healthy === false, () => {
      if (termMode) setHomeTab("chat");
      switchAgent(id);
    });
  }
  // 第三项：终端（与两个 agent 同级）
  if (hasTerm) {
    addOpt(terminalIconNode(), t("term.mode_term"), termMode, false, () => {
      if (app.homeTab !== "term") setHomeTab("term");
    });
  }
  box.append(trigger, menu);
}

function terminalIconNode() {
  const ico = document.createElement("span");
  ico.className = "agentico";
  ico.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`;
  return ico;
}

async function switchAgent(id) {
  if (!id || id === app.agent) return;
  app.agent = id;
  renderAgentPick();
  // 各后端会话 id 空间独立：清掉上一 agent 的所有列表缓存，先渲染新 agent 的
  // 本地快照（秒切），再按新 agent 后台重拉首页覆盖
  resetListModel();
  hydrateBoardSnapshot(app.session?.info?.id);
  // 各后端模型表不同：清缓存 + 丢弃上一后端的模型选择（否则 codex 模型 id 会被发给 claude --model 而报错）
  app.models = null;
  app.modelState = null;
  if (app.turnOpts) { app.turnOpts.model = null; app.turnOpts.modelName = null; app.turnOpts.effort = null; saveTurnOpts(); }
  updateOptButtons(); // 立刻按新 agent 重画权限盾/模型钮
  try {
    if (app.view === "session") await closeSession(); // 当前会话属旧后端：退回列表（内部已 refreshList 新 agent）
    else await refreshList();
    prefetchModels(); // 按新 agent 重取模型表，到货后 updateOptButtons
  } catch (err) { showBanner(t("banner.load_fail", err.message)); }
}

// 首页加载：projects.list（全部项目，一帧）+ 首页一页 sessions.list（活跃会话/散聊天），
// —— 首页列表缓存快照（stale-while-revalidate，纯客户端）——
// 打开页面/切电脑/切 agent 时先渲染上次的列表快照（零网络往返），后台 loadHome 全量刷新覆盖。
// 只存首屏所需：projects + attention + 散聊天页（headSessions）；项目内会话不存——默认全折叠
// 首屏用不上，且体积大，由后台预取补齐。running/approvals 等易变徽标按快照值先显示，
// 刷新与 board.changed 会立即纠正（loadHome 里有对不在 attention 全集者的清标逻辑）。
const BOARD_SNAP_LIMIT = 300 * 1024; // localStorage 配额有限（其余键还要活），超限宁可不缓存
function boardSnapKey(daemonId) {
  // 键带 daemonId + agent：多台电脑各存一份；codex/claude 会话空间独立，串了就是显示错乱
  return `czr-board:${daemonId}:${app.agent}`;
}
// 写盘防抖：board.changed 节流下 loadHome 可达 ~800ms 一次，每次同步 stringify+写
// localStorage 是白费的主线程功；尾随 2s 落一次盘即可（快照本就只求"下次打开够新"）
let boardSnapTimer = null;

  clearTimeout(boardSnapTimer);
  boardSnapTimer = setTimeout(saveBoardSnapshot, 2000);
}
function saveBoardSnapshot() {
  const did = app.session?.info?.id;
  if (!did || app.isViewer || app.homeMode !== "projects") return;
  try {
    const attention = [...app.knownById.values()].filter((s) => s.approvals || s.running || activeFresh(s));
    const snap = JSON.stringify({
      v: 1, at: Date.now(),
      projects: app.projects,
      attention,
      head: app.headSessions.slice(0, 100), // 散聊天区首屏够用，控体积
    });
    if (snap.length > BOARD_SNAP_LIMIT) return;
    localStorage.setItem(boardSnapKey(did), snap);
  } catch {} // 配额满/隐私模式：静默放弃缓存，绝不影响主流程
}

  if (app.isViewer || !daemonId) return;
  let snap = null;
  try { snap = JSON.parse(localStorage.getItem(boardSnapKey(daemonId)) || "null"); } catch {}
  if (!snap || snap.v !== 1 || !Array.isArray(snap.projects)) return;
  app.projects = snap.projects;
  app.projByCwd = new Map(app.projects.map((p) => [normSep(p.cwd), p]));
  // seenAt 用快照落盘时刻：陈旧快照里的 active 立即按实际年龄衰减，不闪现假"运行中"
  const at = Number(snap.at) || 0;
  ingestSessions(Array.isArray(snap.attention) ? snap.attention : [], at);
  app.headSessions = Array.isArray(snap.head) ? snap.head : [];
  ingestSessions(app.headSessions, at);
  if (app.view === "list") renderList();
}
// 令牌被撤销/删除电脑时清掉该 daemon 的全部快照（含各 agent），下次配对不闪现旧列表
function dropBoardSnapshots(daemonId) {
  try {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith(`czr-board:${daemonId}:`)) localStorage.removeItem(k);
    }
    localStorage.removeItem(agentSnapKey(daemonId));
  } catch {}
}
// 清空首页列表数据模型。切电脑/切 agent 共用：两者的会话 id 与项目空间都彼此独立
function resetListModel() {
  app.listGen++; // 在途的 loadHome/预取/懒加载按代次作废：旧空间数据不污染新模型与快照
  app.knownById.clear();
  app.projSessions.clear();
  app.projByCwd.clear();
  app.headSessions = [];
  app.projects = [];
  app.lastSessions = [];
  app.timeline = { sessions: [], cursor: null, done: false, loading: false };
  app.homeMode = null;
  app.prefetchAt = 0; // 新数据空间：允许立即全量预取，不受上一空间的 20s 节流
  // transcriptCache 不清：键自带 daemonId+agent，跨空间不串；切回来还能断点续传
}

// 并发发出（同一 WS 管线，约 1 次往返），与会话总量无关。老 daemon 无 projects.list 时
// 自动降级为全量翻页（fetchAllSessions）。
async function loadHome() {
  if (app.isViewer) return; // 观众无列表权限
  const gen = app.listGen; // 数据空间代次：切电脑/切 agent 后本次结果作废（不入模型、不落快照）
  if (app.homeMode !== "legacy") {
    try {
      // head page 只取近端一页（散聊天区 + 排序用），必须小而快：它和 projects.list 一起
      // 眼加载——拉太多会拖慢/超时整个首页（曾误设 2000 导致首页加载不出来）。项目内会话由
      // 展开时懒加载（limit 2000），与首页加载解耦、恒定 O(1) 往返。
      // 用 allSettled 而非 all：projects.list 是主内容（缓存、快），head page 是易超时的一环——
      // head page 失败只让散聊天区暂缺，绝不能拖垮整个首页。projects.list 失败才算首页失败。
      const [prR, hrR] = await Promise.allSettled([
        app.session.request("projects.list", {}),
        app.session.request("sessions.list", { limit: 200 }),
      ]);
      if (gen !== app.listGen) return; // 旧 agent 的首页数据：丢弃，尤其不能存进新 agent 的快照键
      if (prR.status !== "fulfilled") throw prR.reason;
      const pr = prR.value;
      const hr = hrR.status === "fulfilled" ? hrR.value : null;
      app.homeMode = "projects";
      app.projects = pr?.projects ?? [];
      app.projByCwd = new Map(app.projects.map((p) => [normSep(p.cwd), p]));
      // attention 是"hub 正在驱动 ∪ 待审批"的权威全集：不在其中的本地会话要清掉
      // running/approvals——否则缓存快照带来的、或断线期间错过 board.changed 的徽标
      // 会永不熄灭。active 不清：桌面 GUI 驱动的会话仅文件活跃、不在 attention 里，
      // 清了会把"进行中"区打灭；其时效由数据刷新（head 页/预取覆盖写）自然收敛
      const attn = pr?.attention ?? [];
      const freshAttn = new Set(attn.map((s) => s.id));
      for (const s of app.knownById.values()) {
        if (!freshAttn.has(s.id) && (s.running || s.approvals)) {
          s.running = false; s.approvals = 0;
        }
      }
      ingestSessions(attn);
      app.headSessions = hr?.sessions ?? [];
      ingestSessions(app.headSessions);
      saveBoardSnapshotSoon();
      if (app.view === "list") renderList();
      // 首页渲染后台全量预取所有项目会话（不阻塞、不 await）：展开即秒开。
      // 涵盖了「刷新时重载已展开项目」——预取会把每个项目都拉全，包括开着的那些。
      prefetchAllProjects();
      return;
    } catch (e) {
      if (!isUnknownMethodErr(e)) return; // 非"方法不存在"（超时/断网等）：保留旧渲染，下次再试
      app.homeMode = "legacy"; // 老 daemon：一次性降级，后续都走回退路径
    }
  }
  // 回退：老 daemon 无 projects.list —— 沿用全量翻页累计（逐批渲染）
  const all = await fetchAllSessions({
    onProgress: (partial) => {
      if (gen !== app.listGen) return;
      ingestSessions(partial);
      if (app.view === "list") renderList();
    },
  });
  if (gen !== app.listGen) return;
  ingestSessions(all);
  if (app.view === "list") renderList();
}

// 兼容别名：既有调用点（看板节流、重连、关闭会话返回）统一走 loadHome
async function refreshList() {
  return loadHome();
}

// 看板变化时节流刷新（仅列表视图）
function scheduleListRefresh() {
  if (app.view !== "list" || app.refreshTimer) return;
  app.refreshTimer = setTimeout(() => {
    app.refreshTimer = null;
    if (app.view === "list") refreshList().catch(() => {});
  }, 800);
}

// —— 会话详情断点续传 ——
// 内存缓存最近看过的会话 transcript：条目窗口（文件尾部若干条）+ 文件条目总数 total +
// 首条身份指纹 ident（daemon 下发的不透明串）。重开/重连 watch 时带 have:{total,ident}，
// daemon 命中则只补 [total, newTotal) 的增量（session.snapshot 带 append:true，不清屏）；
// 对不上（文件重写/缩短/缺口过大/旧 daemon）自动回落全量快照。只活在页面内存里，
// 刷新页面即冷启。观众回放模式不参与（fromStart 每次从头读）。
const transcriptCache = new Map(); // `${daemonId}:${agent}:${sid}` -> {items, total, ident, at}
const TRANSCRIPT_CACHE_MAX = 4;    // 手机内存有限：只留最近看过的几个会话
const TRANSCRIPT_ITEMS_MAX = 600;  // 单会话条目上限：超出丢最旧（窗口仍是文件尾部后缀，游标不破坏）
const TRANSCRIPT_CHARS_MAX = 4_000_000; // 单会话字符预算：极端大条目（daemon 上限 48k/条）不把 4 会话缓存顶到上百 MB

// 条目窗口裁剪：先按条数、再按字符预算丢最旧。窗口恒为文件尾部后缀，total 游标不破坏
function transcriptTrim(c) {
  if (c.items.length > TRANSCRIPT_ITEMS_MAX) c.items.splice(0, c.items.length - TRANSCRIPT_ITEMS_MAX);
  let chars = 0;
  let keep = 0;
  for (let i = c.items.length - 1; i >= 0; i--) {
    chars += JSON.stringify(c.items[i]).length;
    if (chars > TRANSCRIPT_CHARS_MAX) break;
    keep++;
  }
  if (keep < c.items.length) c.items.splice(0, c.items.length - keep);
}
function transcriptReset(sid, items, total, ident) {
  const key = transcriptKey(sid);
  if (!transcriptCache.has(key) && transcriptCache.size >= TRANSCRIPT_CACHE_MAX) {
    let oldest = null;
    for (const [k, v] of transcriptCache) if (!oldest || v.at < oldest[1].at) oldest = [k, v];
    if (oldest) transcriptCache.delete(oldest[0]);
  }
  const c = { items: [...items], total, ident, at: Date.now() };
  transcriptTrim(c);
  transcriptCache.set(key, c);
}
// countsTowardTotal：真实的文件追加（live tail）推进 total 游标；快照续块（cont）
// 是已计入 total 的窗口内容，只并入条目、不动游标

}

  const h = haystack.map(itemKey);
  const n = needle.map(itemKey);

  for (let i = 0; i <= h.length - n.length; i++) {

      if (h[i + j] !== n[j]) continue outer;
    }

  }
  return -1;
}

  const h = haystack.map(itemKey);

    let ok = true;
    for (let i = 0; i < len; i++) {

    }

  const c = transcriptFor(p.sessionId);

  if (containedAt < 0) {
    const overlap = suffixPrefixOverlap(c.items, items);
    if (overlap <= 0) return null;
    added = items.slice(overlap);
    c.items.push(...added);
    transcriptTrim(c);
  }
  c.total = typeof total === "number" ? total : Math.max(c.total, c.items.length);

// —— 快照暂存（提交凭据的原子性）——
// 快照可能拆成 首片(session.snapshot) + 若干续片(session.event cont) 多帧；total/ident
// 随首片先到，但只有收到 daemon 的 end 标记（末分片）才能把它们提交为续传凭据——
// 否则中途断线丢了续片，缓存却声称持有 [0,total)，此后每次 have 续传只补 [total,新total)，
// 缺洞永远补不回来。未提交的暂存随下一次 watch（newWatchToken）丢弃，自然回落全量。

    transcriptAppend(s.sid, s.items, false);
    c.total = s.total; // total 以 daemon 快照为权威（append 片自带全量 total）
    if (s.ident) c.ident = s.ident;
  } else if (s.ident) {
    transcriptReset(s.sid, s.items, s.total, s.ident);

    items: [...p.items],

    ident: p.ident ?? null,

}
function snapCommit() {

}

// 每次 watch 领新令牌：daemon 原样打在本次 watch 产出的快照/事件帧上，客户端凭它丢弃
// 被顶替的旧 watch 在途帧——快速退出又重开同一会话时新旧帧 sessionId 相同、区分不开，
// 旧 append 帧混进来会双份追加且固化进缓存。旧 daemon 不识 wt，帧不带令牌则照常放行。
// 顺带丢弃上一 watch 未提交的快照暂存（它属于被顶替的那次快照）。
function newWatchToken() {
  snapPending = null;
  app.watchToken = Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  return app.watchToken;
}

let backgroundWatchTimer = null;
let backgroundWatchSuspended = false;

function canWatchCurrentSession() {
  return app.session && app.view === "session" && app.currentId && !isDraftSession();
}

async function watchCurrentSession(session = app.session, { resetReplay = false } = {}) {
  if (!session || session !== app.session || !canWatchCurrentSession()) return null;
  const sid = app.currentId;
  const params = { sessionId: sid, wt: newWatchToken() };
  if (app.isViewer) {
    params.fromStart = true;
    if (resetReplay) {
      app.replayDone = false;
      app.replayLoading = false;
      app.replayLastAt = 0;
    }
  } else {
    const cur = transcriptFor(sid);
    if (cur?.ident && cur.total > 0) params.have = { total: cur.total, ident: cur.ident };
  }
  const result = await session.request("session.watch", params);
  if (app.isViewer) {
    app.replayMode = result?.mode === "replay";
    if (typeof result?.total === "number") app.histTotal = result.total;
    updateReplayMore();
  }
  return result;
}

async function suspendCurrentWatch() {
  if (!canWatchCurrentSession() || backgroundWatchSuspended) return;
  const wt = app.watchToken || app.session.watchLeaseToken;
  backgroundWatchSuspended = true;
  app.watchToken = null; // 立即作废在途带 wt 的流帧；unwatch 丢包则由 daemon 租约兜底
  app.session.pauseWatchRenewal();
  await app.session.request("session.unwatch", wt ? { wt } : {}).catch(() => {});
}

async function resumeCurrentWatch() {
  const leaseExpired = !!(app.session?.watchLeaseToken &&
    app.session.watchLeaseExpiresAt && Date.now() >= app.session.watchLeaseExpiresAt);
  const suspended = backgroundWatchSuspended || leaseExpired;
  backgroundWatchSuspended = false;
  if (!canWatchCurrentSession()) return;
  if (!suspended) {
    app.session.resumeWatchRenewal();
    return;
  }
  try {
    await watchCurrentSession(app.session, { resetReplay: app.isViewer });
  } catch (err) {
    // 瞬时断线交给下一次 onReady 恢复；观众的终态仍立即落地。
    if (app.isViewer && (err?.code === 403 || err?.code === 404)) showViewerEnded(t("viewer.gone"));
  }
}

async function openSession(id, title, opts = {}) {
  // 手机系统返回键/右滑返回走浏览器 history：从列表进会话时压一条历史，
  // 这样系统返回会触发 popstate 回首页，而不是把整个页面/PWA 弹掉。
  // 已在会话内（如右上角新建会话）不重复压栈——始终只留一条“会话→首页”的返回。
  // 观众深链直进会话、无列表可回，不压栈（返回键走首页同款"再按一次退出"）。
  // 带上 #s=<id>：刷新时 main() 解析该 hash 走深链恢复通道直达本会话，而非退回首页。
  if (app.view !== "session" && !app.isViewer) {
    const url = opts.draft ? `${location.pathname}${location.search}` : "#s=" + encodeURIComponent(id);
    history.pushState({ czr: "session" }, "", url);
  }
  // 会话与首页共用 window 滚动：进会话会 scrollToBottom 把窗口滚到底，返回时若不复位，
  // 首页会停在被滚动过的位置（看起来"跳动/变了"）。记下离开首页时的滚动位，closeSession 复原。
  if (app.view === "list") app.homeScrollY = window.scrollY;
  app.view = "session";
  app.currentId = id;
  app.currentTitle = title;
  // 新建的空会话在发出第一条消息前没有 rollout 文件，无法 watch（会 404「会话不存在」）；
  // 先进视图并标记待接入，等 dispatch 发出首条消息后再补 watch
  app.pendingWatch = !!(opts.fresh || opts.draft);
  app.running = false;
  app.echoes = [];
  app.toolNodes.clear(); app.questionNodes.clear(); app.todoNode = null; app.todoCalls.clear(); app.pendingTodos = null; app.tasks.clear(); app.taskCreates.clear(); app.taskPeeks.clear(); app.taskMode = false; clearTimeout(app.desktopIdle); app.desktopIdle = null; app.turnStartTs = 0; app.turnSummarized = false;
  app.todoCollapsed = false; // 折叠态是会话级选择：进会话复位；快照重放（加载更早/重连）不动它
  app.seenImages.clear();
  app.sawFunctionCalls = false;
  app.permState = null;
  app.modelState = null;
  app.stream = null;
  app.proc = null;
  // 每次进会话把历史回填窗口复位（首屏与 daemon watch 的 SNAPSHOT_MAX_ITEMS 一致）
  app.histLimit = 500;
  app.histTotal = 0;
  app.loadingEarlier = false;
  app.earlierAnchor = null;
  app.replayMode = false;
  app.replayDone = false;
  app.replayLoading = false;
  app.viewerCount = 0;
  app.congestedShown = false;
  updateReplayMore();
  resetPullTip();
  app.ctxPct = null; // 用量随本会话的 token_count 事件回填
  $("input").value = app.drafts.get(id) ?? ""; // 恢复本会话的未发送草稿
  app.attachments = [];
  app.queue = [];
  app.suppressUserImages = 0;
  renderAttachments();
  setPlanMode(false); // 计划模式是会话级选择，不跨会话
  autoGrow();
  updateSendState();
  updateOptButtons();
  if (!opts.draft) localStorage.setItem("czr-last", JSON.stringify({ id, title }));
  renderAgentPick();
  document.body.classList.add("insession");
  $("list").classList.add("hidden");
  $("viewer").classList.add("active");
  $("composer").classList.add("active");
  renderQuickCommandBar();
  if (!app.isViewer) $("back").style.display = "flex";
  setTitle(title);
  updateStatusPill(); // 副标题切到「项目文件夹 · 电脑名」
  $("log").innerHTML = (opts.fresh || opts.draft) ? "" : `<div class="notice">${t("common.loading")}</div>`;
  setRunning(false);
  // 看板的 running 是"daemon 正在驱动"的权威标志：新开页面没有 live 事件回放，
  // 只靠 tail 推断会把 daemon 驱动误判成桌面驱动（丢失停止按钮）
  const known = app.knownById.get(id);
  if (known?.running) setRunning(true, "daemon");
  renderApprovals(); // 该会话的待审批卡从全局区移入对话流
  $("sharebtn").style.display = opts.draft ? "none" : "";
  if (opts.fresh || opts.draft) return; // 空/草稿会话：暂不 watch，首条消息发出后由 dispatch 接入
  // 断点续传：本地有该会话的 transcript 缓存先直接渲染（秒开、零流量），
  // watch 带 have 游标，daemon 命中只补缺口（append 快照追加，不再清屏重放）
  const cached = app.isViewer ? null : transcriptFor(id);
  if (cached?.items.length) {
    $("log").innerHTML = "";
    app.histTotal = cached.total;
    setHistoryLoadedCount(cached.items.length);
    renderInto(cached.items);
    renderApprovals(); // 清 log 重渲染后内嵌审批卡重挂
    scrollToBottom();
    updateEarlierHint();
  }
  try {
    // 观众带 fromStart：已结束的会话从头顺序读（分享跑完的会话是主场景），
    // 进行中的会话 daemon 会忽略之、回落尾部实时（mode:"tail"）。旧 daemon 无 mode 字段同理。
    const params = app.isViewer ? { sessionId: id, fromStart: true } : { sessionId: id };
    params.wt = newWatchToken();
    if (cached?.ident && cached.total > 0) params.have = { total: cached.total, ident: cached.ident };
    const r = await app.session.request("session.watch", params);
    if (r?.mode === "replay") {
      app.replayMode = true;
      if (typeof r.total === "number") app.histTotal = r.total;
    }
  } catch (err) {
    // 被顶替的旧 watch（快速切换/重开同一会话）以 409 失败：新 watch 已接管，静默即可。
    // 注意 409 不能只靠 id !== currentId 判——"退出又秒开同一会话"时 id 相同。
    if (err.code === 409 || id !== app.currentId) return;
    if (app.isViewer) {
      // 只有令牌失效(403)/会话不存在(404)是终态；断线等瞬时错误交给重连后的
      // onReady 重 watch 恢复——不能让一次抖断把围观页永久判死
      if (err.code !== 403 && err.code !== 404) return;
      $("log").innerHTML = "";
      showViewerEnded(t("viewer.gone"));
      return;
    }
    // 会话可能已被清理（深链/继续上次都可能指向失效 id）：报错并退回列表
    if (err.code === 404) transcriptCache.delete(transcriptKey(id)); // 死会话的缓存无留存价值
    showBanner(t("banner.opensession_fail", err.message));
    history.back(); // 消费掉刚压入的历史项，经 popstate 统一走 closeSession
  }
}

async function closeSession() {
  if (backgroundWatchTimer) clearTimeout(backgroundWatchTimer);
  backgroundWatchTimer = null;
  backgroundWatchSuspended = false;
  // 未发送的草稿存起来（排队未发出的文本一并并入），回来接着写；不带进下一个会话
  const wasDraft = isDraftSession();
  if (app.currentId && !wasDraft) {
    const queued = app.queue.map((q) => q.text).filter(Boolean);
    app.drafts.set(app.currentId,
      [$("input").value, ...queued].filter((s) => s.trim()).join("\n"));
  }
  app.queue = [];
  app.attachments = [];
  renderAttachments();
  $("input").value = "";
  autoGrow();
  updateSendState();
  app.view = "list";
  app.currentId = null;
  if (wasDraft) app.draft = null;
  app.pendingWatch = false;
  app.session?.stopWatchRenewal();
  app.echoes = [];
  app.suppressUserImages = 0;
  app.toolNodes.clear(); app.questionNodes.clear(); app.todoNode = null; app.todoCalls.clear(); app.pendingTodos = null; app.tasks.clear(); app.taskCreates.clear(); app.taskPeeks.clear(); app.taskMode = false; clearTimeout(app.desktopIdle); app.desktopIdle = null; app.turnStartTs = 0; app.turnSummarized = false;
  app.stream = null;
  app.proc = null;
  app.permState = null;
  app.modelState = null;
  app.viewerCount = 0;
  setRunning(false);
  updateOptButtons();
  updateJump();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active");
  $("composer").classList.remove("active");
  renderQuickCommandBar();
  $("log").innerHTML = "";
  $("list").classList.remove("hidden");
  // 复原进会话前的首页滚动位（会话 scrollToBottom 动过共用的 window 滚动）：先就地复位，
  // 让当前列表 DOM 立刻回到原位；refreshList 重渲染后再复位一次，抵消 innerHTML 重建的抖动。
  window.scrollTo(0, app.homeScrollY || 0);
  $("back").style.display = "none";
  $("sharebtn").style.display = "";
  setTitle(t("brand"));
  updateStatusPill(); // 副标题退回电脑名
  renderAgentPick();
  renderApprovals();
  // 网络动作放到视图切换之后、且不阻塞返回：unwatch 只是通知 daemon 停止推流，
  // 就算失败也已离开会话；迟到的 live 事件因 currentId 已清空会被忽略。
  app.session.request("session.unwatch").catch(() => {});
  await refreshList().catch(() => {});
  // 列表重建后内容高度可能变，再复位一次滚动位，确保首页稳稳停在离开前的位置
  window.scrollTo(0, app.homeScrollY || 0);
}

// 运行状态区分驱动方：daemon（手机发起，可停止）/ desktop（桌面 GUI 在跑，只可看，
// daemon 停不了别人的进程——tail 的 task_started 只在非 daemon 驱动时判为桌面）
function setRunning(running, driver = "daemon", startAt) {
  if (running && !app.running) {
    app.runStart = startAt ?? Date.now();
    // 新一轮起：重置活动行的 token 累计与动词，以及本轮总结行标记（Claude 活动行用）
    app.turnTok = 0; app.tokSeen = new Set(); app.actVerb = t("act.work"); app.turnSummarized = false;
  } else if (running && startAt) app.runStart = Math.min(app.runStart, startAt);
  app.running = running;
  app.driver = running ? driver : null;
  // 观众身份栏的运行脉冲：实时围观的核心反馈（观众端的 composer 卡整体隐藏）
  if (app.isViewer) $("vrun").style.display = running ? "inline-flex" : "";
  const stoppable = running && driver === "daemon";
  // 运行中排队追加仍可用：输入为空时只显示停止 ■，写了内容 ↑ 才出现（updateSendState 统一管）
  $("stop").style.display = stoppable ? "block" : "none";
  $("input").placeholder = stoppable ? t("input.queue") : inputPh();
  updateSendState();
  // 运行提示由 log 顶部的状态条承担（含驱动方与耗时），操作排的 runhint 只留给"正在停止…"反馈
  $("runhint").style.display = "none";
  // 运行中每秒刷新状态条 + 信息流末尾活动行的耗时
  if (running && !app.runTimer) {
    app.runTimer = setInterval(() => { updateStatusStrip(); updateActLine(); }, 1000);
  } else if (!running && app.runTimer) {
    clearInterval(app.runTimer);
    app.runTimer = null;
  }
  if (!running) { clearTimeout(app.desktopIdle); app.desktopIdle = null; } // 收尾同时撤掉 tail 空闲兜底
  updateStatusStrip();
  updateActLine();
  if (!running) flushQueue();
}

// rollout tail 里的轮次事件：桌面 GUI 驱动的会话没有 live 事件，
// 运行状态只能从这里推断（daemon 驱动时 live 先到、driver 已是 daemon，不降级）
function tailRunning(on, startedAtSec) {
  if (on) {
    const driver = app.running && app.driver === "daemon" ? "daemon" : "desktop";
    setRunning(true, driver, startedAtSec ? startedAtSec * 1000 : undefined);
    if (driver === "desktop") desktopIdleArm();
  } else {
    setRunning(false);
  }
}

function fmtDur(ms) {
  const s = Math.floor(ms / 1000);
  return s < 60 ? t("dur.sec", s) : t("dur.minsec", Math.floor(s / 60), String(s % 60).padStart(2, "0"));
}

// 会话页状态条：等待审批 > 运行中（含耗时） > 有人围观 > 隐藏
function updateStatusStrip() {
  const el = $("sstatus");
  const hasApproval = [...app.approvals.values()].some((p) => p.sessionId === app.currentId);
  // 分享者可见的围观人数（观众端在身份栏显示同场人数，不占状态条）
  const watching = !app.isViewer && (app.viewerCount ?? 0) > 0 ? t("strip.watchingN", app.viewerCount) : "";
  if (hasApproval) {
    el.className = "appr";
    el.style.display = "block";
    el.textContent = t("strip.awaitingApproval");
  } else if (app.loadingEarlier) {
    el.style.display = "none";
  } else if (watching) {
    el.className = "";
    el.style.display = "block";
    el.textContent = `👀 ${watching}`;
  } else {
    el.style.display = "none";
  }
}

// —— 乐观发送：立即渲染带"发送中"态的用户气泡，等 rollout tail 确认后去重 ——
function echoBubble(text, atts = []) {
  const msg = document.createElement("div");
  msg.className = "msg user";
  const col = document.createElement("div");
  col.className = "echocol";
  if (atts.length) {
    const row = document.createElement("div");
    row.className = "echoimgs";
    for (const a of atts) {
      const img = document.createElement("img");
      img.src = `data:${a.mime};base64,${a.b64}`;
      row.appendChild(img);
    }
    col.appendChild(row);
  }
  if (text) {
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = clip(text);
    col.appendChild(b);
  }
  const note = document.createElement("div");
  note.className = "qtag";
  note.style.display = "none";
  col.appendChild(note);
  msg.appendChild(col);
  return msg;
}

function setEchoNote(el, text) {
  const note = el.querySelector(".qtag");
  if (!note) return;
  note.textContent = text;
  note.style.display = text ? "block" : "none";
}

function addEcho(text, atts = []) {
  const msg = echoBubble(text, atts);
  msg.classList.add("pending");
  $("log").appendChild(msg);
  app.echoes.push({ text, imgs: atts.length > 0, el: msg });
  scrollToBottom();
  return msg;
}

function consumeEcho(text) {
  const idx = app.echoes.findIndex((e) => e.text.trim() === text.trim());
  if (idx === -1) return null;
  const echo = app.echoes[idx];
  echo.el.remove();
  app.echoes.splice(idx, 1);
  return echo;
}

// 纯图片消息没有文本可匹配：tail 的用户图片气泡到达时，摘掉最早的图片乐观气泡
function consumeImgEcho() {
  const idx = app.echoes.findIndex((e) => !e.text && e.imgs);
  if (idx === -1) return;
  app.echoes[idx].el.remove();
  app.echoes.splice(idx, 1);
}

function dropEcho(el) {
  const idx = app.echoes.findIndex((e) => e.el === el);
  if (idx !== -1) app.echoes.splice(idx, 1);
  el.remove();
}

async function promoteDraftToSession(threadId, cwd) {
  if (!threadId) throw new Error(t("banner.create_noid"));
  const oldId = app.currentId;
  app.currentId = threadId;
  app.pendingWatch = false;
  app.draft = null;
  app.drafts.delete(oldId);
  app.knownById.set(threadId, {
    id: threadId,
    name: null,
    preview: "",
    cwd: cwd || "",
    updatedAt: Math.floor(Date.now() / 1000),
    source: "",
    status: "unknown",
    running: true,
  });
  app.lastSessions = [...app.knownById.values()];
  if (!app.isViewer) history.replaceState({ czr: "session" }, "", "#s=" + encodeURIComponent(threadId));
  localStorage.setItem("czr-last", JSON.stringify({ id: threadId, title: app.currentTitle || t("session.new") }));
  $("sharebtn").style.display = "";
  updateStatusPill();
  try { await app.session.request("session.watch", { sessionId: threadId, wt: newWatchToken() }); }
  catch (e) { if (e.code !== 409) showBanner(t("banner.attach_fail", e.message)); }
}

async function startDraftSession(draft, text, images, options) {
  try {
    const res = await app.session.request("session.start", {
      cwd: draft.cwd || undefined,
      text,
      images: images.length ? images : undefined,
      options,
    }, 90000);
    return res;
  } catch (err) {
    if (!isUnknownMethodErr(err)) throw err;
    // 老 daemon 兼容：会有空会话风险；新版本走 session.start 保证首条消息时才落库。
    const created = await app.session.request("session.new", { cwd: draft.cwd || undefined }, 90000);
    const threadId = created?.threadId;
    if (!threadId) throw new Error(t("banner.create_noid"));
    const sent = await app.session.request("session.send", {
      sessionId: threadId, text,
      images: images.length ? images : undefined,
      options,
    }, 90000);
    return { threadId, turnId: sent?.turnId };
  }
}

// —— 输入建议：斜杠命令面板 + @ 文件补全（共用 #suggest 下拉）——
// 斜杠：输入以 "/" 开头时列命令；内置项两端通用（/new），透传项仅 Claude（/compact 及
// .claude/commands 自定义命令——claude -p 的 stream-json 输入原样接收斜杠文本并执行）。
// @：光标前有 "@词" 时经 daemon files.search 在会话 cwd 内模糊补全，两端通用。
const sug = { mode: null, items: [], hi: 0, seq: 0, timer: 0 };
const slashCmdCache = new Map(); // cwd -> commands.list 结果（会话页存活期内缓存）
let filesSearchOk = true;        // 旧 daemon 无 files.search：见到"未知方法"后本页不再发

function currentSessionCwd() {
  if (isDraftSession()) return app.draft?.cwd || "";
  return app.knownById.get(app.currentId)?.cwd || "";
}

function builtinSlashCmds() {
  const cmds = [{ name: "new", action: "new", description: t("slash.new.desc") }];
  if (app.agent === "claude") {
    cmds.push(
      { name: "compact", description: t("slash.compact.desc") },
      { name: "init", description: t("slash.init.desc") },
    );
  }
  return cmds;
}

function updateSuggest() {
  const ta = $("input");
  if (app.isViewer || app.view !== "session") return hideSuggest();
  const pos = ta.selectionStart ?? ta.value.length;
  const before = ta.value.slice(0, pos);
  const slash = /^\/([\w:-]*)$/.exec(before);
  if (slash && !ta.value.slice(pos).trim()) return showSlash(slash[1]);
  const at = /(^|[\s(（"'`])@([\w./一-鿿-]*)$/.exec(before);
  if (at && currentSessionCwd()) return showAt(at[2]);
  hideSuggest();
}

function showSlash(query) {
  const q = query.toLowerCase();
  const items = builtinSlashCmds();
  if (app.agent === "claude") {
    const cwd = currentSessionCwd();
    const key = cwd || "~";
    if (!slashCmdCache.has(key)) {
      slashCmdCache.set(key, []); // 先占位：拉取中再敲键不重复请求
      app.session?.request("commands.list", cwd ? { cwd } : {}, 10000)
        .then((r) => {
          slashCmdCache.set(key, Array.isArray(r?.commands) ? r.commands : []);
          if (sug.mode === "slash") updateSuggest(); // 到货刷新已打开的面板
        })
        .catch(() => {}); // 旧 daemon：只有内置命令
    }
    const seen = new Set(items.map((c) => c.name));
    for (const c of slashCmdCache.get(key) || []) {
      if (c?.name && !seen.has(c.name)) { items.push(c); seen.add(c.name); }
    }
  }
  renderSuggest("slash", items.filter((c) => c.name.toLowerCase().startsWith(q)).slice(0, 8));
}

function showAt(query) {
  clearTimeout(sug.timer);
  sug.timer = setTimeout(async () => {
    const cwd = currentSessionCwd();
    if (!cwd || !filesSearchOk || !app.session) return hideSuggest();
    const seq = ++sug.seq;
    try {
      const r = await app.session.request("files.search", { cwd, query, limit: 8 }, 10000);
      if (seq !== sug.seq) return; // 已被更新的输入/关闭作废
      renderSuggest("at", (r?.files ?? []).map((f) => ({ name: f.path, dir: !!f.dir })));
    } catch (err) {
      if (/未知方法/.test(err.message)) filesSearchOk = false;
      if (seq === sug.seq) hideSuggest();
    }
  }, 160); // 防抖：连续按键只发最后一发
}

function renderSuggest(mode, items) {
  if (!items.length) return hideSuggest();
  sug.mode = mode;
  sug.items = items;
  sug.hi = 0;
  const box = $("suggest");
  box.innerHTML = "";
  items.forEach((it, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = `srow${i === 0 ? " hi" : ""}`;
    const name = document.createElement("span");
    name.className = "sname";
    name.textContent = mode === "slash" ? `/${it.name}` : it.name;
    b.appendChild(name);
    const desc = mode === "slash" ? [it.description, it.hint].filter(Boolean).join(" ") : "";
    if (desc) {
      const d = document.createElement("span");
      d.className = "sdesc";
      d.textContent = desc;
      b.appendChild(d);
    }
    // pointerdown + preventDefault：选中不让输入框失焦（blur 会关面板）
    b.addEventListener("pointerdown", (e) => { e.preventDefault(); applySuggest(i); });
    box.appendChild(b);
  });
  box.classList.add("open");
}

function moveSuggest(dir) {
  if (!sug.items.length) return;
  sug.hi = (sug.hi + dir + sug.items.length) % sug.items.length;
  const rows = $("suggest").children;
  for (let i = 0; i < rows.length; i++) rows[i].classList.toggle("hi", i === sug.hi);
  rows[sug.hi]?.scrollIntoView({ block: "nearest" });
}

function applySuggest(i) {
  const it = sug.items[i];
  const mode = sug.mode;
  if (!it) return hideSuggest();
  const ta = $("input");
  const pos = ta.selectionStart ?? ta.value.length;
  const before = ta.value.slice(0, pos);
  const after = ta.value.slice(pos);
  if (mode === "slash") {
    hideSuggest();
    if (it.action === "new") { // UI 命令：等价首页"新建会话"，其余斜杠文本原样发给 CLI
      ta.value = "";
      autoGrow();
      updateSendState();
      openDraftSession(currentSessionCwd());
      return;
    }
    ta.value = `${before.replace(/^\/[\w:-]*$/, `/${it.name} `)}${after}`;
  } else {
    // 目录：只补路径不收面板，继续下钻；文件：补上尾随空格结束本次补全
    ta.value = `${before.replace(/@[\w./一-鿿-]*$/, `@${it.name}${it.dir ? "" : " "}`)}${after}`;
  }
  const np = ta.value.length - after.length;
  ta.focus();
  ta.setSelectionRange(np, np);
  autoGrow();
  updateSendState();
  if (mode === "at" && it.dir) updateSuggest();
  else hideSuggest();
}

function hideSuggest() {
  sug.mode = null;
  sug.items = [];
  sug.seq++;
  clearTimeout(sug.timer);
  $("suggest").classList.remove("open");
}

async function sendMessage() {
  const input = $("input");
  const text = input.value.trim();
  const atts = app.attachments.slice();
  if ((!text && !atts.length) || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner(t("banner.offline_send"));
    return;
  }
  input.value = "";
  app.attachments = [];
  renderAttachments();
  autoGrow();
  updateSendState();
  hideSuggest();
  // daemon 驱动运行中：进本地队列，本轮结束后自动发出（点气泡可撤回）
  if (app.running && app.driver === "daemon") {
    enqueue(text, atts);
    return;
  }
  await dispatch(text, atts);
}

async function dispatch(text, atts) {
  const originId = app.currentId;
  const originDraft = isDraftSession() ? { ...app.draft } : null;
  const stillOnOrigin = () => app.view === "session" && app.currentId === originId;
  const echo = addEcho(text, atts);
  setRunning(true);
  try {
    const images = [];
    for (let i = 0; i < atts.length; i++) {
      setEchoNote(echo, t("echo.uploading", i + 1, atts.length));
      images.push(await uploadImage(atts[i]));
    }
    setEchoNote(echo, "");
    // 首条消息含 resume + 模型初始化，可能较慢
    const options = turnOptions(); // 按轮权限/模型 override（默认不传，沿用电脑配置）
    if (originDraft) {
      const res = await startDraftSession(originDraft, text, images, options);
      if (!stillOnOrigin()) return; // 用户已切到别的会话/草稿：不把旧请求结果应用到当前页
      await promoteDraftToSession(res.threadId, originDraft.cwd);
      return;
    }
    await app.session.request("session.send", {
      sessionId: originId, text,
      images: images.length ? images : undefined,
      options,
    }, 90000);
    if (!stillOnOrigin()) return;
    if (app.pendingWatch) {
      // 空会话首条消息已发出 → rollout 文件已生成，现在接入流式与历史
      app.pendingWatch = false;
      try { await app.session.request("session.watch", { sessionId: originId, wt: newWatchToken() }); }
      catch (e) { if (e.code !== 409) showBanner(t("banner.attach_fail", e.message)); } // 409=已被新 watch 接管
    }
  } catch (err) {
    if (!stillOnOrigin()) return;
    setRunning(false);
    dropEcho(echo);
    const input = $("input");
    if (text && !input.value.trim()) { // 失败不吞输入，放回输入框（但不覆盖此间新输入的内容）
      input.value = text;
      autoGrow();
    }
    if (atts.length && !app.attachments.length) {
      app.attachments = atts;
      renderAttachments();
    }
    updateSendState();
    showBanner(/未知方法/.test(err.message)
      ? t("banner.oldremote_image")
      : t("banner.send_fail", err.message));
  }
}

// —— 运行中排队：轮次结束（setRunning(false)）后逐条发出 ——
function enqueue(text, atts) {
  const msg = echoBubble(text, atts);
  msg.classList.add("queued");
  setEchoNote(msg, t("echo.queued"));
  $("log").appendChild(msg);
  scrollToBottom();
  const q = { text, atts, el: msg };
  msg.onclick = () => { // 撤回：内容放回输入框/附件区
    const i = app.queue.indexOf(q);
    if (i === -1) return;
    app.queue.splice(i, 1);
    msg.remove();
    const input = $("input");
    if (text) input.value = input.value.trim() ? `${input.value}\n${text}` : text;
    app.attachments = app.attachments.concat(atts).slice(0, MAX_ATTACH);
    renderAttachments();
    autoGrow();
    updateSendState();
  };
  app.queue.push(q);
}

let flushing = false;
async function flushQueue() {
  if (flushing || !app.queue.length) return;
  if (app.view !== "session" || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) return; // 离线保持排队
  flushing = true;
  const q = app.queue.shift();
  q.el.remove();
  try {
    await dispatch(q.text, q.atts); // 失败时 dispatch 已回填输入框；剩余的继续排队
  } finally {
    flushing = false;
  }
}

// —— 图片附件：选图/拍照 -> 压缩 -> 缩略图预览 -> 分块上传 ——
const MAX_ATTACH = 4;

function renderAttachments() {
  const row = $("attachrow");
  row.innerHTML = "";
  row.classList.toggle("on", app.attachments.length > 0);
  app.attachments.forEach((a, i) => {
    const box = document.createElement("div");
    box.className = "att";
    const img = document.createElement("img");
    img.src = `data:${a.mime};base64,${a.b64}`;
    const del = document.createElement("button");
    del.setAttribute("aria-label", t("a11y.removeimg"));
    del.textContent = "✕";
    del.onclick = () => {
      app.attachments.splice(i, 1);
      renderAttachments();
      updateSendState();
    };
    box.append(img, del);
    row.appendChild(box);
  });
}

function updateSendState() {
  const empty = !$("input").value.trim() && !app.attachments.length;
  $("send").disabled = empty;
  // 运行中只留一个按钮位：没内容时是停止 ■，写了要追加的内容 ↑ 才出现（单槽位，不摆两个按钮）
  const stoppable = app.running && app.driver === "daemon";
  $("send").style.display = stoppable && empty ? "none" : "";
  $("send").classList.remove("busy");
  $("send").textContent = "↑";
}

// —— 计划模式 / 会话目标 / 发文件（对齐官方 ChatGPT App 的 ➕ 菜单）——
function setPlanMode(on) {
  app.planMode = on;
  $("planck").textContent = on ? "✓" : "";
  $("planpill").style.display = on ? "" : "none";
}

// 目标：thread/goal/set|get 的手机入口。prompt 回显当前目标，清空即移除
async function editGoal() {
  if (!app.currentId || isDraftSession()) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner(t("banner.offline_goal"));
    return;
  }
  let current = "";
  try {
    const r = await app.session.request("goal.get", { sessionId: app.currentId });
    current = r.goal ?? "";
  } catch {} // 旧 daemon / 旧引擎拿不到就从空开始
  const goal = prompt(t("prompt.goal"), current);
  if (goal === null) return;
  try {
    await app.session.request("goal.set", { sessionId: app.currentId, goal: goal.trim() });
    showBanner(goal.trim() ? t("banner.goal_set") : t("banner.goal_cleared"));
    setTimeout(() => showBanner(""), 2500);
  } catch (err) {
    showBanner(/未知方法/.test(err.message)
      ? t("banner.oldremote_goal")
      : t("banner.goal_fail", err.message));
  }
}

// 发文件：文本文件读入后以代码块拼进消息（引擎输入模态只有文本+图片，
// 二进制文档发不了；图片则自动转走图片管线）
async function attachTextFile(file) {
  if (file.type.startsWith("image/")) {
    await pickFiles([file]);
    return;
  }
  const MAX = 64_000;
  const text = await file.text();
  if (text.includes("\u0000")) {
    showBanner(t("banner.binfile"));
    return;
  }
  if (text.length > MAX) {
    showBanner(t("banner.filetoobig"));
    return;
  }
  const input = $("input");
  const block = `${t("file.blockhead", file.name)}\n\`\`\`\n${text}\n\`\`\``;
  input.value = input.value.trim() ? `${input.value.trimEnd()}\n\n${block}` : block;
  autoGrow();
  updateSendState();
}

// 剪贴板贴图：手机上「截图 → 复制 → 贴给 ChatGPT」是高频路径
async function pasteImage() {
  if (!navigator.clipboard?.read) {
    showBanner(t("banner.noclipread"));
    return;
  }
  try {
    const items = await navigator.clipboard.read();
    let found = false;
    for (const it of items) {
      const type = it.types.find((t) => t.startsWith("image/"));
      if (!type) continue;
      const blob = await it.getType(type);
      await pickFiles([new File([blob], "clipboard", { type })]);
      found = true;
    }
    if (!found) showBanner(t("banner.noclipimg"));
  } catch {
    showBanner(t("banner.clipfail"));
  }
}

async function pickFiles(files) {
  for (const f of files) {
    if (app.attachments.length >= MAX_ATTACH) {
      showBanner(t("banner.maxattach", MAX_ATTACH));
      break;
    }
    try {
      app.attachments.push(await compressImage(f));
    } catch {
      showBanner(t("banner.imgreadfail", f.name || t("file.unknownfmt")));
    }
  }
  renderAttachments();
  updateSendState();
}

// 手机原图动辄 3-12MB：长边压到 1568px、JPEG 0.85（模型看图够用）；
// 小图（<300KB 且格式友好）原样直传，保住截图里的文字清晰度
async function compressImage(file) {
  if (file.size <= 300 * 1024 && /^image\/(png|jpeg|webp|gif)$/.test(file.type)) {
    return { b64: await fileToB64(file), mime: file.type };
  }
  const bmp = await loadBitmap(file);
  const w = bmp.width || bmp.naturalWidth;
  const h = bmp.height || bmp.naturalHeight;
  const scale = Math.min(1, 1568 / Math.max(w, h));
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(w * scale));
  canvas.height = Math.max(1, Math.round(h * scale));
  canvas.getContext("2d").drawImage(bmp, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
  return { b64: dataUrl.slice(dataUrl.indexOf(",") + 1), mime: "image/jpeg" };
}

async function loadBitmap(file) {
  try {
    return await createImageBitmap(file);
  } catch { // 部分格式（如旧 Safari 的 HEIC）走 <img> 解码兜底
    const url = URL.createObjectURL(file);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      return img;
    } finally {
      URL.revokeObjectURL(url);
    }
  }
}

function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const s = String(r.result);
      resolve(s.slice(s.indexOf(",") + 1));
    };
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

// —— 按轮权限/模型选择（对标 Claude App composer 的操作排）——
// 权限预设与桌面端一致（bundle 证实的 turn/start 字段）：sandboxPolicy 是 {type} 对象
const PERM_PRESETS = [
  { key: "default", name: t("perm.default.name"), desc: t("perm.default.desc") },
  { key: "readonly", name: t("perm.readonly.name"), desc: t("perm.readonly.desc") },
  { key: "auto", name: t("perm.auto.name"), desc: t("perm.auto.desc") },
  { key: "full", name: t("perm.full.name"), desc: t("perm.full.desc"), warn: true },
];
// 权限胶囊只显图标（对标官方 App）；具体档位靠图标区分，红边叠加警示完全访问。
// 线性图标（lucide，MIT）：shield=默认 / lock=只读 / zap=代理 / triangle-alert=完全访问。
// stroke=currentColor 继承按钮的点亮(.set)与警示(.warn)变色；尺寸由 CSS 控制。
const SVG = (body) =>
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
const PERM_ICON = {
  default: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>`),
  readonly: SVG(`<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`),
  auto: SVG(`<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>`),
  full: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/>`),
};
const EFFORT_LABEL = { low: t("effort.low"), medium: t("effort.medium"), high: t("effort.high"), xhigh: t("effort.xhigh") };

// 模型短名：保留系列/档位 + 版本 + 变体后缀（gpt-5.6-sol -> GPT 5.6 Sol，
// gpt-5.4-mini -> GPT 5.4 Mini，claude-opus-4-8 -> Opus 4.8）。同版本多变体（Sol/Terra/Luna）
// 必须保留后缀，否则选择器里三行都叫「GPT 5.6」且 modelMetaById 会认错模型。
function shortModel(name) {
  const s = String(name || "").trim();
  if (!s) return "";
  const spaced = s.replace(/[_-]+/g, " ").replace(/\s+/g, " ").trim();
  const cap = (w) => w[0].toUpperCase() + w.slice(1).toLowerCase();
  const claude = spaced.match(/\b(?:claude\s+)?(opus|sonnet|haiku)\s+(\d+)(?:[\s.]+(\d+))?\b/i);
  if (claude) {
    const tier = cap(claude[1]);
    return `${tier} ${claude[2]}${claude[3] ? `.${claude[3]}` : ""}`;
  }
  const gpt = spaced.match(/\bgpt\s+(\d+)(?:[\s.]+(\d+))?((?:\s+[a-z][a-z0-9]*)*)/i);
  if (gpt) {
    const ver = `GPT ${gpt[1]}${gpt[2] ? `.${gpt[2]}` : ""}`;
    const suffix = (gpt[3] || "").trim();
    return suffix ? `${ver} ${suffix.split(/\s+/).map(cap).join(" ")}` : ver;
  }
  const o = spaced.match(/\bo\s*(\d+)(?:\s+([a-z][a-z0-9]*))?\b/i);
  if (o) return `O${o[1]}${o[2] ? ` ${o[2][0].toUpperCase()}${o[2].slice(1).toLowerCase()}` : ""}`;
  return spaced.replace(/^(openai|anthropic|claude|codex)\s+/i, "");
}

function modelLabel(id, name) {
  const fromName = shortModel(name);
  const fromId = shortModel(id);
  return /^\d+(?:\.\d+)?$/.test(fromName) && fromId && !/^\d/.test(fromId)
    ? fromId
    : (fromName || fromId);
}

function defaultModelMeta() {
  return app.models?.find((m) => m.isDefault) ?? app.models?.[0] ?? null;
}

function modelWithEffortText(model) {
  if (!model) return "";
  const meta = modelMetaById(model.id || model.name);
  const id = meta?.id || model.id || model.name;
  const name = meta?.name || model.name || model.id;
  const parts = [modelLabel(id, name)];
  const effort = model.effort || model.defaultEffort || meta?.defaultEffort;
  if (effort) parts.push(EFFORT_LABEL[effort] ?? effort);
  return parts.filter(Boolean).join(" · ");
}

function modelMetaById(id) {
  if (!id) return null;
  const key = String(id).toLowerCase();
  return app.models?.find((m) =>
    String(m.id ?? "").toLowerCase() === key ||
    String(m.name ?? "").toLowerCase() === key ||
    shortModel(m.id).toLowerCase() === key ||
    shortModel(m.name).toLowerCase() === key ||
    shortModel(m.id).toLowerCase() === shortModel(id).toLowerCase() ||
    shortModel(m.name).toLowerCase() === shortModel(id).toLowerCase()
  ) ?? null;
}

function firstString(...values) {
  for (const v of values) {
    if (typeof v === "string" && v.trim()) return v.trim();
  }
  return null;
}

function loadTurnOpts() {
  const base = { perm: "default", model: null, modelName: null, effort: null };
  try {
    return { ...base, ...JSON.parse(localStorage.getItem("czr-turnopts") || "{}") };
  } catch {
    return base;
  }
}

function saveTurnOpts() {
  localStorage.setItem("czr-turnopts", JSON.stringify(app.turnOpts));
}

// session.send 的 options：default/未选模型时不传字段，daemon 沿用既有配置
function turnOptions() {
  const o = {};
  if (app.planMode) o.plan = true; // daemon 展开为 collaborationMode {mode:"plan"}
  const p = app.turnOpts.perm;
  if (p === "readonly") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "readOnly" }; }
  else if (p === "auto") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "workspaceWrite" }; }
  else if (p === "full") { o.approvalPolicy = "never"; o.sandboxPolicy = { type: "dangerFullAccess" }; }
  if (app.turnOpts.model) {
    o.model = app.turnOpts.model;
    if (app.turnOpts.effort) o.effort = app.turnOpts.effort;
  }
  return Object.keys(o).length ? o : undefined;
}

function permName(key) {
  return PERM_PRESETS.find((p) => p.key === key)?.name ?? t("perm.mode.default");
}

function normalizePermToken(value) {
  return String(value ?? "").replace(/[-_\s]/g, "").toLowerCase();
}

function setPermissionState(next) {
  if (!next?.perm) return;
  app.permState = next;
  updateOptButtons();
}

function setModelState(next) {
  if (!next?.id && !next?.name) return;
  app.modelState = next;
  updateOptButtons();
}

function codexPermissionState(payload) {
  const approval = payload?.approval_policy ?? payload?.approvalPolicy ?? null;
  const sandbox = payload?.sandbox_policy?.type ?? payload?.sandboxPolicy?.type
    ?? payload?.permission_profile?.sandbox_policy?.type ?? null;
  if (!approval && !sandbox) return null;
  const s = normalizePermToken(sandbox);
  let perm = "default";
  if (s === "readonly") perm = "readonly";
  else if (s === "workspacewrite") perm = "auto";
  else if (s === "dangerfullaccess") perm = "full";
  else if (normalizePermToken(approval) === "never") perm = "full";
  return {
    perm,
    label: permName(perm),
    raw: t("perm.raw.codex", [approval, sandbox].filter(Boolean).join(" / ")),
  };
}

function claudePermissionState(mode) {
  const m = normalizePermToken(mode);
  let perm = "default";
  let label = t("perm.mode.default");
  if (m === "bypasspermissions") {
    perm = "full"; label = permName("full");
  } else if (m === "acceptedits") {
    perm = "auto"; label = permName("auto");
  } else if (m === "plan") {
    perm = "readonly"; label = t("perm.mode.plan");
  }
  return {
    perm,
    label,
    raw: mode ? t("perm.raw.claude", mode) : "",
  };
}

function codexModelState(payload) {
  if (!payload || typeof payload !== "object") return null;
  const cfg = payload.model_config ?? payload.modelConfig ?? {};
  const settings = payload.settings ?? payload.collaborationMode?.settings ?? {};
  const id = firstString(
    payload.model, payload.model_id, payload.modelId,
    cfg.model, cfg.model_id, cfg.modelId,
    settings.model, settings.model_id, settings.modelId,
  );
  const effort = firstString(
    payload.effort, payload.reasoning_effort, payload.reasoningEffort,
    cfg.effort, cfg.reasoning_effort, cfg.reasoningEffort,
    settings.effort, settings.reasoning_effort, settings.reasoningEffort,
  );
  if (!id && !effort) return null;
  const meta = modelMetaById(id) ?? defaultModelMeta();
  return {
    id: id ?? meta?.id ?? null,
    name: meta?.name || id || null,
    effort: effort ?? meta?.defaultEffort ?? null,
  };
}

function claudeModelState(item) {
  const id = firstString(
    item?.message?.model, item?.model, item?.model_id, item?.modelId,
  );
  if (!id) return null;
  const meta = modelMetaById(id);
  return {
    id: meta?.id ?? id,
    name: meta?.name || id,
    effort: null,
  };
}

function observePermissionItem(item) {
  if (item?.type === "turn_context") {
    setPermissionState(codexPermissionState(item.payload));
    setModelState(codexModelState(item.payload));
  } else if (item?.type === "permission-mode") {
    setPermissionState(claudePermissionState(item.permissionMode));
  } else if (app.agent === "claude" && item?.permissionMode) {
    setPermissionState(claudePermissionState(item.permissionMode));
  }
  if (app.agent === "claude" && isClaudeItem(item)) setModelState(claudeModelState(item));
}

function effectivePermissionState() {
  const selected = app.turnOpts?.perm ?? "default";
  if (selected !== "default") {
    return {
      perm: selected,
      label: permName(selected),
      source: t("perm.source.phone"),
      raw: "",
      unknown: false,
    };
  }
  if (app.permState) {
    return {
      ...app.permState,
      source: t("perm.source.follow"),
      unknown: false,
    };
  }
  return {
    perm: "default",
    label: t("perm.mode.default"),
    source: t("perm.source.follow"),
    raw: "",
    unknown: true,
  };
}

function computerPermissionText() {
  if (!app.permState) return t("perm.computer.unknown");
  return `${t("perm.computer.known", app.permState.label)}${app.permState.raw ? ` · ${app.permState.raw}` : ""}`;
}

function updateOptButtons() {
  const pb = $("permbtn");
  const eff = effectivePermissionState();
  pb.innerHTML = PERM_ICON[eff.perm] ?? PERM_ICON.default;
  pb.setAttribute("aria-label", t("a11y.turnperm_named", `${eff.label} · ${eff.source}`));
  pb.classList.toggle("set", eff.perm !== "default");
  pb.classList.toggle("warn", eff.perm === "full");
  const mb = $("modelbtn");
  // 未按轮指定时显示当前会话真实模型；还没读到时回退到电脑端默认模型
  const explicit = !!app.turnOpts.model;
  const follow = app.modelState ?? defaultModelMeta();
  const followMeta = modelMetaById(follow?.id || follow?.name);
  const explicitMeta = explicit ? modelMetaById(app.turnOpts.model) : null;
  const id = explicit ? (explicitMeta?.id || app.turnOpts.model) : (followMeta?.id || follow?.id || follow?.name);
  const name = explicit ? (explicitMeta?.name || app.turnOpts.modelName || app.turnOpts.model) : (followMeta?.name || follow?.name || follow?.id);
  mb.classList.toggle("ph", !name);
  if (!name) { mb.textContent = t("btn.model"); return; }
  const meta = explicit ? explicitMeta : modelMetaById(follow?.id);
  const effKey = explicit
    ? (app.turnOpts.effort || meta?.defaultEffort || null)
    : (follow?.effort || meta?.defaultEffort || null);
  mb.textContent = "";
  const main = document.createElement("span");
  main.textContent = modelLabel(id, name);
  mb.appendChild(main);
  if (effKey) {
    const sub = document.createElement("span");
    sub.className = "msub";
    sub.textContent = " " + (EFFORT_LABEL[effKey] ?? effKey);
    mb.appendChild(sub);
  }
}

// 静默预取模型列表：让模型胶囊在"跟随电脑配置"时也能显示默认模型号。
// 旧 daemon 没有 models.list，失败即算了（点开弹层时再给明确提示）
let modelsLoading = false;
async function prefetchModels() {
  if (app.models || modelsLoading || !app.session) return;
  modelsLoading = true;
  try {
    const r = await app.session.request("models.list", {});
    app.models = r.models ?? [];
    updateOptButtons();
  } catch { /* 忽略：胶囊维持占位 */ }
  finally { modelsLoading = false; }
}

function sheetRow(box, { title, sub, active, warn, icon, onclick }) {

  if (icon) {
