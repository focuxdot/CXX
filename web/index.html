}

function termAgo(ts) {
  if (!ts) return "";
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return t("term.just_output");
  if (m < 60) return t("term.silent_min", m);
  return t("term.silent_hr", Math.floor(m / 60));
}

// status → [i18n key, css class]
const TERM_STATE_LABEL = {
  CREATING: ["term.st_creating", ""], RUNNING: ["term.st_running", "run"], DETACHED: ["term.st_running", "run"],
  STOPPING: ["term.st_stopping", ""], EXITED: ["term.st_exited", ""], FAILED: ["term.st_failed", "err"],
};
const TERM_ACTIVE_MS = 60000; // 近期有输出才算"运行中"(绿)，久无输出算"空闲"(灰)——交互式 shell/TUI 不退出但常闲置

// 列表只展示"活着"的窗口：创建中 / 运行中 / 空闲 / 正在退出。已退出(EXITED)与
// 创建失败(FAILED)是死状态——确认结束后行会短暂显示"正在退出"，转入已退出即从列表
// 消失，不再需要第二次长按移除。（app.terminals 仍保留退出项，供正看着该窗口退出的终端页用；
// 只在此处渲染时过滤。）
const TERM_LIVE_STATUS = new Set(["CREATING", "RUNNING", "DETACHED", "STOPPING"]);

function renderTermList() {
  const box = $("termlist");
  const live = app.terminals.filter((tv) => TERM_LIVE_STATUS.has(tv.status));
  if (!live.length) {
    box.innerHTML = `<div class="termlocked">${t("term.empty")}</div>`;
    return;
  }
  box.innerHTML = "";
  const sorted = [...live].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  for (const tv of sorted) {
    const row = document.createElement("button");
    row.className = "termrow";
    const running = tv.status === "RUNNING" || tv.status === "DETACHED";
    let label, cls, sub;
    if (running) {
      // 活着 ≠ 在忙：近期有输出才绿色"运行中"，久无输出降为中性"空闲"
      const active = tv.lastOutputAt && (Date.now() - tv.lastOutputAt) < TERM_ACTIVE_MS;
      label = active ? t("term.st_running") : t("term.st_idle");
      cls = active ? "run" : "";
      sub = termAgo(tv.lastOutputAt);
    } else {
      const [labelKey, c] = TERM_STATE_LABEL[tv.status] ?? [null, ""];
      label = labelKey ? t(labelKey) : tv.status; cls = c; sub = "";
    }
    row.innerHTML = `<div class="tmain"><div class="tname"></div><div class="tsub"></div></div><span class="tstate ${cls}"></span>`;
    row.querySelector(".tname").textContent = tv.title;
    row.querySelector(".tsub").textContent = [tv.cwd, sub].filter(Boolean).join(" · ");
    row.querySelector(".tstate").textContent = label;
    setupTermRowActions(row, tv);
    box.appendChild(row);
  }
}

// 列表行手势：轻点进窗口；长按/右键 → 结束窗口（先弹确认）。列表里只有活着的窗口，
// 结束后行经"正在退出"再消失，无需二次移除。复用 terminal.close（与桌面托盘「结束」同一
// RPC：先正常退出、再强制）。
function setupTermRowActions(row, tv) {
  let pressTimer = null, sx = 0, sy = 0, suppress = 0;
  const clearPress = () => { if (pressTimer) clearTimeout(pressTimer); pressTimer = null; };
  const doClose = async () => {
    suppress = Date.now() + 1600; // 抑制长按后误触发的 click
    clearPress();
    const alive = tv.status === "RUNNING" || tv.status === "DETACHED" || tv.status === "CREATING";
    if (alive) {
      // 用网页统一样式确认框（openConfirmSheet 返回 Promise<bool>），不用系统原生 confirm
      const ok = await openConfirmSheet({
        title: t("term.close_confirm.title", tv.title),
        body: t("term.close_confirm.body"),
        okText: t("term.close_ok"),
        icon: TRASH_SVG,
        danger: true,
      });
      if (!ok) return;
    }
    try {
      await app.session.request("terminal.close", { terminalId: tv.terminalId });
      showToast(t("term.closed", tv.title));
      await refreshTerminals();
    } catch (err) { showToast(err.code === 404 ? t("term.gone") : err.message); }
  };
  row.oncontextmenu = (e) => { e.preventDefault(); doClose(); }; // 桌面右键
  row.onpointerdown = (e) => {
    if (e.pointerType === "mouse") return; // 鼠标走右键，不用长按
    sx = e.clientX; sy = e.clientY; clearPress();
    pressTimer = setTimeout(doClose, 600);
  };
  row.onpointermove = (e) => { if (pressTimer && Math.hypot(e.clientX - sx, e.clientY - sy) > 10) clearPress(); };
  row.onpointerup = clearPress;
  row.onpointercancel = clearPress;
  row.onpointerleave = clearPress;
  row.onclick = () => { if (Date.now() < suppress) return; openTerminal(tv.terminalId); };
}

// —— 新建窗口 Sheet（§4.3）——
// prefill：从结构化会话进入时预填当前目录与推荐 preset（§4.2）
let termSheetSel = null; // 选中的 presetId
async function openTermSheet(prefill = null) {
  try {
    app.termPresets = await app.session.request("terminal.presets");
  } catch (err) {
    showToast(err.code === 403 ? t("term.no_access") : t("term.presets_fail", err.message));
    return;
  }
  const presets = app.termPresets?.presets ?? [];
  termSheetSel = (prefill?.presetId && presets.some((p) => p.id === prefill.presetId))
    ? prefill.presetId
    : presets[0]?.id ?? "shell";
  app.termPresetEdit = false; // 每次打开都回到普通（非编辑）态
  renderTermPresets();
  // 工作目录候选：终端最近用过的目录（daemon MRU）在前，会话项目目录（按活跃度 MRU）在后，
  // 按规范化路径去重、保序。不再截断——项目再多也全量保留，靠输入框实时筛选收敛。
  const cwds = app.termPresets?.recentCwds ?? [];
  const projCwds = [...app.projByCwd.values()].map((p) => p.cwd).filter(Boolean);
  const seen = new Set();
  app.termCwds = [];
  for (const c of [...cwds, ...projCwds]) {
    const norm = normSep(c);
    if (!norm || seen.has(norm)) continue;
    seen.add(norm);
    app.termCwds.push(c);
  }
  $("termcwd").value = prefill?.cwd ?? app.termCwds[0] ?? "";
  renderTermCwds(""); // 初始按默认展示，不用预填值筛选
  $("termstart").disabled = false;
  $("termsheet").classList.add("open");
}

// —— 启动方式列表渲染（含编辑态）——
// 普通态：点一项即选中；编辑态：每项右侧带 🗑、点整行进编辑器，底部一条「＋ 新增」。
function renderTermPresets() {
  const presets = app.termPresets?.presets ?? [];
  const box = $("termpresets");
  box.innerHTML = "";
  const editing = app.termPresetEdit === true;
  presets.forEach((p, i) => {
    const b = document.createElement("button");
    b.className = "termopt" + (!editing && p.id === termSheetSel ? " on" : "") + (editing ? " editing" : "");
    const label = document.createElement("span");
    label.textContent = p.name;
    b.appendChild(label);
    if (p.command) { // 命令作副标题灰字（空命令=普通 shell，不展示）
      const sub = document.createElement("span");
      sub.className = "sub";
      sub.textContent = p.command;
      b.appendChild(sub);
    }
    if (editing) {
      const del = document.createElement("span");
      del.className = "termdel";
      del.setAttribute("role", "button");
      del.setAttribute("aria-label", t("term.p_del"));
      del.innerHTML = TRASH_SVG;
      del.onclick = (e) => { e.stopPropagation(); deleteTermPreset(i); };
      b.appendChild(del);
      b.onclick = () => openPresetEditor(i);
    } else {
      b.onclick = () => { termSheetSel = p.id; renderTermPresets(); };
    }
    box.appendChild(b);
  });
  if (editing) {
    const add = document.createElement("button");
    add.className = "termopt termaddpreset";
    add.textContent = t("term.add_preset");
    add.onclick = () => openPresetEditor(-1);
    box.appendChild(add);
  }
  $("termedit").textContent = editing ? t("term.done_edit") : t("term.edit");
}

let presetDraftIndex = null; // -1=新增，>=0=编辑第 index 项，null=编辑器关闭
function openPresetEditor(index) {
  presetDraftIndex = index;
  const presets = app.termPresets?.presets ?? [];
  const p = index >= 0 ? presets[index] : null;
  $("termpresettitle").textContent = p ? p.name : t("term.add_preset");
  $("termpname").value = p?.name ?? "";
  $("termpcmd").value = p?.command ?? "";
  // 只剩 1 项时不给删（至少保留一个启动方式）
  $("termpdel").style.display = (index >= 0 && presets.length > 1) ? "" : "none";
  $("termpresetsheet").classList.add("open");
  setTimeout(() => $("termpname").focus(), 60);
}
function closePresetEditor() { presetDraftIndex = null; $("termpresetsheet").classList.remove("open"); }

async function savePresetDraft() {
  const name = $("termpname").value.trim();
  if (!name) { showToast(t("term.p_name_required")); return; }
  const command = $("termpcmd").value.trim();
  const presets = (app.termPresets?.presets ?? []).map((p) => ({ ...p }));
  if (presetDraftIndex >= 0 && presets[presetDraftIndex]) {
    presets[presetDraftIndex] = { ...presets[presetDraftIndex], name, command };
  } else {
    presets.push({ name, command });
  }
  if (await commitPresets(presets)) closePresetEditor();
}

async function deleteTermPreset(index) {
  const presets = app.termPresets?.presets ?? [];
  if (presets.length <= 1) { showToast(t("term.p_last")); return false; }
  const p = presets[index];
  if (!confirm(t("term.p_del_confirm", p?.name ?? ""))) return false;
  const next = presets.filter((_, i) => i !== index);
  return commitPresets(next);
}

// 提交 preset 列表到 daemon；成功后用回传的规整列表更新状态并重渲染。返回是否成功。
async function commitPresets(presets) {
  try {
    const res = await app.session.request("terminal.savePresets", { presets });
    app.termPresets = { ...(app.termPresets ?? {}), presets: res.presets ?? [] };
  } catch (err) {
    showToast(t("term.presets_save_fail", err.message));
    return false;
  }
  const ids = new Set((app.termPresets.presets ?? []).map((p) => p.id));
  if (!ids.has(termSheetSel)) termSheetSel = app.termPresets.presets?.[0]?.id ?? "shell";
  renderTermPresets();
  return true;
}

// 工作目录卡片渲染：无输入时露最近 TERM_CWD_SHOW 个，输入即筛全量（basename 命中优先、
// 全路径子串兜底）；溢出时给一行提示告诉用户可以打字筛。输入框一框两用：既填路径又当搜索框。
const TERM_CWD_SHOW = 6;
function renderTermCwds(q) {
  const cbox = $("termcwds");
  const all = app.termCwds ?? [];
  const needle = (q || "").trim().toLowerCase();
  let items, truncated = 0;
  if (needle) {
    const base = [], path = [];
    for (const c of all) {
      if ((c.split("/").pop() || c).toLowerCase().includes(needle)) base.push(c);
      else if (c.toLowerCase().includes(needle)) path.push(c);
    }
    items = [...base, ...path];
  } else {
    items = all.slice(0, TERM_CWD_SHOW);
    truncated = Math.max(0, all.length - items.length);
  }
  cbox.innerHTML = "";
  for (const c of items) {
    const b = document.createElement("button");
    b.className = "termopt";
    b.textContent = c.split("/").pop() || c;
    const sub = document.createElement("span");
    sub.className = "sub";
    sub.textContent = c;
    b.appendChild(sub);
    b.onclick = () => { $("termcwd").value = c; renderTermCwds(""); };
    cbox.appendChild(b);
  }
  if (needle && !items.length) {
    const hint = document.createElement("div");
    hint.className = "termcwdhint";
    hint.textContent = t("term.cwd_none");
    cbox.appendChild(hint);
  } else if (truncated > 0) {
    const hint = document.createElement("div");
    hint.className = "termcwdhint";
    hint.textContent = t("term.cwd_more", truncated);
    cbox.appendChild(hint);
  }
}

async function startTerminal() {
  const cwd = $("termcwd").value.trim();
  if (!cwd || !termSheetSel) return;
  $("termstart").disabled = true;
  try {
    const view = await app.session.request("terminal.create", {
      presetId: termSheetSel,
      cwd,
      cols: 80,
      rows: 24,
    });
    $("termsheet").classList.remove("open");
    app.terminals = [view, ...app.terminals.filter((x) => x.terminalId !== view.terminalId)];
    // 从结构化会话进入（§4.2）：先退出会话视图，历史项就地替换成终端页，
    // 返回键直接回首页而不是穿回旧会话
    const fromSession = app.view === "session";
    if (fromSession) {
      await closeSession().catch(() => {});
      setHomeTab("term");
    }
    openTerminal(view.terminalId, { replace: fromSession });
  } catch (err) {
    showToast(t("term.start_fail", err.message));
  } finally {
    $("termstart").disabled = false;
  }
}

// —— 终端页（§4.5–§4.7）——
function termView(tid) {
  return app.terminals.find((x) => x.terminalId === tid) ?? null;
}

let termOpenToken = 0;
async function openTerminal(terminalId, opts = {}) {
  if (app.view === "terminal" && app.term?.id === terminalId) return;
  if (app.term) disposeTermPage(); // 从一个终端直切另一个（深链）
  // 重入闸：两次快点（或首次 loadXterm 的多秒等待期间再点）会让两个调用都越过 app.term
  // 判空，后者覆盖 app.term 却不 dispose 前者、也不 detach——旧订阅与 xterm 实例泄漏。
  const token = ++termOpenToken;
  if (!termView(terminalId)) await refreshTerminals().catch(() => {});
  if (token !== termOpenToken) return; // 已被更晚的 open 顶替
  const tv = termView(terminalId);
  try {
    await loadXterm();
  } catch (err) {
    showToast(err.message);
    return;
  }
  if (token !== termOpenToken) return;
  {
    const url = "#t=" + encodeURIComponent(terminalId);
    if (app.view !== "terminal" && !opts.replace) history.pushState({ czr: "terminal" }, "", url);
    // 已在终端页内切到另一个终端（深链）：就地替换，否则 URL/历史项仍指向旧终端，刷新会开错
    else history.replaceState({ czr: "terminal" }, "", url);
  }
  app.view = "terminal";
  document.body.classList.add("interminal");
  // 快捷键条默认收起；记住上次选择（默认 collapsed）
  document.body.classList.toggle("termkeysopen", localStorage.getItem("czr-termkeysopen") === "1");
  document.body.classList.remove("terminputopen"); // 输入框每次进终端默认收起
  requestAnimationFrame(() => { layoutTermKeys(); layoutTermInput(); }); // 恢复两枚悬浮钮位置 + 抽屉锚点
  $("back").style.display = "flex";
  $("sharebtn").style.display = "none";
  setTitle(tv?.title ?? t("term.title_fallback"));
  const presets = app.termPresets?.presets ?? [];
  const preset = presets.find((p) => p.id === tv?.presetId) ?? null;
  const fontSize = Math.max(10, Math.min(22, Number(localStorage.getItem("czr-termfont")) || 13));
  const xt = new window.Terminal({
    cols: tv?.cols || 80,
    rows: tv?.rows || 24,
    theme: TERM_THEME,
    fontSize,
    fontFamily: 'ui-monospace, "SFMono-Regular", "Cascadia Mono", "Roboto Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace',
    scrollback: 2000,
    // 桌面终端通常尊重程序自己的 ANSI 明暗层级。保留温和兜底，但不再把 dim/black
    // 一律抬到正文对比度，避免 TUI 的视觉层级被“洗平”。
    minimumContrastRatio: 2,
    allowProposedApi: true,
    screenReaderMode: false,
  });
  const fit = new window.FitAddon.FitAddon();
  xt.loadAddon(fit);
  try {
    const u11 = new window.Unicode11Addon.Unicode11Addon();
    xt.loadAddon(u11);
    xt.unicode.activeVersion = "11"; // CJK 宽字符网格对齐
  } catch {}
  app.term = {
    id: terminalId,
    generation: null,
    haveSeq: 0,
    xt,
    fit,
    isOwner: false,
    ownerName: "",
    status: tv?.status ?? "RUNNING",
    exitCode: null,
    presetKeys: preset?.quickKeys ?? [],
    latch: { ctrl: false, alt: false },
    snapParts: [],
    snapGen: null,
    attaching: false,
    resyncAt: 0,
    resizeTimer: null,
    reconnecting: false,
  };
  $("termscreen").innerHTML = "";
  xt.open($("termscreen"));
  // 软键盘确认键文案：xterm 默认 helper textarea 显示「换行」；与自定义输入框一致改为「发送」
  // （仅改 enterkeyhint 标签，Enter 仍发 \r；iOS 对 textarea 可能仍显示换行，Android 通常生效）
  try {
    const ta = $("termscreen").querySelector("textarea.xterm-helper-textarea");
    if (ta) ta.setAttribute("enterkeyhint", "send");
  } catch {}
  // 直连键盘：xterm 捕获按键 → 原始字节直发（含软键盘输入）；修饰键锁定在此变换
  xt.onData((d) => {
    if (!app.term) return;
    termSendRaw(applyLatch(d));
  });
  renderTermKeys();
  fitTerm({ send: false });
  await attachTerminal();
  if (!localStorage.getItem("czr-termguide")) {
    localStorage.setItem("czr-termguide", "1");
    showToast(t("term.guide"));
  }
}

async function attachTerminal() {
  const st = app.term;
  if (!st) return;
  if (st.attaching) { st.needReattach = true; return; } // 在途：记下待办，finally 里补跑
  st.attaching = true;
  st.needReattach = false;
  try {
    const params = { terminalId: st.id, cols: st.xt.cols, rows: st.xt.rows };
    // 断线重连的增量续传：带上代次与已收字节游标，daemon ring 命中时免整屏快照
    if (st.generation && st.haveSeq > 0) {
      params.generation = st.generation;
      params.haveSeq = st.haveSeq;
    }
    const res = await app.session.request("terminal.attach", params);
    if (!app.term || app.term !== st) return;
    // 注意：snapshot 模式下快照帧先于本应答到达（同一有序通道），generation 已由
    // 快照 final 采纳；这里再赋值是幂等的。delta 模式下代次本就未变。
    st.generation = res.generation;
    st.status = res.status;
    st.exitCode = res.exitCode;
    st.isOwner = !!res.ownerDeviceId && res.ownerDeviceId === myDeviceId();
    st.ownerName = res.ownerDeviceName ?? "";
    // daemon 重启翻代（restore 后 owner 清零）：无 owner 时首个进来的设备直接接管
    if (!res.ownerDeviceId && res.status !== "EXITED" && res.status !== "FAILED") {
      try {
        await app.session.request("terminal.takeover", { terminalId: st.id });
        st.isOwner = true;
      } catch {}
    }
    if (!st.isOwner && res.cols && res.rows) st.xt.resize(res.cols, res.rows); // 非 owner 按 owner 尺寸只读渲染
    if (st.isOwner) fitTerm({ send: true });
    st.reconnecting = false;
    updateTermNotice();
  } catch (err) {
    if (err.code === 404) {
      showToast(t("term.gone"));
      if (app.view === "terminal") history.back(); // 经 popstate 统一收尾，不留孤儿历史项
      else closeTerminalPageView();
      return;
    }
    if (err.code === 403) showToast(t("term.no_access"));
    // 瞬时失败：不能干等（resync 只由输出帧触发，而未 attach 就收不到帧 → 死锁在
    // "正在恢复终端…"）。标记待重连，由下方 finally 退避重试。
    if (app.term === st) st.needReattach = true;
  } finally {
    if (app.term === st) {
      st.attaching = false;
      // 在途期间被 requestTermResync/失败标记的重连请求：补跑（退避 600ms 防抖）
      if (st.needReattach) {
        st.needReattach = false;
        clearTimeout(st.reattachTimer);
        st.reattachTimer = setTimeout(() => {
          if (app.term === st && app.view === "terminal") attachTerminal().catch(() => {});
        }, 600);
      }
    }
  }
}

// 终端通知帧统一入口（handleNotify 转发）
function handleTermNotify(msg) {
  const p = msg.params ?? {};
  if (msg.method === "terminal.listChanged") {
    app.terminals = p.terminals ?? app.terminals;
    if (app.view === "list" && app.homeTab === "term") renderTermList();
    const tv = app.term && termView(app.term.id);
    if (tv && app.term.status !== tv.status) {
      app.term.status = tv.status;
      if (tv.exitCode != null) app.term.exitCode = tv.exitCode; // 否则退出条显示 "exit ?"
      updateTermNotice();
    }
    return;
  }
  const st = app.term;
  if (!st || p.terminalId !== st.id) return;
  if (msg.method === "terminal.output") {
    if (p.generation !== st.generation) return; // 旧代次残帧
    const bytes = b64decode(p.data);
    if (p.seq > st.haveSeq) { requestTermResync(); return; } // 缺口：走快照恢复
    const skip = st.haveSeq - p.seq; // 增量补发可能与已收字节部分重叠：裁掉
    if (skip < bytes.length) st.xt.write(skip > 0 ? bytes.subarray(skip) : bytes);
    st.haveSeq = Math.max(st.haveSeq, p.seq + bytes.length);
  } else if (msg.method === "terminal.snapshot") {
    // 快照帧先于 attach 应答到达（daemon 在应答前推送）：part 0 即采纳其代次，
    // 不能拿本地旧 generation 过滤——daemon 重启翻代后那样会把新快照整个丢掉
    if (p.part === 0) {
      st.snapParts = [];
      st.snapGen = p.generation;
    } else if (p.generation !== st.snapGen) {
      return;
    }
    st.snapParts.push(p.data);
    if (p.final) {
      const data = st.snapParts.join("");
      st.snapParts = [];
      st.generation = p.generation;
      // 先 resize 到快照生成时的 PTY 尺寸，再写：ANSI 快照按当时 cols 编码，
      // 若先写进当前不同宽度的 xterm 会按错误宽度折行，之后再 resize 只会把已错的折行重排
      if (p.cols && p.rows && (p.cols !== st.xt.cols || p.rows !== st.xt.rows)) {
        st.xt.resize(p.cols, p.rows);
      }
      st.xt.reset();
      if (data) st.xt.write(data);
      st.haveSeq = p.nextSeq ?? st.haveSeq;
    }
  } else if (msg.method === "terminal.exited") {
    st.status = "EXITED";
    st.exitCode = p.exitCode ?? null;
    updateTermNotice();
  } else if (msg.method === "terminal.controlChanged") {
    st.isOwner = !!p.youAreOwner;
    st.ownerName = p.ownerDeviceName ?? "";
    if (st.isOwner) fitTerm({ send: true });
    updateTermNotice();
  } else if (msg.method === "terminal.resyncRequired") {
    requestTermResync();
  }
}

function b64decode(b64) {
  const bin = atob(b64 || "");
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// 拥塞/缺口恢复：重新 attach 拿快照；1s 节流防循环
function requestTermResync() {
  const st = app.term;
  if (!st) return;
  const now = Date.now();
  if (now - st.resyncAt < 1000) return;
  st.resyncAt = now;
  st.generation = null; // 强制走快照路径
  st.haveSeq = 0;
  attachTerminal().catch(() => {});
}

// —— 输入 ——
// 修饰键锁定只对"单字符"生效并即时清除。键盘模式下 xterm.onData 常一次送多字符
// （IME 提交、粘贴、方向键 seq）：若不清 latch，Ctrl 会滞留到之后某个单键上，
// 把无关按键静默变成控制字符（如 c→ETX 杀掉进程）。故任何输入都消费 latch。
function applyLatch(d) {
  const st = app.term;
  if (!st) return d;
  const hadCtrl = st.latch.ctrl;
  const hadAlt = st.latch.alt;
  if (!hadCtrl && !hadAlt) return d;
  let out = d;
  // 只在单字符时施加变换；多字符输入直接清 latch 不变换（避免误伤整段 IME 文本）
  if (d.length === 1) {
    if (hadCtrl) {
      const c = d.toUpperCase().charCodeAt(0);
      if (c >= 64 && c <= 95) out = String.fromCharCode(c & 0x1f);
    }
    if (hadAlt) out = "\x1b" + out;
  }
  st.latch.ctrl = false;
  st.latch.alt = false;
  renderTermKeys();
  return out;
}

function b64encodeBytes(bytes) {
  // 分块避免 String.fromCharCode(...bytes) 在大粘贴时爆栈（apply/spread 参数上限）
  let s = "";
  for (let i = 0; i < bytes.length; i += 0x8000) {
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
  }
  return btoa(s);
}

function termSendRaw(data) {
  const st = app.term;
  if (!st) return;
  if (!st.isOwner) { updateTermNotice(true); return; }
  const b64 = b64encodeBytes(new TextEncoder().encode(data));
  app.session.request("terminal.input", { terminalId: st.id, data: b64 }).catch((err) => {
    if (err.code === 409) { updateTermNotice(true); }
  });
}

function renderTermKeys() {
  const st = app.term;
  const box = $("termkeys");
  box.innerHTML = "";
  if (!st) return;
  const keys = [...TERM_KEYS];
  for (const qk of st.presetKeys) keys.splice(3, 0, { label: qk.label, seq: qk.seq }); // preset 键放前排（↵ 之后）
  for (const k of keys) {
    const b = document.createElement("button");
    b.textContent = k.i18n ? t(k.i18n) : k.label;
    if (k.intr) b.className = "intr";
    if (k.latch) b.classList.toggle("latch", st.latch[k.latch]);
    // pointerdown 而非 click：避免键盘模式下点按钮把 xterm 焦点抢走、软键盘塌掉
    b.onpointerdown = (e) => {
      e.preventDefault();
      if (k.intr) {
        if (!st.isOwner) { updateTermNotice(true); return; } // 只读时"中断"也该弹接管，不能假装已中断
        app.session.request("terminal.signal", { terminalId: st.id, kind: "interrupt" }).catch(() => {});
      } else if (k.latch) {
        st.latch[k.latch] = !st.latch[k.latch];
        renderTermKeys();
      } else {
        // 方向键随应用光标模式（DECCKM）选 SS3(ESC O) 或 CSI(ESC [)：vim/less 等全屏
        // 应用置 DECCKM 后期待 SS3，硬发 CSI 会导致方向键在其中失灵
        let seq = k.seq;
        if (k.arrow && st.xt.modes?.applicationCursorKeysMode) seq = "\x1bO" + k.arrow;
        termSendRaw(applyLatch(seq));
      }
    };
    box.appendChild(b);
  }
  // 字号调节（§14.2 A-/A+）
  for (const [label, delta] of [["A−", -1], ["A＋", +1]]) {
    const b = document.createElement("button");
    b.textContent = label;
    b.onpointerdown = (e) => {
      e.preventDefault();
      const cur = st.xt.options.fontSize;
      const next = Math.max(10, Math.min(22, cur + delta));
      if (next === cur) return;
      st.xt.options.fontSize = next;
      localStorage.setItem("czr-termfont", String(next));
      fitTerm({ send: st.isOwner });
    };
    box.appendChild(b);
  }
}

// 顶部状态条：退出 / 非 owner / 恢复中
function updateTermNotice(pulse = false) {
  const st = app.term;
  const n = $("termnotice");
  n.textContent = "";
  n.className = "";
  if (!st) return;
  // 用 DOM 构造，绝不用 innerHTML 拼接：ownerName 是别的手机上报的设备名（daemon 侧
  // 只清控制字符、不转义 HTML），拼进 innerHTML 就是存储型 XSS（拿到本域配对令牌）。
  const mkSpan = (text) => { const s = document.createElement("span"); s.textContent = text; return s; };
  const mkBtn = (id, text) => { const b = document.createElement("button"); b.id = id; b.textContent = text; return b; };
  const sp = () => { const s = document.createElement("span"); s.className = "sp"; return s; };
  let shown = false;
  if (st.status === "EXITED" || st.status === "FAILED") {
    const how = st.status === "FAILED" ? t("term.st_failed") : t("term.exit_code", st.exitCode ?? "?");
    n.append(mkSpan(how), sp(), mkBtn("termrm", t("term.rm")));
    shown = true;
  } else if (st.reconnecting) {
    n.append(mkSpan(t("term.recovering")));
    shown = true;
  } else if (!st.isOwner) {
    const who = st.ownerName || t("term.other_device");
    n.append(mkSpan(t("term.controlled_by", who)), sp(), mkBtn("termtake", t("term.take")));
    shown = true;
  }
  n.className = shown ? "show" : "";
  const rm = document.getElementById("termrm");
  if (rm) rm.onclick = async () => {
    try {
      await app.session.request("terminal.close", { terminalId: st.id });
      history.back(); // 弹掉 #t 历史项，视图收尾统一走 popstate → closeTerminalPageView
    } catch (err) { showToast(err.message); }
  };
  const take = document.getElementById("termtake");
  if (take) take.onclick = async () => {
    try {
      await app.session.request("terminal.takeover", { terminalId: st.id });
      st.isOwner = true;
      fitTerm({ send: true });
      updateTermNotice();
    } catch (err) { showToast(t("term.take_fail", err.message)); }
  };
  if (pulse && !st.isOwner) showToast(t("term.readonly_pulse"));
}

// 快捷键抽屉展开/收起：只改 body 类 + 记忆（抽屉是悬浮层，不影响终端画布高度）
function setTermKeysOpen(open) {
  document.body.classList.toggle("termkeysopen", open);
  try { localStorage.setItem("czr-termkeysopen", open ? "1" : "0"); } catch {}
  if (open) layoutTermKeys(); // 展开前按钮位置重算抽屉锚点/方向
}

// —— 悬浮快捷键钮：位置可长按拖动，按浏览器（localStorage）记忆 ——
const TERMKEYPOS_KEY = "czr-termkeypos"; // {fy}：只记竖直位置（钮中心占视口高比例）；水平永远吸附最右
let termKeyPos = null;
try { termKeyPos = JSON.parse(localStorage.getItem(TERMKEYPOS_KEY) || "null"); } catch {}
const clampn = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

// 按记忆的竖直位置摆放钮（水平恒定吸附右侧）与抽屉（锚点、展开方向、竖直居中）
function layoutTermKeys() {
  const btn = $("termkeystoggle"), drawer = $("termkeys");
  if (!btn || !drawer) return;
  const W = window.innerWidth, H = window.innerHeight;
  const tw = btn.offsetWidth || 44, th = btn.offsetHeight || 40;
  if (termKeyPos) {
    const top = clampn(termKeyPos.fy * H - th / 2, 8, H - th - 8);
    btn.style.left = (W - tw - 10) + "px"; btn.style.top = top + "px"; // 恒定贴右
    btn.style.right = "auto"; btn.style.bottom = "auto";
  } else {
    btn.style.left = btn.style.top = btn.style.right = btn.style.bottom = ""; // 回落到 CSS 默认（右侧 20%）
  }
  layoutTermDrawer(btn, drawer);
}

// 抽屉贴着钮：空间够就向左拉出（side-right），否则向右拉出（side-left）；竖直中心对齐钮
function layoutTermDrawer(btn, drawer) {
  const W = window.innerWidth, H = window.innerHeight, gap = 6;
  const r = btn.getBoundingClientRect();
  drawer.classList.remove("side-left", "side-right");
  if (r.left >= 150 || r.left >= W - r.right) {
    drawer.classList.add("side-right");
    drawer.style.right = (W - r.left + gap) + "px"; drawer.style.left = "8px";
  } else {
    drawer.classList.add("side-left");
    drawer.style.left = (r.right + gap) + "px"; drawer.style.right = "8px";
  }
  const dh = drawer.offsetHeight || 52;
  drawer.style.top = clampn(r.top + r.height / 2 - dh / 2, 8, H - dh - 8) + "px";
  drawer.style.bottom = "auto";
}

// 长按拖动交互：轻点=开/关抽屉；长按≈350ms 抓起，跟手移动，松手落位并记忆
function setupTermKeyDrag() {
  const btn = $("termkeystoggle");
  if (!btn || btn.dataset.dragBound) return;
  btn.dataset.dragBound = "1";
  let holdTimer = null, dragging = false, moved = false, pid = null, sx = 0, sy = 0;
  const end = () => {
    if (pid === null) return;
    clearTimeout(holdTimer);
    if (dragging) {
      // 松手：保留用户选的竖直位置，水平吸附回最右侧（带回弹动画）
      const W = window.innerWidth, H = window.innerHeight;
      const tw = btn.offsetWidth || 44, th = btn.offsetHeight || 40;
      const r = btn.getBoundingClientRect();
      const top = clampn(r.top, 8, H - th - 8);
      termKeyPos = { fy: (top + th / 2) / H };
      try { localStorage.setItem(TERMKEYPOS_KEY, JSON.stringify(termKeyPos)); } catch {}
      btn.classList.remove("dragging");
      btn.classList.add("snapping");
      btn.style.left = (W - tw - 10) + "px"; btn.style.top = top + "px";
      layoutTermDrawer(btn, $("termkeys"));
      setTimeout(() => btn.classList.remove("snapping"), 240);
    } else if (!moved) {
      setTermKeysOpen(!document.body.classList.contains("termkeysopen")); // 纯轻点=切换
    }
    dragging = false; moved = false; pid = null;
  };
  btn.addEventListener("pointerdown", (e) => {
    pid = e.pointerId; sx = e.clientX; sy = e.clientY; moved = false; dragging = false;
    holdTimer = setTimeout(() => {
      dragging = true; btn.classList.add("dragging");
      try { btn.setPointerCapture(pid); } catch {}
      try { navigator.vibrate?.(15); } catch {}
    }, 350);
  });
  btn.addEventListener("pointermove", (e) => {
    if (e.pointerId !== pid) return;
    if (!dragging) { if (Math.hypot(e.clientX - sx, e.clientY - sy) > 10) { moved = true; clearTimeout(holdTimer); } return; }
    e.preventDefault();
    const W = window.innerWidth, H = window.innerHeight;
    const tw = btn.offsetWidth || 44, th = btn.offsetHeight || 40;
    btn.style.left = clampn(e.clientX - tw / 2, 8, W - tw - 8) + "px";
    btn.style.top = clampn(e.clientY - th / 2, 8, H - th - 8) + "px";
    btn.style.right = "auto"; btn.style.bottom = "auto";
    layoutTermDrawer(btn, $("termkeys"));
  });
  btn.addEventListener("pointerup", end);
  btn.addEventListener("pointercancel", end);
  addEventListener("resize", () => { if (document.body.classList.contains("interminal")) layoutTermKeys(); });
  addEventListener("orientationchange", () => { if (document.body.classList.contains("interminal")) layoutTermKeys(); });
}

// —— 悬浮输入框：先在文本框里拼好整行再一次性发送（手机上比逐字敲进 PTY 好用）——
// 展开时 field.focus() 唤起软键盘，visualViewport 那套逻辑（keyboardTargetFocused 已含本框）
// 会把整个 #termkeyswrap 顶到键盘上沿，故 bar 自动落在键盘正上方。
function setTermInputOpen(open) {
  document.body.classList.toggle("terminputopen", open);
  const f = $("terminputfield");
  if (open) { layoutTermInput(); f.focus(); }
  else { f.blur(); }
}

function sendTermInput() {
  const f = $("terminputfield");
  const v = f.value;
  if (!v) { f.focus(); return; }
  termSendRaw(v + "\r"); // 整行 + 回车：对 shell 命令、Claude 提示词都通用
  f.value = "";
  f.focus(); // 保持展开、可继续输入下一条
}

// —— 悬浮输入钮：位置可长按拖动、左右吸附、按浏览器记忆 ——
const TERMINPUTPOS_KEY = "czr-terminputpos"; // {side:'l'|'r', fy}
let termInputPos = null;
try { termInputPos = JSON.parse(localStorage.getItem(TERMINPUTPOS_KEY) || "null"); } catch {}

function layoutTermInput() {
  const btn = $("terminputtoggle");
  if (!btn) return;
  const W = window.innerWidth, H = window.innerHeight;
  const th = btn.offsetHeight || 40;
  if (termInputPos) {
    const top = clampn(termInputPos.fy * H - th / 2, 8, H - th - 8);
    btn.style.top = top + "px"; btn.style.bottom = "auto";
    if (termInputPos.side === "l") { btn.style.left = "10px"; btn.style.right = "auto"; }
    else { btn.style.right = "10px"; btn.style.left = "auto"; }
  } else {
    btn.style.left = btn.style.top = btn.style.right = btn.style.bottom = ""; // 回落 CSS 默认（右侧、快捷键钮上方）
  }
}

function setupTermInputDrag() {
  const btn = $("terminputtoggle");
  if (!btn || btn.dataset.dragBound) return;
  btn.dataset.dragBound = "1";
  let holdTimer = null, dragging = false, moved = false, pid = null, sx = 0, sy = 0;
  const snapTo = (side, top) => {
    if (side === "l") { btn.style.left = "10px"; btn.style.right = "auto"; }
    else { btn.style.right = "10px"; btn.style.left = "auto"; }
    btn.style.top = top + "px"; btn.style.bottom = "auto";
  };
  const end = () => {
    if (pid === null) return;
    clearTimeout(holdTimer);
    if (dragging) {
      // 松手：竖直保留，水平吸附到更近的一侧（左/右）并记忆
      const W = window.innerWidth, H = window.innerHeight;
      const tw = btn.offsetWidth || 44, th = btn.offsetHeight || 40;
      const r = btn.getBoundingClientRect();
      const side = (r.left + tw / 2) < W / 2 ? "l" : "r";
      const top = clampn(r.top, 8, H - th - 8);
      termInputPos = { side, fy: (top + th / 2) / H };
      try { localStorage.setItem(TERMINPUTPOS_KEY, JSON.stringify(termInputPos)); } catch {}
      btn.classList.remove("dragging");
      btn.classList.add("snapping");
      snapTo(side, top);
      setTimeout(() => btn.classList.remove("snapping"), 240);
    } else if (!moved) {
      setTermInputOpen(!document.body.classList.contains("terminputopen")); // 轻点=开/关输入框
    }
    dragging = false; moved = false; pid = null;
  };
  btn.addEventListener("pointerdown", (e) => {
    pid = e.pointerId; sx = e.clientX; sy = e.clientY; moved = false; dragging = false;
    holdTimer = setTimeout(() => {
      dragging = true; btn.classList.add("dragging");
      try { btn.setPointerCapture(pid); } catch {}
      try { navigator.vibrate?.(15); } catch {}
    }, 350);
  });
  btn.addEventListener("pointermove", (e) => {
    if (e.pointerId !== pid) return;
    if (!dragging) { if (Math.hypot(e.clientX - sx, e.clientY - sy) > 10) { moved = true; clearTimeout(holdTimer); } return; }
    e.preventDefault();
    const W = window.innerWidth, H = window.innerHeight;
    const tw = btn.offsetWidth || 44, th = btn.offsetHeight || 40;
    btn.style.left = clampn(e.clientX - tw / 2, 8, W - tw - 8) + "px";
    btn.style.top = clampn(e.clientY - th / 2, 8, H - th - 8) + "px";
    btn.style.right = "auto"; btn.style.bottom = "auto";
  });
  btn.addEventListener("pointerup", end);
  btn.addEventListener("pointercancel", end);
  addEventListener("resize", () => { if (document.body.classList.contains("interminal")) layoutTermInput(); });
  addEventListener("orientationchange", () => { if (document.body.classList.contains("interminal")) layoutTermInput(); });
}

// 菜单里两个悬浮钮显隐开关的勾选态（✓ = 显示）
function updateTermOverlayChecks() {
  const k = $("cktermkeys"), i = $("ckterminput");
  if (k) k.textContent = document.body.classList.contains("hidetermkeys") ? "" : "✓";
  if (i) i.textContent = document.body.classList.contains("hideterminput") ? "" : "✓";
}

// —— 尺寸 ——
function fitTerm({ send } = {}) {
  const st = app.term;
  if (!st) return;
  if (!st.isOwner && st.generation) return; // 非 owner 不改真实尺寸（§4.7）
  requestAnimationFrame(() => {
    if (!app.term || app.term !== st) return;
    try { st.fit.fit(); } catch {}
    if (send && st.isOwner) {
      clearTimeout(st.resizeTimer);
      // 软键盘/旋转动画期间不连续轰炸 PTY：稳定 400ms 后发最终值
      st.resizeTimer = setTimeout(() => {
        if (app.term !== st || !st.isOwner) return;
        app.session.request("terminal.resize", {
          terminalId: st.id, cols: st.xt.cols, rows: st.xt.rows,
        }).catch(() => {});
      }, 400);
    }
  });
}

// 离开终端页（视图部分；popstate/返回键统一走这里）
function disposeTermPage() {
  const st = app.term;
  if (!st) return;
  clearTimeout(st.resizeTimer);
  clearTimeout(st.reattachTimer);
  app.session?.request("terminal.detach", { terminalId: st.id }).catch(() => {});
  try { st.xt.dispose(); } catch {}
  app.term = null;
  $("termscreen").innerHTML = "";
  $("termnotice").className = "";
  document.documentElement.style.setProperty("--termkbdgap", "0px");
}

function closeTerminalPageView() {
  disposeTermPage();
  app.view = "list";
  document.body.classList.remove("interminal", "termkeysopen");
  $("back").style.display = "none";
  $("sharebtn").style.display = "";
  setTitle(t("brand"));
  updateStatusPill();
  updateHomeTab();
  refreshTerminals().catch(() => {});
}

async function main() {
  // i18n：先定语言，填静态标记，再渲染任何视图
  document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";
  document.title = t("brand");
  applyStaticI18n();
  // 一次性 DOM 绑定
  // 页面左上角返回也走 history.back()，与系统返回键统一：消费掉进会话时压的历史项，
  // 由下面的 popstate 处理器执行 closeSession，避免残留一条“前进”历史。
  $("back").onclick = () => history.back();
  // 关掉浏览器的滚动自动恢复：SPA 自己管滚动，否则按返回时 popstate 会把还显示着的
  // 会话页滚动位置回滚到首页记忆值，造成返回瞬间“闪一下”。
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  // 起手压一条"首页哨兵"历史项，让首页的返回键也能被 popstate 接住（否则首页返回直接退出）。
  history.pushState({ czr: "home" }, "");
  // 手机系统返回键/右滑返回：
  //  · 会话内 → 回首页（会话历史项已被弹出，栈里仍留首页哨兵）；
  //  · 首页 → 拦一次并提示，1.6s 内再按一次才真正退出（防误触）。
  window.addEventListener("popstate", () => {
    // 终端页返回：退订观察（不结束 PTY），回终端列表
    if (app.view === "terminal") { closeTerminalPageView(); return; }
    // 观众无列表可回：返回键与首页同款"再按一次退出"
    if (app.view === "session" && !app.isViewer) { closeSession().catch(() => {}); return; }
    if (app.backExit) { history.back(); return; } // 第二次：不再压回，放行退出
    history.pushState({ czr: "home" }, ""); // 第一次：压回哨兵，停留在首页
    app.backExit = true;
    showToast(t("toast.backexit"));
    clearTimeout(app.backExitTimer);
    app.backExitTimer = setTimeout(() => { app.backExit = false; }, 1600);
  });
  bindPullToLoad(); // 会话顶部下拉加载更早历史
  bindReplaySentinel(); // 回放模式的底部继续加载哨兵
  $("send").onclick = sendMessage;
  $("stop").onclick = stopTurn;
  $("input").addEventListener("input", () => { autoGrow(); updateSendState(); updateSuggest(); });
  $("input").addEventListener("blur", () => setTimeout(hideSuggest, 150)); // 延迟：让面板的 pointerdown 先落地
  // ➕ 动作菜单：拍照 / 选照片 / 粘贴图片
  $("attach").onclick = (e) => {
    e.stopPropagation();
    $("plusmenu").classList.toggle("open");
  };
  document.addEventListener("click", (e) => {
    if (!$("plusmenu").contains(e.target)) $("plusmenu").classList.remove("open");
    if (!$("topmenu").contains(e.target)) $("topmenu").classList.remove("open");
    if (!$("agentpick").contains(e.target)) $("agentpick").classList.remove("open");
  });
  $("plusmenu").onclick = async (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    $("plusmenu").classList.remove("open");
    const file = $("file");
    if (act === "plan") {
      setPlanMode(!app.planMode);
    } else if (act === "goal") {
      await editGoal();
    } else if (act === "tfile") {
      $("tfile").click();
    } else if (act === "camera") { // capture 属性直接起相机；选照片路径则走相册
      file.setAttribute("capture", "environment");
      file.click();
    } else if (act === "photos") {
      file.removeAttribute("capture");
      file.click();
    } else if (act === "paste") {
      await pasteImage();
    }
  };
  $("file").onchange = async () => {
    await pickFiles([...$("file").files]);
    $("file").value = ""; // 允许再次选择同一张
  };
  $("tfile").onchange = async () => {
    const f = $("tfile").files[0];
    if (f) await attachTextFile(f).catch(() => showBanner(t("banner.filereadfail")));
    $("tfile").value = "";
  };
  $("planpill").onclick = () => setPlanMode(false);
  app.turnOpts = loadTurnOpts();
  updateOptButtons();
  $("permbtn").onclick = openPermSheet;
  $("modelbtn").onclick = openModelSheet;
  $("permsheet").onclick = (e) => { if (e.target === $("permsheet")) $("permsheet").classList.remove("open"); };
  $("modelsheet").onclick = (e) => { if (e.target === $("modelsheet")) $("modelsheet").classList.remove("open"); };
  $("quickcommandsenabled").onchange = () => {
    if (quickCommandsDraft) quickCommandsDraft.enabled = $("quickcommandsenabled").checked;
  };
  $("quickcommandadd").onclick = () => {
    if (!quickCommandsDraft) return;
    if (quickCommandsDraft.items.length >= QUICK_COMMANDS_MAX) {
      $("quickcommanderror").textContent = t("quick.limit");
      return;
    }
    quickCommandsDraft.items.push({ id: newQuickCommandId(), text: "" });
    renderQuickCommandsSheet();
    $("quickcommandlist").lastElementChild?.querySelector("input")?.focus();
  };
  $("quickcommandcancel").onclick = closeQuickCommandsSheet;
  $("quickcommandclose").onclick = closeQuickCommandsSheet;
  $("quickcommandsave").onclick = saveQuickCommandsSheet;
  $("quickcommandssheet").onclick = (e) => { if (e.target === $("quickcommandssheet")) closeQuickCommandsSheet(); };
  // 桌面（精确指针）Enter 发送、Shift+Enter 换行；手机键盘 Enter 保持换行；中文输入法合成中不触发
  $("input").addEventListener("keydown", (e) => {
    // 建议面板打开时接管方向/回车/Tab/Esc（先于"回车发送"）
    if (sug.mode && !e.isComposing) {
      if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        e.preventDefault();
        moveSuggest(e.key === "ArrowDown" ? 1 : -1);
        return;
      }
      if ((e.key === "Enter" || e.key === "Tab") && !e.shiftKey) {
        e.preventDefault();
        applySuggest(sug.hi);
        return;
      }
      if (e.key === "Escape") {
        hideSuggest();
        return;
      }
    }
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing && matchMedia("(pointer: fine)").matches) {
      e.preventDefault();
      sendMessage();
    }
  });
  $("jump").onclick = () => { scrollToBottom(); updateJump(); updateEarlierHint(); };
  window.addEventListener("scroll", () => { updateJump(); updateEarlierHint(); }, { passive: true });
  // iOS 软键盘不压缩布局视口（不认 interactive-widget），fixed 输入区会被键盘整个盖住：
  // 用 visualViewport 实测可视高度，把输入区顶到键盘上沿
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const setKeyboardShift = (shift) => {
      $("composer").style.transform = shift;
      $("jump").style.transform = shift;
      $("homebar").style.transform = shift; // 首页搜索框也不能被键盘盖住
      $("termkeyswrap").style.transform = shift; // 终端快捷键浮层顶到键盘上沿
    };
    const keyboardTargetFocused = () =>
      document.activeElement === $("input") || document.activeElement === $("search") ||
      document.activeElement === $("terminputfield") || // 悬浮输入框聚焦：也要把浮层顶到键盘上沿
      // 终端直连键盘：焦点在 xterm 隐藏 helper textarea 上
      (app.view === "terminal" && $("termscreen").contains(document.activeElement));
    const adjust = () => {
      const gap = keyboardTargetFocused() ? Math.max(0, window.innerHeight - vv.height - vv.offsetTop) : 0;
      const shift = gap > 80 ? `translateY(-${Math.round(gap)}px)` : "";
      setKeyboardShift(shift);
      // 终端画布随键盘缩到上沿：--termkbdgap 缩短 #termscreen，再 refit 让 xterm 缩行
      if (app.view === "terminal") {
        document.documentElement.style.setProperty("--termkbdgap", gap > 80 ? `${Math.round(gap)}px` : "0px");
        if (app.term) fitTerm({ send: app.term.isOwner });
      }
    };
    const scheduleAdjust = () => {
      requestAnimationFrame(adjust);
      setTimeout(adjust, 120);
    };
    vv.addEventListener("resize", adjust);
    vv.addEventListener("scroll", adjust);
    document.addEventListener("focusin", scheduleAdjust);
    document.addEventListener("focusout", scheduleAdjust);
    window.addEventListener("pageshow", adjust);
    document.addEventListener("visibilitychange", adjust);
  }
  $("search").addEventListener("input", () => {
    app.filter = $("search").value;
    renderList();
  });
  $("titlehit").onclick = () => { if (!app.isViewer) openSheet(); }; // 观众不进"切换电脑"（切进去出不来）
  $("sharebtn").onclick = openShareSheet;
  $("sharesheet").onclick = (e) => { if (e.target === $("sharesheet")) $("sharesheet").classList.remove("open"); };
  $("projectcancel").onclick = closeProjectActions;
  $("projectarchive").onclick = () => {
    const target = projectActionTarget;
    closeProjectActions();
    if (target) archiveProject(target.cwd, target.name);
  };
  $("projectsheet").onclick = (e) => { if (e.target === $("projectsheet")) closeProjectActions(); };
  $("forkcancel").onclick = closeForkConfirm;
  $("forklocal").onclick = async () => {
    closeForkConfirm();
    await forkCurrentSession();
  };
  $("forksheet").onclick = (e) => { if (e.target === $("forksheet")) closeForkConfirm(); };
  $("confirmcancel").onclick = () => closeConfirmSheet(false);
  $("confirmok").onclick = () => closeConfirmSheet(true);
  $("confirmsheet").onclick = (e) => { if (e.target === $("confirmsheet")) closeConfirmSheet(false); };
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && $("confirmsheet").classList.contains("open")) closeConfirmSheet(false);
    else if (e.key === "Escape" && $("projectsheet").classList.contains("open")) closeProjectActions();
    else if (e.key === "Escape" && $("quickcommandssheet").classList.contains("open")) closeQuickCommandsSheet();
  });
  // 观众喝彩：枚举表情，前端 300ms 防抖（服务端另有令牌桶）；渲染靠广播回流，双端一致
  const EMOJI = ["👏", "🔥", "❤️", "😂", "🤯"];
  for (const emoji of EMOJI) {
    const b = document.createElement("button");
    b.textContent = emoji;
    b.onclick = () => {
      const now = Date.now();
      if (now - (app.lastReactAt ?? 0) < 300) return;
      app.lastReactAt = now;
      app.session?.request("share.react", { emoji }).catch(() => {});
    };
    $("vreact").appendChild(b);
  }
  // 转发围观：复制同一条链接（链接自我裂变，每一跳都不需要回到创作者）
  $("vshare").onclick = async () => {
    let raw = null;
    try { raw = JSON.parse(sessionStorage.getItem("czr-viewer") || "null")?.raw; } catch {}
    if (!raw) { showToast(t("toast.linkunavail")); return; }
    const url = `${location.origin}${location.pathname}#d=${raw}`;
    if (navigator.share) {
      navigator.share({ title: t("share.systitle2"), url }).catch(() => {});
    } else {
      showToast((await copyText(url)) ? t("toast.linkcopied") : t("toast.copyfail"));
    }
  };
  // 一键复制 prompt：观众学的核心就是"他是怎么跟 agent 说话的"（纯前端）
  $("log").addEventListener("click", async (e) => {
    if (!app.isViewer) return;
    const bubble = e.target.closest(".msg.user .bubble");
    if (!bubble) return;
    showToast((await copyText(bubble.textContent)) ? t("toast.promptcopied") : t("toast.copyfail"));
  });
  $("newchat").onclick = newSession;
  // ⋯ 菜单：组织方式切换 + 外观/字体/语言 + 管理入口
  applyTheme(getTheme()); // 补齐 meta theme-color（变量层已在头部脚本提前生效）
  $("menubtn").onclick = (e) => {
    e.stopPropagation();
    updateOrganizeChecks();
    updateThemeChecks();
    updateFontChecks();
    updateLangChecks();
    updateTermOverlayChecks();
    updateMenuState();
    $("agentpick").classList.remove("open");
    $("topmenu").classList.toggle("open");
  };
  $("topmenu").onclick = (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    if (act === "toggle-termkeys" || act === "toggle-terminput") {
      // 悬浮钮显隐开关：切 body 类、落盘、更新勾选；关掉的顺手收起其展开态。菜单保持打开。
      const which = act === "toggle-termkeys"
        ? { cls: "hidetermkeys", key: "czr-show-termkeys", collapse: () => setTermKeysOpen(false) }
        : { cls: "hideterminput", key: "czr-show-terminput", collapse: () => setTermInputOpen(false) };
      const hidden = document.body.classList.toggle(which.cls);
      localStorage.setItem(which.key, hidden ? "0" : "1");
      if (hidden) which.collapse();
      updateTermOverlayChecks();
      return;
    }
    if (act === "proj" || act === "time") {
      app.organize = act;
      localStorage.setItem("czr-organize", act);
      updateOrganizeChecks();
      renderList();
    } else if (act === "th-light" || act === "th-dark") {
      applyTheme(act.slice(3));
      updateThemeChecks();
    } else if (act === "fs-normal" || act === "fs-large") {
      applyFontSize(act.slice(3));
      updateFontChecks();
    } else if (act === "lang-zh" || act === "lang-en") {
      applyLang(act.slice(5));
    } else if (act === "archive-session") {
      archiveCurrentSession();
    } else if (act === "quick-commands") {
      $("topmenu").classList.remove("open");
      openQuickCommandsSheet();
    } else if (act === "pc") {
      $("topmenu").classList.remove("open");
      openSheet();
    } else if (act === "diag") {
      $("topmenu").classList.remove("open");
      openDiag();
    }
  };
  // —— Terminal Mode 绑定 ——
  $("newterm").onclick = openTermSheet;
  $("termstart").onclick = startTerminal;
  $("termcwd").addEventListener("input", (e) => renderTermCwds(e.target.value)); // 输入即筛工作目录
  $("termsheet").onclick = (e) => { if (e.target === $("termsheet")) $("termsheet").classList.remove("open"); };
  // 启动方式编辑：切换编辑态 / 保存 / 删除 / 点背景关编辑器
  $("termedit").onclick = () => { app.termPresetEdit = !app.termPresetEdit; renderTermPresets(); };
  $("termpsave").onclick = savePresetDraft;
  $("termpdel").onclick = async () => { if (presetDraftIndex >= 0 && await deleteTermPreset(presetDraftIndex)) closePresetEditor(); };
  $("termpresetsheet").onclick = (e) => { if (e.target === $("termpresetsheet")) closePresetEditor(); };
  setupTermKeyDrag();
  setupTermInputDrag();
  // 用 pointerdown + preventDefault：点发送不夺走输入框焦点（否则键盘会闪一下）
  $("terminputsend").addEventListener("pointerdown", (e) => { e.preventDefault(); sendTermInput(); });
  $("terminputfield").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); sendTermInput(); } });
  // 恢复"隐藏悬浮钮"的记忆（默认都显示）
  if (localStorage.getItem("czr-show-termkeys") === "0") document.body.classList.add("hidetermkeys");
  if (localStorage.getItem("czr-show-terminput") === "0") document.body.classList.add("hideterminput");
  // 终端触摸：手指拖动 → 用 xterm 官方 scrollLines() 滚回滚区（screen 覆盖 viewport，原生触摸滚不到；
  // 直接改 viewport.scrollTop xterm 不认，故走 API）。按像素累计换算成行；几乎没移动的轻点 → 聚焦唤起软键盘。
  // 注意：grok/vim 等全屏 TUI 用备用屏缓冲，本身没有回滚，滚动无效属正常（用其自身方向键翻页）。
  {
    const scr = $("termscreen");
    let tY = null, tX = null, moved = false, accum = 0;
    scr.addEventListener("touchstart", (e) => {
      const t = e.touches[0]; tY = t.clientY; tX = t.clientX; moved = false; accum = 0;
    }, { passive: true });
    scr.addEventListener("touchmove", (e) => {
      if (tY == null || !app.term) return;
      const t = e.touches[0], xt = app.term.xt;
      if (Math.abs(t.clientY - tY) > 6 || Math.abs(t.clientX - tX) > 6) moved = true;
      const rowH = Math.max(8, scr.clientHeight / (xt.rows || 24));
      accum += t.clientY - tY; // 手指下移为正
      tY = t.clientY; tX = t.clientX;
      const lines = Math.trunc(accum / rowH);
      if (lines !== 0) {
        accum -= lines * rowH;
        if (xt.buffer.active.type === "alternate") {
          // 全屏 TUI（备用屏，无本地回滚）：模拟桌面滚轮交给 App 自己滚。需 owner。
          if (app.term.isOwner) {
            const n = Math.min(Math.abs(lines), 4); // 单次限幅，猛滑不狂发
            const mouseOn = xt.modes?.mouseTrackingMode && xt.modes.mouseTrackingMode !== "none";
            if (mouseOn) {
              // grok/claude/codex 等开了鼠标上报：发 SGR 滚轮事件（桌面滚轮也是这条路），App 滚自己的内容。
              // 之前发方向键会被当成输入行的历史切换——正是这个 bug。
              const rect = scr.getBoundingClientRect();
              const col = Math.min(xt.cols, Math.max(1, Math.ceil((t.clientX - rect.left) / (rect.width / xt.cols))));
              const row = Math.min(xt.rows, Math.max(1, Math.ceil((t.clientY - rect.top) / (rect.height / xt.rows))));
              const btn = lines > 0 ? 64 : 65; // 64=上滚（看更早） 65=下滚
              termSendRaw(`\x1b[<${btn};${col};${row}M`.repeat(n));
            } else {
              // 无鼠标上报（less/man 等）：转方向键，跟桌面 wheel→方向键一致
              const arrow = lines > 0 ? "A" : "B";
              termSendRaw(((xt.modes?.applicationCursorKeysMode ? "\x1bO" : "\x1b[") + arrow).repeat(n));
            }
          }
        } else {
          xt.scrollLines(-lines); // 普通屏：本地滚回滚区（下移→上滚）
        }
      }
    }, { passive: true });
    scr.addEventListener("touchend", () => {
      if (!moved && app.term) { try { app.term.xt.focus(); } catch {} } // 轻点聚焦
      tY = null;
    }, { passive: true });
  }
  window.addEventListener("resize", () => {
    if (app.view === "terminal") fitTerm({ send: true });
  });
  $("sheet").onclick = (e) => { if (e.target === $("sheet")) $("sheet").classList.remove("open"); };
  $("dirsheet").onclick = (e) => { if (e.target === $("dirsheet")) $("dirsheet").classList.remove("open"); };
  $("diagsheet").onclick = (e) => { if (e.target === $("diagsheet")) $("diagsheet").classList.remove("open"); };
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      if (backgroundWatchTimer) clearTimeout(backgroundWatchTimer);
      backgroundWatchTimer = null;
      app.session?.ensureAlive();
      resumeCurrentWatch().catch(() => {});
      // 后台期间 active 复核定时器不打（见 scheduleActiveRecheck）：回前台补一次列表刷新，
      // 让"桌面活动/运行中"徽标立即对齐现状，而不是等下一个 board.changed
      if (app.session && app.view === "list" && !app.isViewer) refreshList().catch(() => {});
    } else {
      app.session?.stopPing(); // 切后台立即停心跳，不留后台流量
      app.session?.rtc?.stopPing(); // 直连通道同理（通道本身留着，回前台 verify 验活）
      app.session?.pauseWatchRenewal();
      if (backgroundWatchTimer) clearTimeout(backgroundWatchTimer);
      backgroundWatchTimer = setTimeout(() => {
        backgroundWatchTimer = null;
        if (document.visibilityState !== "visible") suspendCurrentWatch().catch(() => {});
      }, BACKGROUND_UNWATCH_GRACE_MS);
    }
  });
  // 页面被系统回收/导航离开时不等 15s；若异步发送来不及完成，daemon 端租约仍会兜底。
  window.addEventListener("pagehide", () => {
    app.session?.pauseWatchRenewal();
    suspendCurrentWatch().catch(() => {});
  });
  // 蜂窝↔WiFi 切换、飞行模式恢复：不等退避计时，马上验活/重连。
  // 后台收到 online 不动作（保持零后台活动），回前台由 visibilitychange 补上
  window.addEventListener("online", () => {
    if (document.visibilityState === "visible") app.session?.ensureAlive();
  });
  // 注册 Service Worker（PWA 离线壳）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  // 通知深链 #s=<sessionId>：连上后直达该会话（在 loadDaemonInfo 之前解析，二者不共存）
  const hashParams = new URLSearchParams(location.hash.slice(1));
  if (hashParams.get("s")) {
    app.deepLink = hashParams.get("s");
    app.deepLinkAgent = hashParams.get("a") || null; // Claude 通知深链带 a=claude
    history.replaceState(null, "", location.pathname);
  } else if (hashParams.get("t")) {
    app.deepLinkTerminal = hashParams.get("t"); // 终端通知深链（#t=<terminalId>，§12.3）
    history.replaceState(null, "", location.pathname);
  }

  const info = loadDaemonInfo();
  if (!info) {
    renderOnboarding();
    $("status").textContent = t("status.unpaired");
    return;
  }
  startSession(info);
}
// 本地预览调试钩子：控制台注入假数据即可渲染各视图，不影响正常逻辑
window.__czr = { app, net, renderList, renderInto, renderApprovals, showApproval, setRunning, setTitle,
                 updateStatusPill, openDiag, onLive, appendStream, renderOnboarding,
                 renderAttachments, updateSendState, enqueue, addEcho, autoGrow,
                 openPermSheet, openModelSheet, updateOptButtons, renderModelSheet,
                 setPlanMode, editGoal, attachTextFile };
main();
</script>
</body>
</html>
