  }
  const main = document.createElement("div");

  box.innerHTML = "";
  for (const p of PERM_PRESETS) {

      ? `${p.desc} · ${computerPermissionText()}`

    sheetRow(box, {

        app.turnOpts.perm = p.key;

async function openModelSheet() {
  $("modelsheet").classList.add("open");
  const box = $("modellist");
  if (!app.models) {
    if (net.link !== "ok" || net.daemon === false) {
      $("modelsheet").classList.remove("open");
      showBanner(t("banner.offline_models"));
      return;
    }
    box.innerHTML = `<div class="notice">${t("model.loading")}</div>`;

function renderModelSheet() {
  const box = $("modellist");
  box.innerHTML = "";
  const computerModel = modelWithEffortText(app.modelState ?? defaultModelMeta());
  const followSub = [t("model.followpc.sub"), computerModel && t("model.followpc.current", computerModel)]
    .filter(Boolean).join(" · ");
  sheetRow(box, {

    onclick: () => {
      app.turnOpts.model = null;

      onclick: () => { // 选模型即选中并关闭；力度取该模型默认值，重开弹层可在底部微调
        app.turnOpts.model = m.id;

// 分块上传（image.fetch 的镜像：单块 ≤144k base64 字符，最坏帧 ~193KB 稳在 relay 256KiB 上限内）
async function uploadImage(a) {
  const id = crypto.randomUUID().replace(/-/g, "").slice(0, 16);
  const CHUNK = 144000;
  for (let o = 0; o < a.b64.length; o += CHUNK) {
    await app.session.request("image.push", {
      id,
      mime: a.mime,
      data: a.b64.slice(o, o + CHUNK),
      eof: o + CHUNK >= a.b64.length,
    }, 30000);
  }
  return id;
}

async function stopTurn() {
  if (!app.currentId) return;
  // 即时反馈：真正的停止确认要等 turn 结束事件，期间按钮置灰、提示"正在停止"
  $("stop").disabled = true;
  $("runhint").innerHTML = `<span class="pulse"></span>${t("runhint.stopping")}`;
  $("runhint").style.display = "block";
  try {
    const r = await app.session.request("turn.interrupt", { sessionId: app.currentId });
    if (!r.ok && r.reason) showBanner(t("banner.stop_noeffect", r.reason));
  } catch (err) {
    showBanner(t("banner.stop_fail", err.message));
  } finally {
    $("stop").disabled = false;
  }
}

// 新建会话：从项目列表提取常用目录（daemon 聚合的全量项目，比"最近会话"更全更准），
// 点选即建，手输仅作兜底
function newSession() {
  if (net.link !== "ok" || net.daemon === false) {
    showBanner(t("banner.offline_newsession"));
    return;
  }
  const dirs = [];
  const seen = new Set();
  // 优先取真正的项目目录（已按最近活跃排序）；老 daemon 回退态无 projects 时退回已知会话
  const source = app.projects.length
    ? app.projects.filter((p) => isProjectDir(p.cwd)).map((p) => p.cwd)
    : [...app.knownById.values()].map((s) => s.cwd);
  for (const raw of source) {
    const cwd = (raw || "").trim();
    if (!cwd || seen.has(cwd)) continue;
    seen.add(cwd);
    dirs.push(cwd);
    if (dirs.length >= 8) break;
  }
  const box = $("dirlist");
  box.innerHTML = "";
  const addRow = (title, sub, onclick) => {
    const row = document.createElement("div");
    row.className = "drow";
    const main = document.createElement("div");
    main.className = "dname";
    const t = document.createElement("div");
    t.textContent = title;
    main.appendChild(t);
    if (sub) {
      const d = document.createElement("div");
      d.className = "dsub";
      d.textContent = sub;
      main.appendChild(d);
    }
    row.appendChild(main);
    row.onclick = onclick;
    box.appendChild(row);
  };
  for (const dir of dirs) {
    addRow(dir.split(/[\\/]/).pop() || dir, dir, () => openDraftSession(dir));
  }
  addRow(t("dir.default"), t("dir.default_sub"), () => openDraftSession(undefined));
  addRow(t("dir.other"), t("dir.other_sub"), () => {
    $("dirsheet").classList.remove("open");
    const cwd = prompt(t("prompt.cwd"), "");
    if (cwd === null) return;
    openDraftSession(cwd.trim() || undefined);
  });
  $("dirsheet").classList.add("open");
}

function openDraftSession(cwd) {
  $("dirsheet").classList.remove("open");
  const id = `draft:${Date.now()}:${Math.random().toString(36).slice(2, 8)}`;
  app.draft = { id, cwd: cwd || "", title: t("session.new") };
  showBanner("");
  openSession(id, t("session.new"), { draft: true });

async function createSession(cwd) {
  $("dirsheet").classList.remove("open");
  showBanner(t("banner.creating"), null, true);
  try {
    const res = await app.session.request("session.new", { cwd }, 90000);
    if (res.threadId) {
      app.knownById.set(res.threadId, {
        id: res.threadId,
        name: null,
        preview: "",
        cwd: cwd || "",
        updatedAt: Math.floor(Date.now() / 1000),
        source: "",
        status: "unknown",
      });
      app.lastSessions = [...app.knownById.values()];
      showBanner("");
      openSession(res.threadId, t("session.new"), { fresh: true });
    } else {
      showBanner(t("banner.create_noid"));

  } catch (err) {
    showBanner(t("banner.create_fail", err.message));
  }
}

async function forkCurrentSession() {
  if (!app.currentId || isDraftSession() || app.agent !== "codex") return;
  try {
    const base = app.knownById.get(app.currentId);
    const res = await app.session.request("session.fork", { sessionId: app.currentId }, 90000);
    if (!res.threadId) throw new Error(t("banner.create_noid"));
    app.knownById.set(res.threadId, {
      id: res.threadId,
      name: null,
      preview: "",
      cwd: res.cwd || base?.cwd || "",

    app.lastSessions = [...app.knownById.values()];
    showToast(t("toast.forked"));
    openSession(res.threadId, t("session.fork"));

    showBanner(isUnknownMethodError(err, "session.fork")

// —— 审批：当前会话内嵌对话流，其余全局置顶；任一设备处理后各端同步消失 ——
let titleBlink = null;
function updateTitleBlink() {
  const n = app.approvals.size;
  if (n > 0 && !titleBlink) {
    let flip = false;
    titleBlink = setInterval(() => {
      flip = !flip;
      document.title = flip ? t("title.approvalsN", app.approvals.size) : t("brand");
    }, 1200);
  } else if (n === 0 && titleBlink) {
    clearInterval(titleBlink);

// 高危命令特征：不可逆删除 / 强推 / 提权。命中则红框警示，且不提供"本会话内放行"
const DANGER_RE = /\brm\s+(-[a-z]*\s+)*-[a-z]*r[a-z]*f|\bgit\s+push\s+.*--force\b|\bsudo\b|\bmkfs\b|\bdd\s+if=/i;

function buildApprovalCard(p) {
  const card = document.createElement("div");
  card.className = "approval";
  card.dataset.key = p.approvalKey;
  const title = document.createElement("div");
  title.className = "atitle";
  const sname = app.sessionNames.get(p.sessionId) || t("session.fallback");
  const kind = p.kind === "fileChange" ? t("appr.kind_file") : t("appr.kind_cmd");
  title.textContent = p.sessionId === app.currentId && app.view === "session"
    ? kind : `${sname} · ${kind}`;
  const cmdText = Array.isArray(p.command) ? p.command.join(" ") : (p.command || p.reason || t("appr.seepc"));
  const dangerous = p.kind !== "fileChange" && DANGER_RE.test(cmdText);
  const body = document.createElement("div");
  body.className = `acmd${dangerous ? " danger" : ""}`;
  if (p.kind === "fileChange" && Array.isArray(p.files) && p.files.length) {
    appendDiffFiles(body, p.files); // 文件审批：直接看 diff，不再是"详情见电脑端"
  } else {
    body.textContent = cmdText;
  }
  const btns = document.createElement("div");
  btns.className = "abtns";
  const decide = async (decision) => {
    app.approvals.delete(p.approvalKey);
    renderApprovals();
    try {
      // 回填审批请求自带的 agent：daemon 各 hub 的审批 key 独立计数，缺省会路由 codex hub
      const r = await app.session.request("approval.respond",
        { approvalKey: p.approvalKey, decision, ...(p.agent ? { agent: p.agent } : {}) });
      if (!r.ok && r.reason) showBanner(t("banner.appr_noeffect", r.reason));
    } catch (err) {
      showBanner(t("banner.appr_fail", err.message));
    }
  };
  const yes = document.createElement("button");
  yes.className = "ayes"; yes.textContent = t("appr.approve");
  yes.onclick = () => decide("accept");
  const no = document.createElement("button");
  no.className = "ano"; no.textContent = t("appr.decline");
  no.onclick = () => decide("decline");
  btns.append(yes, no);
  card.append(title, body);
  if (p.cwd) {
    const cwd = document.createElement("div");
    cwd.className = "acwd";
    cwd.textContent = t("appr.dir", p.cwd);
    card.appendChild(cwd);
  }
  if (dangerous) {
    const warn = document.createElement("div");
    warn.className = "adanger";
    warn.textContent = t("appr.danger");
    card.appendChild(warn);
  }
  card.appendChild(btns);
  if (!dangerous && p.kind !== "fileChange") {
    const all = document.createElement("button");
    all.className = "aall";
    all.textContent = t("appr.approve_session");
    all.onclick = () => decide("acceptForSession");
    card.appendChild(all);
  }
  return card;
}

// 统一重绘所有待审批卡：当前会话的插入对话流末尾，其余置顶全局区
function renderApprovals() {
  const stick = !app.loadingEarlier && nearBottom(); // 正在翻历史时不拽走用户，靠状态条与标题提醒
  $("approvals").innerHTML = "";

// —— 过程组：一轮任务的中间步骤收纳成可折叠容器 ——
// task_started 记开组状态（DOM 到第一条过程行才挂载，因为 rollout 里它先于
// user_message），中间的工具调用/文件改动/过渡性回复都进组（运行中保持摊开，
// 实时可见）；task_complete 收组：末尾的助手消息是本轮结论，挪到组外常显，
// 其余收拢成一行摘要（"已处理 X 分 X 秒"）。快照回放走同一条路，历史轮次直接呈收拢态。
function itemTs(item) {
  const t = Date.parse(item?.timestamp ?? "");
  return Number.isFinite(t) ? t : null;
}

function procStart(item) {
  if (app.proc) {
    if (app.proc.nodes?.length || app.proc.wrap) {
      procFinish(item); // 新 task_started 到达前先按它的时间收掉上一轮
    } else {
      const ts = itemTs(item) ?? (item?.payload?.started_at ? item.payload.started_at * 1000 : null);
      if (app.proc.startTs == null && ts != null) app.proc.startTs = ts;
      app.proc.live = app.proc.live || !!item;
      return;
    }
  }
  // 容器不在此刻挂：rollout 里 task_started 先于 user_message，现在挂 DOM 会跑到
  // 用户气泡上面。先记起始信息，等第一条过程行到达时再挂载（ensureProc）。
  app.proc = {
    wrap: null, body: null, label: null, count: 0, nodes: [],
    live: !!item, // task_started 开的组；false=快照截断/旧格式的懒开组（不确定是否在跑）
    startTs: itemTs(item) ?? (item?.payload?.started_at ? item.payload.started_at * 1000 : null),
  };
}

function ensureProc(mount) {
  if (!app.proc) procStart(null);
  const p = app.proc;
  if (p.wrap) return p;
  const wrap = document.createElement("div");
  wrap.className = "proc open" + (p.live ? " running" : "");
  const head = document.createElement("div");
  head.className = "proc-head";
  const chev = document.createElement("span");
  chev.className = "pchev";
  chev.textContent = "›"; // 清亮角括号，展开时 CSS 旋转 90° 指向下方（取代实心 ▶）
  const label = document.createElement("span");
  label.textContent = p.live ? t("proc.processing") : t("proc.process");
  head.append(chev, label);
  const body = document.createElement("div");
  body.className = "proc-body";
  head.onclick = () => wrap.classList.toggle("open");
  wrap.append(head, body);
  mount.appendChild(wrap);
  Object.assign(p, { wrap, body, label, at: Date.now() });
  return p;
}

function procFinish(item, aborted = false) {
  const p = app.proc;
  if (!p) return undefined;
  const records = p.nodes.filter((rec) => rec.node?.parentNode);
  const finalRecord = records.at(-1)?.kind === "assistant" ? records.at(-1) : null;
  const finalNode = markAssistantFinal(finalRecord?.node);
  const foldRecords = finalRecord ? records.slice(0, -1) : records;
  if (!foldRecords.length) {
    app.proc = null;
    p.wrap?.remove();
    return finalNode;
  }
  const first = foldRecords[0].node;
  const parent = first.parentNode;
  if (!p.wrap && parent) ensureProc(parent);
  app.proc = null;
  if (!p.wrap) return finalNode;
  if (parent && p.wrap.parentNode === parent) parent.insertBefore(p.wrap, first);
  p.wrap.classList.remove("running");
  for (const rec of foldRecords) p.body.appendChild(rec.node);
  // 兼容旧路径：若还有未登记的组内 assistant，末尾助手消息是本轮最终回复，挪到组外常显
  const last = p.body.lastElementChild;
  if (!records.length && last?.classList.contains("assistant")) {
    p.wrap.after(last);
    markAssistantFinal(last);
  }
  if (!p.body.childElementCount) { p.wrap.remove(); return; } // 纯回复轮（无步骤）：不留空壳
  const endTs = itemTs(item);
  const ms = p.startTs != null && endTs != null ? endTs - p.startTs : null;
  const steps = p.count || p.body.childElementCount; // 只剩输出/截断占位时也别显示"0 步"
  p.label.textContent = aborted
    ? t("proc.aborted", steps)
    : ms != null && ms >= 1000 ? t("proc.took", fmtDur(ms)) : t("proc.steps", steps);
  // 用户不在底部且过程区正在视口里（多半在回看输出）：不自动收，免得内容被抽走；
  // 头部摘要已就位，随时可手动收。批量回填（组还在 fragment 里）rect 全 0，恒收拢。
  // 「在读」还要求组挂载已超过几秒：快照分块是毫秒级连发，跨块的历史轮次会在
  // 视口/滚动条件上误判成在读（块间视口恰好停在组上），刚挂载的组一律照常收拢。
  const r = p.wrap.getBoundingClientRect();
  const reading = Date.now() - p.at > 3000
    && !nearBottom() && r.bottom > 0 && r.top < window.innerHeight && r.height > 0;
  if (!reading) p.wrap.classList.remove("open");
}

// ===== Claude 独立渲染路径（gate 在 isClaudeItem / app.agent === "claude"；ChatGPT 路径不触及）=====
// Claude 条目：富信封 { message:{content[]}, uuid, ... } 无 payload，一条消息含多块 → 展开成多气泡。
function isClaudeItem(item) {
  return !!item && typeof item === "object"
    && item.message != null && item.uuid !== undefined && item.payload === undefined;
}

function claudeToolIcon(name) {
  const n = String(name || "").toLowerCase();
  if (n === "bash" || n.includes("shell")) return "$";
  if (n === "read" || n === "glob" || n === "grep" || n === "ls" || n === "webfetch" || n === "websearch") return "⌕";
  if (n === "edit" || n === "write" || n === "multiedit" || n === "notebookedit") return "✎";
  if (n === "task") return "▸";
  return "⚙";
}

function claudeToolLabel(name, input) {
  const n = String(name || "");
  const inp = input && typeof input === "object" ? input : {};
  if (/^bash$/i.test(n)) return String(inp.command || n);
  if (/^(read|edit|write|multiedit|notebookedit)$/i.test(n)) return `${n} ${inp.file_path || inp.path || ""}`.trim();
  if (/^(glob|grep)$/i.test(n)) return `${n} ${inp.pattern || inp.query || ""}`.trim();
  if (/^task$/i.test(n)) return `${n} ${inp.description || ""}`.trim();
  return n || t("tool.call");
}

function claudeToolResultText(content) {
  if (typeof content === "string") return content.trim();
  if (Array.isArray(content)) {
    return content.map((c) => (typeof c === "string" ? c : (c?.text ?? ""))).join("\n").trim();
  }
  if (content && typeof content === "object") return String(content.text ?? "").trim();
  return String(content ?? "").trim();
}

// 行级 LCS diff：old/new 片段（Edit 的 old_string/new_string）→ -/+/空格前缀行。
// 输入是编辑片段（通常几十行），超大兜底成整段 -旧 +新，不做 O(n·m) 的表
function unifiedDiffLines(oldStr, newStr) {
  const a = String(oldStr ?? "").split("\n");
  const b = String(newStr ?? "").split("\n");
  if (a.length * b.length > 250_000) {
    return [...a.map((l) => `-${l}`), ...b.map((l) => `+${l}`)].join("\n");
  }
  const n = a.length;
  const m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Uint16Array(m + 1));
  for (let i = n - 1; i >= 0; i--) {
    for (let j = m - 1; j >= 0; j--) {
      dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    }
  }
  const out = [];
  let i = 0;
  let j = 0;
  while (i < n && j < m) {
    if (a[i] === b[j]) out.push(` ${a[i++]}`), j++;
    else if (dp[i + 1][j] >= dp[i][j + 1]) out.push(`-${a[i++]}`);
    else out.push(`+${b[j++]}`);
  }
  while (i < n) out.push(`-${a[i++]}`);
  while (j < m) out.push(`+${b[j++]}`);
  return out.join("\n");
}

// Claude 的文件编辑工具 → 文件改动卡（与 codex patch_apply_end 同一 diff 渲染）；
// 非编辑工具返回 null 走通用折叠行。成败留给 tool_result 回执（callId 配对）。
function claudeEditDiffFiles(name, input) {
  const n = String(name || "").toLowerCase();
  const inp = input && typeof input === "object" ? input : {};
  const path = inp.file_path || inp.notebook_path || inp.path;
  if (!path || typeof path !== "string") return null;
  if (n === "edit") {
    if (typeof inp.old_string !== "string" || typeof inp.new_string !== "string") return null;
    return [{ path, kind: "update", diff: unifiedDiffLines(inp.old_string, inp.new_string) }];
  }
  if (n === "multiedit") {
    if (!Array.isArray(inp.edits) || !inp.edits.length) return null;
    const parts = inp.edits.map((e, i) =>
      `@@ ${i + 1}/${inp.edits.length} @@\n${unifiedDiffLines(e?.old_string ?? "", e?.new_string ?? "")}`);
    return [{ path, kind: "update", diff: parts.join("\n") }];
  }
  if (n === "write") {
    if (typeof inp.content !== "string") return null;
    return [{ path, kind: "add", diff: inp.content.split("\n").map((l) => `+${l}`).join("\n") }];
  }
  if (n === "notebookedit") {
    if (typeof inp.new_source !== "string") return null;
    return [{ path, kind: "update", diff: inp.new_source.split("\n").map((l) => `+${l}`).join("\n") }];
  }
  return null;
}

// 工具 → 进行中的动词（活动行随当前工具动态显示）
function claudeToolVerb(name) {
  const n = String(name || "").toLowerCase();
  if (n === "bash" || n.includes("shell")) return t("act.bash");
  if (n === "read" || n === "notebookread") return t("act.read");
  if (n === "glob" || n === "grep" || n === "ls") return t("act.search");
  if (n === "webfetch" || n === "websearch") return t("act.web");
  if (n === "edit" || n === "write" || n === "multiedit" || n === "notebookedit") return t("act.edit");
  if (n === "task") return t("act.task");
  if (n === "todowrite") return t("act.todo");
  if (n === "taskcreate" || n === "taskupdate") return t("act.tasks");
  return t("act.work");
}

// Claude Code harness 会往流里注入 role=user 的机器消息（后台任务通知/系统提醒/斜杠命令包装），
// 不是用户手打的话，原样渲染会变成一坨 XML 冒充用户发言。逐 text 块判断：
//   task-notification → 抽 <summary> 缩成一行居中系统小字；
//   command-name/args（斜杠命令包装）→ 还原成用户气泡 "/foo args"；
//   system-reminder / local-command-stdout 等 → 纯噪音，吞掉。
// 返回 undefined = 非注入块（照常渲染）；null = 吞掉；否则返回替代气泡。
const CLAUDE_INJECTED_RE = /^<(task-notification|system-reminder|command-name|command-message|command-args|local-command-stdout|local-command-stderr)\b/;
function claudeInjectedBubble(text) {
  if (!CLAUDE_INJECTED_RE.test(text)) return undefined;
  if (/^<task-notification\b/.test(text)) {
    const summary = text.match(/<summary>([\s\S]*?)<\/summary>/)?.[1]?.trim();
    return { cls: "sysnote", text: summary || t("sysnote.tasknotify") };
  }
  const cmd = text.match(/<command-name>([\s\S]*?)<\/command-name>/)?.[1]?.trim();
  if (cmd) {
    const args = text.match(/<command-args>([\s\S]*?)<\/command-args>/)?.[1]?.trim();
    return { cls: "user", text: args ? `${cmd} ${args}` : cmd };
  }
  return null;
}

// 一条 Claude 消息可含多块 → 返回气泡数组（渲染循环逐块 emit）。气泡 shape 与 itemToBubble 同形，
// 故下游 bubbleNode/toolRow/attachToolOutput/imagesNode 全部复用；配对键 tool_use_id 塞进 callId 字段。
// TodoWrite/TaskCreate/TaskUpdate 不走工具卡：由 trackClaudeActivity 抽成流末尾的计划/任务清单，这里连同回执一并吞掉。
function claudeItemToBubbles(item) {
  // isMeta 条目是 Claude Code 的簿记（贴图源路径 [Image: source:…]、尺寸备注、
  // <local-command-caveat>、"Continue from where you left off." 等），不是用户真正
  // 发的话——桌面端也不当轮次显示，一律吞掉。
  if (item?.isMeta) return [];
  const m = item.message || {};
  const role = m.role || item.type || "assistant";
  const asRole = role === "user" ? "user" : "assistant";
  const content = m.content;
  const out = [];
  if (typeof content === "string") {
    if (asRole === "assistant") {
      const parsed = parseCodexDirectives(content);
      if (parsed.text) out.push({ cls: asRole, text: parsed.text, directives: parsed.directives });
    } else {
      const text = content.trim();
      if (text) {
        const inj = claudeInjectedBubble(text);
        if (inj !== undefined) { if (inj) out.push(inj); }
        else out.push({ cls: asRole, text });
      }
    }
    return out;
  }
  if (!Array.isArray(content)) return out;
  if (asRole === "user" && !content.some((b) => b?.type === "tool_result")) {
    const refs = [];
    const texts = [];
    for (const b of content) {
      if (b?.type === "text") {
        const raw = String(b.text ?? "").trim();
        if (!raw) continue;
        const inj = claudeInjectedBubble(raw);
        if (inj !== undefined) { if (inj) out.push(inj); continue; }
        texts.push(raw);
      } else if (b?.type === "image" && b.imageRef) {
        refs.push(b.imageRef);
      }
    }
    if (texts.length || refs.length) out.push({ cls: "user", text: texts.join("\n\n"), refs });
    return out;
  }
  for (const b of content) {
    const bt = b?.type;
    if (bt === "text") {
      const raw = String(b.text ?? "").trim();
      if (asRole === "assistant") {
        const parsed = parseCodexDirectives(raw);
        if (parsed.text) out.push({ cls: asRole, text: parsed.text, directives: parsed.directives });
      } else if (raw) {
        const inj = claudeInjectedBubble(raw);
        if (inj !== undefined) { if (inj) out.push(inj); }
        else out.push({ cls: asRole, text: raw });
      }
    } else if (bt === "thinking" || bt === "redacted_thinking") {
      const text = String(b.thinking ?? b.text ?? "").trim();
      if (text) out.push({ cls: "think", text });
    } else if (bt === "tool_use") {
      if (/^(todowrite|taskcreate|taskupdate)$/i.test(b.name || "")) {
        if (b.id) app.todoCalls.add(b.id); // 记下 id，好吞掉它的 tool_result 回执
        continue; // 计划/任务清单由 trackClaudeActivity 单独渲染在流末尾
      }
      if (/^askuserquestion$/i.test(b.name || "")) {
        out.push({ cls: "question", callId: b.id ?? null, questions: b.input?.questions });
        continue;
      }
      const input = b.input ?? {};
      const diffFiles = claudeEditDiffFiles(b.name, input);
      if (diffFiles) {
        out.push({ cls: "diff", files: diffFiles, ok: null, callId: b.id ?? null });
        continue;
      }
      out.push({
        cls: "tool", icon: claudeToolIcon(b.name), label: claudeToolLabel(b.name, input),
        detail: typeof input === "string" ? input : JSON.stringify(input, null, 2),
        callId: b.id ?? null,
      });
    } else if (bt === "tool_result") {
      if (b.tool_use_id && app.todoCalls.has(b.tool_use_id)) continue; // TodoWrite/Task* 的回执：噪音，吞掉（TaskCreate 的 id 绑定已在 trackClaudeActivity 完成）
      if (b.tool_use_id && app.questionNodes.has(b.tool_use_id)) {
        out.push({ cls: "questionout", callId: b.tool_use_id, text: claudeToolResultText(b.content) });
        continue;
      }
      out.push({
        cls: "toolout", callId: b.tool_use_id ?? null,
        text: claudeToolResultText(b.content), code: b.is_error ? 1 : 0,
      });
    } else if (bt === "image") {
      // daemon 已把 base64 抽成 imageRef（与 codex 同路径）；无 ref 则跳过（内联 base64 preview 暂不显）
      const ref = b.imageRef || null;
      if (ref) out.push({ cls: "images", refs: [ref], user: asRole === "user" });
    }
  }
  return out;
}

// harness 注入的通知（如后台任务完成）→ "● 事件文本" 左对齐行（对标桌面端 Claude Code），
// 圆点复用通用状态点（静止态），风格与轮次总结行 .turnsum 一致
function sysnoteNode(text) {
  const msg = document.createElement("div");
  msg.className = "msg sysnote";
  const dot = document.createElement("span");
  dot.className = "pulse";
  const txt = document.createElement("span");
  txt.textContent = text;
  msg.append(dot, txt);
  return msg;
}

// Claude thinking 明文可读 → 独立的淡色推理气泡（codex 的 reasoning 多为加密，故此路径 Claude 专属）
function thinkNode(text) {
  const msg = document.createElement("div");
  msg.className = "msg assistant";
  msg.style.opacity = "0.6";
  const tag = document.createElement("div");
  tag.style.cssText = "font-size:11px;letter-spacing:.4px;color:var(--dim);margin-bottom:3px";
  tag.textContent = "🧠 thinking";
  msg.append(tag, mdRender(clip(text)));
  return msg;
}

function fmtTok(n) { return n >= 1000 ? `${(n / 1000).toFixed(1)}k` : String(n); }

// 本轮耗时：Claude 优先用锚定的真实起点(用户消息时间戳)，否则回落 runStart；钳非负防时钟偏差
function turnElapsed() {
  const base = app.agent === "claude" && app.turnStartTs ? app.turnStartTs : app.runStart;
  return Math.max(0, Date.now() - base);
}

// 任务表 → todos 形状快照（按数字 id 排序：加载更早历史时旧任务后到，插入序不可靠；
// 非数字 id 兜底按字典序，排在数字后面）
function tasksSnapshot() {
  return [...app.tasks.entries()]
    .sort((a, b) => {
      const na = Number(a[0]), nb = Number(b[0]);
      if (Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
      if (Number.isFinite(na)) return -1;
      if (Number.isFinite(nb)) return 1;
      return a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0;
    })
    .map(([, v]) => v);
}

// TodoWrite / Task* → 勾选清单节点（就地重建内容）。标题带 完成数/总数，点标题折叠/展开
// （对标终端 ctrl+t hide tasks：长清单在手机上会占满整屏）。折叠态存 app 级，重建不丢。
function todosNode(todos) {
  const wrap = app.todoNode || document.createElement("div");
  wrap.className = `todos${app.todoCollapsed ? " collapsed" : ""}`;
  wrap.innerHTML = "";
  const hd = document.createElement("div");
  hd.className = "thd";
  const label = document.createElement("span");
  label.textContent = t(app.taskMode ? "task.title" : "todo.title");
  const cnt = document.createElement("span");
  cnt.className = "tcnt";
  cnt.textContent = `${todos.filter((td) => td?.status === "completed").length}/${todos.length}`;
  const chev = document.createElement("span");
  chev.className = "tchev";
  chev.textContent = app.todoCollapsed ? "▸" : "▾";
  hd.append(label, cnt, chev);
  hd.onclick = () => {
    app.todoCollapsed = !app.todoCollapsed;
    const stick = nearBottom(); // 展开把清单撑高时别把贴底的读者甩下去
    wrap.classList.toggle("collapsed", app.todoCollapsed);
    chev.textContent = app.todoCollapsed ? "▸" : "▾";
    if (stick) scrollToBottom();
  };
  wrap.appendChild(hd);
  for (const td of todos) {
    const st = td?.status === "completed" ? "done" : td?.status === "in_progress" ? "doing" : "todo";
    const row = document.createElement("div");
    row.className = `titem ${st}`;
    const mk = document.createElement("span");
    mk.className = "tmark";
    // ︎ = 文本呈现选择符：阻止 iOS/微信把 ■/□/✓/● 渲染成彩色 emoji 方块（"黄色框"）；
    // doing 用实心圆点、todo 用空心圆点（对齐"圆点"观感），done 保留对勾
    mk.textContent = st === "done" ? "✓︎" : st === "doing" ? "●︎" : "○︎";
    const tx = document.createElement("span");
    tx.className = "ttxt";
    // 进行中用 activeForm（"正在…"），否则用 content
    tx.textContent = String((st === "doing" && td?.activeForm) || td?.content || "").trim();
    row.append(mk, tx);
    wrap.appendChild(row);
  }
  return wrap;
}

// 流尾固定件：任务清单和活动行不能只在任务变化时才挪动；Claude 后续的普通文本、
// 工具输出或流式草稿到达时，也必须把它们重新压回末尾，才能对齐 Claude Code 的固定任务栏。
function pinTailWidgets() {
  const log = $("log");
  if (app.todoNode) log.appendChild(app.todoNode);
  const act = $("actline");
  if (act) log.appendChild(act);
}

// 计划清单钉在流末尾、就地更新（空清单则撤下）
function updateTodos(todos) {
  if (!Array.isArray(todos) || !todos.length) {
    app.todoNode?.remove();
    app.todoNode = null;
    return;
  }
  app.todoNode = todosNode(todos);
  pinTailWidgets();
}

// 任务清单是“本轮过程”，不是会话级状态栏。Claude 的 Task/Todo 数据可以跨轮次留在
// JSONL 里供后续工具继续引用，但新一轮尚未再次操作任务时，旧卡不能继续钉在流尾，
// 否则会看起来像当前回答仍在输出上轮任务。这里只撤显示态；app.tasks 目录仍保留，
// 本轮若随后收到 TaskUpdate/TaskList，trackClaudeActivity 会用最新快照重新挂卡。
function hidePreviousTurnTodos() {
  app.todoNode?.remove();
  app.todoNode = null;
  app.pendingTodos = null;
}

// 信息流末尾的实时活动行：● 当前动词… 耗时；Claude 额外显示本轮输出 token
function updateActLine() {
  const log = $("log");
  let el = $("actline");
  if (!(app.running && app.view === "session")) {
    el?.remove();
    return;
  }
  if (!el) {
    el = document.createElement("div");
    el.id = "actline";
    el.innerHTML = '<span class="pulse"></span><span class="amid"></span><span class="acnt"></span>';
  }
  log.appendChild(el); // 始终居于信息流最末
  el.querySelector(".amid").textContent = `${app.actVerb || t("act.work")}…`;
  const tok = app.agent === "claude" && app.turnTok > 0 ? ` · ↑${fmtTok(app.turnTok)} tokens` : ""; // 对标 Claude Code：↑ + tokens 单位
  el.querySelector(".acnt").textContent = ` ${fmtDur(turnElapsed())}${tok}`;
}

// Claude 一轮收尾总结节点：耗时优先用时间戳算——本轮起点
// （turnStartTs=该轮首条用户消息 ts）到收尾 assistant（end_turn）的 ts，故历史/回放的已完成轮也能显；
// 缺时间戳则回落 turnElapsed（实时轮 ≈ now）。渲染时逐轮就地钉在该轮回复下方，多轮各有一条。
function turnSummaryNode(endTs) {
  // 纯时间戳算耗时。本轮起点未知（历史窗口从轮中截断、无前置用户消息）或收尾时间戳无效 → 不钉，
  // 绝不回落 Date.now()（turnStartTs=0 时会算出天文数字）。<1s 的轮不钉。
  const base = app.turnStartTs;
  const end = Date.parse(endTs ?? "");
  if (!base || !Number.isFinite(end)) return null;
  const ms = Math.max(0, end - base);
  if (!(ms >= 1000)) return null;
  const el = document.createElement("div");
  el.className = "turnsum";
  const dot = document.createElement("span");
  dot.className = "pulse";
  const text = document.createElement("span");
  text.textContent = t("turn.done", fmtDur(ms));
  el.append(dot, text);
  return el;
}

// 从一条 Claude 条目里抽活动信息：当前动词、累计 token、最新计划
function trackClaudeActivity(item, live) {
  const m = item.message || {};
  // token 累计：一次 API 响应的多个块被拆成多行 jsonl 但共享同一 message.id + usage，
  // 故按 message.id 去重（用 uuid 会把同一响应的 output_tokens 重复计多次）。
  // 只在 live 增量里累计——围观一个已在运行的会话时，先 setRunning(true) 再收整段历史快照，
  // 若把快照也计入会把整个会话历史的 output 全算进来（虚高）。语义 = 你围观期间新产出的量。
  const mid = m.id;
  if (live && app.running && m.usage && mid && !app.tokSeen?.has(mid)) {
    app.tokSeen.add(mid);
    app.turnTok += Number(m.usage.output_tokens || 0);
  }
  // 本轮真实起点：一条不含 tool_result 的 user 消息即"用户发问"(turn 起点)；带 tool_result 的
  // user 消息是工具回执(轮中)，不算。锚定它的 timestamp 作耗时基准，桌面推断的运行态抖动不影响时长。
  // harness 注入的机器消息（后台任务通知/系统提醒）也不算发问——它是同一件事的续跑，
  // 不能撤掉进行中的计划清单。斜杠命令包装(<command-name>)是真发问，不在排除之列。
  if (m.role === "user") {
    const c = m.content;
    const isToolResult = Array.isArray(c) && c.some((b) => b?.type === "tool_result");
    const texts = typeof c === "string" ? [c]
      : Array.isArray(c) ? c.filter((b) => b?.type === "text").map((b) => String(b.text ?? "")) : [];
    const synthetic = texts.length > 0 &&
      texts.every((s) => /^<(task-notification|system-reminder)\b/.test(s.trimStart()));
    if (!isToolResult && !synthetic) {
      // 加载更早历史是向当前视图前插旧轮次，不能让旧用户消息撤掉当前轮的任务卡。
      if (!app.loadingEarlier) hidePreviousTurnTodos();
      const ts = Date.parse(item.timestamp ?? "");
      if (Number.isFinite(ts)) app.turnStartTs = ts;
    }
  }
  if (!Array.isArray(m.content)) return;
  for (const b of m.content) {
    const bt = b?.type;
    if (bt === "tool_use") {
      app.actVerb = claudeToolVerb(b.name);
      if (/^todowrite$/i.test(b.name || "") && Array.isArray(b.input?.todos)) app.pendingTodos = b.input.todos;
      // 新版任务模式（TaskCreate/TaskUpdate 增量式）：客户端维护任务表，喂给同一套清单 UI。
      // 历史回放与实时 tail 走同一条路径，重放同一条目也幂等（Map 按 taskId 覆盖）。
      if (/^taskcreate$/i.test(b.name || "") && b.id) {
        app.taskMode = true;
        app.taskCreates.set(b.id, b.input || {}); // 任务 id 要等 tool_result 揭晓，先挂起
      } else if (/^(taskget|tasklist)$/i.test(b.name || "") && b.id) {
        // 回执带结构化任务（toolUseResult.task/tasks）：用来补全被历史窗口截掉的创建
        app.taskPeeks.set(b.id, /^taskget$/i.test(b.name) ? "get" : "list");
      } else if (/^taskupdate$/i.test(b.name || "")) {
        app.taskMode = true;
        const id = String(b.input?.taskId ?? "");
        const tk = app.tasks.get(id);
        if (tk) {
          if (b.input?.status === "deleted") app.tasks.delete(id);
          else {
            if (b.input?.status) tk.status = b.input.status;
            if (b.input?.subject) tk.content = b.input.subject;
            if (b.input?.activeForm) tk.activeForm = b.input.activeForm;
          }
          app.pendingTodos = tasksSnapshot();
        }
      }
    } else if (bt === "tool_result" && b.tool_use_id && app.taskCreates.has(b.tool_use_id)) {
      // TaskCreate 回执：内容形如 "Task #3 created successfully: …"；jsonl 行顶层 toolUseResult
      // 带结构化 id，优先用它，文本解析兜底。失败/被拒的调用（is_error）不入表。
      const input = app.taskCreates.get(b.tool_use_id);
      app.taskCreates.delete(b.tool_use_id);
      const id = item.toolUseResult?.task?.id
        ?? (claudeToolResultText(b.content).match(/Task #(\d+)/i)?.[1] ?? null);
      if (id != null && !b.is_error) {
        app.tasks.set(String(id), {
          content: String(input.subject || "").trim(),
          activeForm: String(input.activeForm || "").trim(),
          status: "pending",
        });
        app.pendingTodos = tasksSnapshot();
      }
    } else if (bt === "tool_result" && b.tool_use_id && app.taskPeeks.has(b.tool_use_id)) {
      // TaskGet/TaskList 回执对账：TaskList 是当刻权威全量（重建表），TaskGet 单条 upsert。
      // 主要救"首屏窗口从 TaskCreate 之后开始"的场景——增量流缺了创建，清单才不至于空/缺项。
      const kind = app.taskPeeks.get(b.tool_use_id);
      app.taskPeeks.delete(b.tool_use_id);
      const tur = item.toolUseResult;
      const list = b.is_error || !tur ? null
        : kind === "list" ? (Array.isArray(tur.tasks) ? tur.tasks : null)
        : (tur.task && tur.task.id != null ? [tur.task] : null);
      if (list) {
        const prev = app.tasks;
        if (kind === "list") app.tasks = new Map();
        for (const tk of list) {
          if (tk?.id == null) continue;
          const id = String(tk.id);
          const old = prev.get(id);
          app.tasks.set(id, {
            content: String(tk.subject ?? old?.content ?? "").trim(),
            activeForm: old?.activeForm || "", // 回执不带 activeForm，沿用已知的
            status: tk.status || old?.status || "pending",
          });
        }
        if (app.tasks.size || kind === "list") {
          app.taskMode = true;
          app.pendingTodos = tasksSnapshot();
        }
      }
    } else if (bt === "thinking" || bt === "redacted_thinking") {
      app.actVerb = t("act.think");
    } else if (bt === "text" && String(b.text || "").trim()) {
      app.actVerb = t("act.reply");
    }
  }
}

function codexToolVerb(name) {
  const n = String(name || "").toLowerCase();
  if (EXEC_NAME_RE.test(n)) return t("act.bash");
  if (/apply|patch|edit|write|diff|file/.test(n)) return t("act.edit");
  if (/web|fetch|search/.test(n)) return t("act.web");
  if (/read|glob|grep|list|ls|find/.test(n)) return t("act.search");
  if (/task|agent/.test(n)) return t("act.task");
  return t("act.work");
}

function trackCodexActivity(item) {
  if (app.agent !== "codex" || !app.running || app.loadingEarlier) return;
  const ty = item?.type;
  const p = item?.payload ?? {};
  if (ty === "event_msg") {
    const pt = p.type;
    if (pt === "agent_message") app.actVerb = t("act.reply");
    else if (pt === "patch_apply_end") app.actVerb = t("act.edit");
    else if (pt === "web_search_end") app.actVerb = t("act.web");
    else if (pt === "exec_command_begin") app.actVerb = t("act.bash");
    else if (pt === "task_started") app.actVerb = t("act.work");
    return;
  }
  if (ty !== "response_item") return;
  const pt = String(p.type || "").toLowerCase();
  if (pt === "function_call" || pt === "custom_tool_call") {
    const name = pt === "custom_tool_call"
      ? describeCustomToolCall(p.name, p.input).activity
      : p.name;
    app.actVerb = codexToolVerb(name);
  } else if (pt.includes("reasoning")) {
    app.actVerb = t("act.think");
  } else if (pt === "image_generation_call") {
    app.actVerb = t("act.work");
  }
}

// 桌面驱动运行态的空闲兜底：桌面端的收尾事件可能永远不来（TUI 被强杀没写 task_complete、
// 中断的 Claude 轮次没有 end_turn），每有 tail 增量续 2 分钟，静默超时视为已结束。
// 只撤运行态（不确定的收尾，不钉总结）；权威收尾走 task_complete / end_turn / daemon turn/completed。
function desktopIdleArm() {
  clearTimeout(app.desktopIdle);
  app.desktopIdle = setTimeout(() => {
    if (app.driver === "desktop") setRunning(false);
  }, 120000);
}

// Claude 桌面驱动会话的运行态推断：daemon 只把"自己驱动的 turn"标 running，围观本地 claude 会话时
// known.running 恒 false，而 Claude 的 tail 又没有 ChatGPT/codex 那种 task_started 事件。故用 live 增量近似：
// 有增量即视为运行中（driver=desktop），拿 assistant 的 stop_reason:end_turn 精确收尾，
// 空闲兜底由 tailRunning 内的 desktopIdleArm 统一挂。
function claudeTailPulse() {
  if (app.driver === "daemon") return; // daemon 驱动：别降级，交给 onLive
  tailRunning(true);                    // driver 落 desktop（rising edge 会重置 token 计数）
}

  // 输入框占位随当前 agent 变（i18n 串里写死了 "ChatGPT"，按名替换）
function inputPh() {
  return t("input.ph").replace("ChatGPT", app.agent === "claude" ? "Claude" : "ChatGPT");
}

function renderInto(items, live = false) {
  // Claude 会话：给 #log 挂 cl-inline，工具行走扁平（去背景条）终端式清单
  $("log").classList.toggle("cl-inline", app.agent === "claude");
  // 回放（从头读）：新内容追加在下方，读者自己往下滚，绝不替他跳到末尾
  const stick = !app.replayMode && !app.loadingEarlier && nearBottom();
  const frag = document.createDocumentFragment();
  // 桌面驱动运行中：任何 live 增量都说明还活着，续空闲兜底（ChatGPT/codex 长轮次没有逐批脉冲，
  // 只在 task_started 点亮一次，不续的话超过兜底窗口会被误判结束）
  if (live && app.driver === "desktop") desktopIdleArm();
  // 桌面驱动 Claude 会话的运行态推断（见 claudeTailPulse）：先点亮，本批 token 才会被计入
  let claudeEndTurn = false;
  if (live && app.agent === "claude" && items.some(isClaudeItem)) {
    claudeEndTurn = items.some((it) => isClaudeItem(it)
      && (it.message?.role || it.type) === "assistant" && it.message?.stop_reason === "end_turn");
    if (!claudeEndTurn) claudeTailPulse(); // 中途增量：运行中；仅含 end_turn 的收尾批不点亮
  }
  // ChatGPT 运行中按原顺序平铺过程节点；task_complete 时再创建过程组并收拢中间内容。
  // Claude 全程内联，仍由 end_turn 钉每轮总结。
  let lastAssistantNode = null;
  let pendingUserBubble = null;
  let pendingUserSource = null;
  const trackProcNode = (node, kind, sourceItem, countStep = false) => {
    if (inline || !node) return;
    if (!app.proc) procStart(null);
    if (app.proc.startTs == null) {
      const ts = itemTs(sourceItem);
      if (ts != null) app.proc.startTs = ts;
    }
    if (node.classList?.contains("tool")) node.classList.add("proc-live");
    app.proc.nodes.push({ node, kind });
    if (countStep) app.proc.count++;
  };
  const sink = (node, toProc) => {
    if (toProc) ensureProc(frag).body.appendChild(node);
    else frag.appendChild(node);
  };
  const mergeUserBubbles = (a, b) => {
    const refs = [...(a.refs || []), ...(b.refs || [])];
    const texts = [a.text, b.text].map((s) => String(s || "").trim()).filter(Boolean);
    const text = texts.length > 1 && texts[0] !== texts[1] ? texts.join("\n\n") : (texts[0] || "");
    return { cls: "user", text, refs };
  };
  const shouldMergeUserBubbles = (a, b) => {
    if (!a || !b || a.cls !== "user" || b.cls !== "user") return false;
    if (!((a.refs || []).length || (b.refs || []).length)) return false;
    const at = String(a.text || "").trim();
    const bt = String(b.text || "").trim();
    return !at || !bt || at === bt;
  };
  // 单条气泡 → 节点（codex 与 Claude 共用；Claude 一条消息含多块，逐块调用）。
  // Claude 全程内联（对标终端 scrollback）；ChatGPT 运行中也平铺显示，完成后统一折叠中间过程。
  const inline = app.agent === "claude";
  const emitBubbleNow = (bubble, sourceItem) => {
    if (!bubble) return;
    let node = null;
    let toProc = false;
    if (bubble.cls === "user") {
      if ((bubble.refs || []).length && !String(bubble.text || "").trim() && app.suppressUserImages > 0) {
        app.suppressUserImages--;
        return;
      }
      // 只收"已有内容"的组（旧格式无轮次事件时靠这里收拢上一轮）；
      // 本轮 task_started 刚记下的未挂载组要留着——它属于这条用户消息开启的轮次
      if (app.proc?.wrap || app.proc?.nodes?.length) procFinish(sourceItem);
      const echoed = consumeEcho(bubble.text); // tail 确认，撤下乐观气泡
      if (echoed?.imgs && !(bubble.refs || []).length) app.suppressUserImages++;
      node = bubbleNode(bubble);
    } else if (bubble.cls === "assistant") {
      endStream(); // tail 的完整消息到了，撤下流式草稿
      node = bubbleNode(bubble);
      lastAssistantNode = node;
      trackProcNode(node, "assistant", sourceItem);
      toProc = false; // 运行中平铺显示；完成后按原收尾规则统一折叠中间过程
    } else if (bubble.cls === "think") {
      node = thinkNode(bubble.text); // Claude thinking 明文推理
      trackProcNode(node, "think", sourceItem);
      toProc = false;
    } else if (bubble.cls === "sysnote") {
      node = sysnoteNode(bubble.text); // harness 注入通知：一行系统小字
    } else if (bubble.cls === "tool") {
      node = toolRow(bubble);
      trackProcNode(node, "tool", sourceItem, true);
      toProc = false;
    } else if (bubble.cls === "toolout") {
      node = attachToolOutput(bubble); // 通常并入已有调用行，返回 null
      trackProcNode(node, "toolout", sourceItem);
      toProc = false;
    } else if (bubble.cls === "question") {
      node = questionNode(bubble);
      trackProcNode(node, "question", sourceItem);
      toProc = false;
    } else if (bubble.cls === "questionout") {
      node = attachQuestionResult(bubble);
      toProc = false;
    } else if (bubble.cls === "diff") {
      node = diffNode(bubble);
      trackProcNode(node, "diff", sourceItem, true);
      toProc = false;
    } else if (bubble.cls === "images") {
      if (bubble.user) consumeImgEcho(); // 纯图片消息的乐观气泡在此确认
      node = imagesNode(bubble); // 生成图是结果产物，留在组外常显
    }
    if (node) sink(node, toProc);
  };
  const flushPendingUser = () => {
    if (!pendingUserBubble) return;
    const bubble = pendingUserBubble;
    const sourceItem = pendingUserSource;
    pendingUserBubble = null;
    pendingUserSource = null;
    emitBubbleNow(bubble, sourceItem);
  };
  const emitBubble = (bubble, sourceItem) => {
    if (!bubble) return;
    if (bubble.cls === "user") {
      if (shouldMergeUserBubbles(pendingUserBubble, bubble)) {
        pendingUserBubble = mergeUserBubbles(pendingUserBubble, bubble);
        if (String(bubble.text || "").trim()) pendingUserSource = sourceItem;
      } else {
        flushPendingUser();
        pendingUserBubble = bubble;
        pendingUserSource = sourceItem;
      }
      return;
    }
    flushPendingUser();
    emitBubbleNow(bubble, sourceItem);
  };
  for (const item of items) {
    observePermissionItem(item);
    // Claude 条目：独立映射，一条消息展开成多块气泡；轮次状态走 onLive（turn/*），不看 item
    if (isClaudeItem(item)) {
      trackClaudeActivity(item, live); // 活动行动词 + 最新计划；token 仅 live 增量累计
      for (const b of claudeItemToBubbles(item)) emitBubble(b, item);
      // 该轮收尾（assistant end_turn）→ 就地在回复下方钉一行本轮总结（历史/实时统一，时间戳算耗时），
      // 再清起点让下一轮重设。终端式 scrollback：多轮各有一条总结，不再只钉最后一轮在底部。
      if ((item.message?.role || item.type) === "assistant" && item.message?.stop_reason === "end_turn") {
        markAssistantFinal(lastAssistantNode);
        const sum = turnSummaryNode(item.timestamp);
        if (sum) frag.appendChild(sum);
        app.turnStartTs = 0;
      }
      continue;
    }
    // 轮次事件驱动运行状态（顺序处理，快照回放后落在正确的最终状态）
    if (item?.type === "event_msg") {
      const pt = item.payload?.type;
      if (pt === "task_started") {
        // 快照里悬空的 task_started（桌面端被强杀/崩溃，task_complete 没落盘）不可信：
        // 非 live 批次只在会话确实还活着（daemon 在驱动 / 文件近期有写入 / 观众端 daemon
        // 判了 tail 模式）时才点亮。点亮后仍有桌面空闲兜底（tailRunning → desktopIdleArm）。
        const known = app.knownById.get(app.currentId);
        const trusted = live || known?.running || activeFresh(known) || (app.isViewer && !app.replayMode);
        if (!app.loadingEarlier && trusted) tailRunning(true, item.payload?.started_at);
        procStart(item);
      }
      else if (pt === "task_complete") {
        const finalNode = procFinish(item);
        if (finalNode === undefined) markAssistantFinal(lastAssistantNode);
        if (!app.loadingEarlier) tailRunning(false);
        refreshTitle();
      }
      else if (pt === "turn_aborted") {
        procFinish(item, true);
        if (!app.loadingEarlier) tailRunning(false);
      }
      else if (pt === "token_count") setCtx(item.payload?.info);
    }
    trackCodexActivity(item);
    emitBubble(itemToBubble(item), item);
  }
  flushPendingUser();
  // 桌面驱动 Claude：本批含 end_turn（本轮最终回复）→ 收尾运行态，等价 daemon 的 turn/completed。
  // 先记住"本批收了尾"（setRunning 会把 driver 置空），总结行留到 frag 落地、活动行撤下后再钉到底部。
  // 桌面驱动 Claude：本批含 end_turn → 收尾运行态（等价 daemon 的 turn/completed）。总结行已在上面
  // 的条目循环里就地钉出（时间戳算耗时），这里只管把运行态落下、撤活动行。
  const desktopEnded = claudeEndTurn && app.driver === "desktop";
  if (desktopEnded) setRunning(false);
  // Claude 快照/历史回放里没有 task_complete 事件收组：一轮结束且非运行态时兜底收拢，
  // 把末尾结论挪出组外。运行中（app.running）不收，留给 onLive 的 turn/completed。
  if (app.agent === "claude" && !app.running && app.proc?.wrap) procFinish(null);
  // 有真实内容渲染时，清掉"新会话"空态提示（否则增量消息会追加在它下面）
  if (frag.firstChild) $("emptyhint")?.remove();
  $("log").appendChild(frag);
  // 每批新内容都重钉任务清单；此前仅 pendingTodos 时才移动，普通后续输出会把清单留在中间。
  if (app.pendingTodos) { updateTodos(app.pendingTodos); app.pendingTodos = null; }
  pinTailWidgets();
  updateActLine();
  if (stick) scrollToBottom();
  updateJump();
}

// —— 流式草稿：session.live 的 agent message delta 即时预览 ——
// 正式内容以 rollout tail 为准；tail 的 agent_message 到达即替换草稿
function appendStream(delta) {
  if (app.view !== "session") return;
  if (!app.stream) {
    const el = document.createElement("div");
    el.className = "msg assistant streaming";
    const raw = document.createElement("span");
    raw.className = "raw";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    el.append(raw, cursor);
    const stick = !app.loadingEarlier && nearBottom();
    $("log").appendChild(el);
    // Claude 活动行/计划清单始终垫在流最末，别被流式草稿挤到上面
    pinTailWidgets();
    if (stick) scrollToBottom();
    app.stream = { el, raw, text: "" };
  }
  const stick = !app.loadingEarlier && nearBottom();
  app.stream.text += delta;
  app.stream.raw.textContent = clip(app.stream.text);
  if (stick) scrollToBottom();
}

function endStream() {
  app.stream?.el.remove();
  app.stream = null;
}

// —— 下拉加载更早历史 ——
// 顶部还有更早的 rollout（daemon 快照只回填末尾一段，total > 已加载 histLimit）
function hasEarlier() {
  return app.histTotal > app.histLimit;
}
function setHistoryLoadedCount(count) {
  if (!Number.isFinite(count)) return;
  app.histLimit = Math.max(0, Math.min(5000, Math.trunc(count)));
}
// 下拉手势参数：需要一段刻意的行程才触发，避免误触/过快触发
const SCROLL_TOP_EPS = 2;   // 移动端回弹/布局变动可能产生 1px 抖动，不能立刻取消手势
const PULL_IDLE = 34;       // 顶部可点击入口高度（桌面/触控都能用）
const PULL_MAX = 100;      // 提示条最大视觉高度
const PULL_TRIGGER = 64;   // 达到此高度松手即加载
const PULL_DEADZONE = 12;  // 起手空程：前 12px 不撑高，滤掉抖动
const PULL_FACTOR = 78;    // 阻尼系数：越大越"沉"，需拉更远
function atScrollTop() {
  return window.scrollY <= SCROLL_TOP_EPS;
}
function pullEntryAvailable() {
  return app.view === "session" && !app.replayMode && !app.loadingEarlier && hasEarlier() && atScrollTop();
}
// 渐进阻尼（橡皮筋）：手指行程 dy → 提示条高度，越拉越沉、趋近 PULL_MAX
function pullResist(dy) {
  const over = dy - PULL_DEADZONE;
  if (over <= 0) return 0;
  return PULL_MAX * (1 - 1 / (1 + over / PULL_FACTOR));
}
function setPullTip(h, text, ready, { end = false } = {}) {
  const tip = $("pulltip");
  tip.querySelector(".txt").textContent = text || "";
  tip.classList.remove("available");
  tip.classList.toggle("ready", !!ready);
  tip.classList.toggle("end", !!end);
  tip.style.height = `${h}px`;
  tip.setAttribute("aria-hidden", "false");
  tip.setAttribute("aria-disabled", "true");
  tip.tabIndex = -1;
}
function resetPullTip() {
  const tip = $("pulltip");
  const available = pullEntryAvailable();
  tip.classList.remove("drag", "ready", "loading", "end");
  tip.classList.toggle("available", available);
  tip.style.height = available ? `${PULL_IDLE}px` : "0px";
  tip.querySelector(".txt").textContent = available ? t("pull.click") : "";
  tip.setAttribute("aria-hidden", available ? "false" : "true");
  tip.setAttribute("aria-disabled", available ? "false" : "true");
  tip.tabIndex = available ? 0 : -1;
}
function restoreEarlierScroll() {
  const a = app.earlierAnchor;
  if (!a) return;
  // session.more 回来的是“更大的尾部快照”，前端会清空并重建整段 DOM；
  // 这里必须恢复触发前的绝对滚动位置，不能按高度差补偿，否则会被推向最新消息。
  const y = Math.max(0, a.scrollY);
  window.scrollTo(0, y);
  requestAnimationFrame(() => {
    if (app.earlierAnchor === a) window.scrollTo(0, y);
  });
  setTimeout(() => {
    if (app.earlierAnchor === a) window.scrollTo(0, y);
  }, 80);
}
function clearEarlierLoading() {
  clearTimeout(app.earlierTimer);
  clearTimeout(app.earlierFailsafe);
  restoreEarlierScroll();
  app.loadingEarlier = false;
  app.earlierAnchor = null;
  resetPullTip();
  updateStatusStrip();
  updateJump();
}
// 快照/其余分片可能分多条 notify 到达：end 之前只锚定滚动、不解除 loadingEarlier，
// 否则慢分片会被后续 renderInto 当成普通尾部增量并自动贴底。
function scheduleEarlierSettle(done = false) {
  clearTimeout(app.earlierTimer);
  restoreEarlierScroll();
  if (!done) return;
  app.earlierTimer = setTimeout(clearEarlierLoading, 120);
}
function loadEarlier() {
  if (app.loadingEarlier || !hasEarlier() || !app.session) return;
  const tip = $("pulltip");
  // 先把提示瞬间收平（drag 关过渡），再量锚点，确保与 settle 时的布局一致
  tip.classList.remove("available", "ready", "end");
  tip.classList.add("drag");
  tip.style.height = "0px";
  tip.setAttribute("aria-disabled", "true");
  tip.tabIndex = -1;
  app.earlierAnchor = {
    scrollY: window.scrollY,
  };
  tip.classList.remove("drag");
  app.loadingEarlier = true;
  updateStatusStrip();
  app.histLimit = Math.min(5000, app.histLimit + 500);
  showToast(t("toast.loadearlier"), 4000);
  clearTimeout(app.earlierFailsafe);
  app.earlierFailsafe = setTimeout(() => {
    if (app.loadingEarlier) clearEarlierLoading();
  }, 8000);
  app.session.request("session.more", { limit: app.histLimit }).catch((e) => {
    clearEarlierLoading();
    showBanner(t("banner.loadearlier_fail", e.message));
  });
}
// 加载完成/首屏/滚动后：只有停在顶部且仍有更早历史时，才露出可点击入口
function updateEarlierHint() {
  if (!app.loadingEarlier) resetPullTip();
}

// —— 回放翻页（观众看已结束的会话）——
// 阅读方向与"追直播"相反：从头往后读，底部哨兵进入视口即继续加载下一段，
// 内容以 session.event 追加到末尾。客户端自限 ≥2s，与 daemon 的 viewer 频控对齐。
function updateReplayMore() {
  const el = $("replaymore");
  el.classList.toggle("show", app.replayMode && !app.replayDone);
  el.textContent = t("replay.more");
}
async function loadReplayMore() {
  if (!app.replayMode || app.replayDone || app.replayLoading || !app.session) return;
  const wait = 2000 - (Date.now() - app.replayLastAt);
  if (wait > 0) {
    clearTimeout(app.replayRetry);
    app.replayRetry = setTimeout(loadReplayMore, wait + 50);
    return;
  }
  app.replayLastAt = Date.now();
  app.replayLoading = true;
  try {
    const r = await app.session.request("session.more", { limit: 500 });
    if (typeof r?.total === "number") app.histTotal = r.total;
    if (r?.done) app.replayDone = true;
  } catch {
    // 频控/瞬断：哨兵仍在，滚动触达时自然重试
  } finally {
    app.replayLoading = false;
    updateReplayMore();
    // 哨兵仍在视口内（短会话/大屏）：继续拉，直到读完或哨兵滚出视口
    if (app.replayMode && !app.replayDone && replaySentinelVisible) {
      clearTimeout(app.replayRetry);
      app.replayRetry = setTimeout(loadReplayMore, 2100);
    }
  }
}
let replaySentinelVisible = false;
function bindReplaySentinel() {
  const io = new IntersectionObserver((entries) => {
    replaySentinelVisible = entries.some((e) => e.isIntersecting);
    if (replaySentinelVisible) loadReplayMore();
  });
  io.observe($("replaymore"));
}

// 触摸下拉手势：仅在会话顶部起手，下拉过阈值松手即加载更早
function bindPullToLoad() {
  const viewer = $("viewer");
  const tip = $("pulltip");
  let pull = null;
  tip.onclick = () => {
    if (pullEntryAvailable()) loadEarlier();
  };
  tip.addEventListener("keydown", (e) => {
    if ((e.key === "Enter" || e.key === " ") && pullEntryAvailable()) {
      e.preventDefault();
      loadEarlier();
    }
  });
  viewer.addEventListener("touchstart", (e) => {
    // 回放模式从头读起，没有"更早"可加载（翻页在底部哨兵）
    if (app.view !== "session" || app.replayMode || app.loadingEarlier || !atScrollTop()) { pull = null; return; }
    pull = { startY: e.touches[0].clientY, ready: false };
  }, { passive: true });
  viewer.addEventListener("touchmove", (e) => {
    if (!pull) return;
    const dy = e.touches[0].clientY - pull.startY;
    if (dy <= 0) { pull = null; resetPullTip(); return; }
    // 从顶部向下拉时必须接管手势；否则移动端浏览器的原生回弹会把 scrollY 抖成 >0，
    // 下一帧就误判为"已滚离顶部"并收回提示。
    e.preventDefault();
    if (window.scrollY > 0) window.scrollTo(0, 0);
    tip.classList.add("drag");
    const canLoad = hasEarlier();
    const dist = Math.max(canLoad ? PULL_IDLE : 0, pullResist(dy)); // 从可点击入口继续拉时不先缩回
    const ready = canLoad && dist >= PULL_TRIGGER;
    setPullTip(dist, !canLoad ? t("pull.atstart") : ready ? t("pull.release") : t("pull.down"), ready, { end: !canLoad });
    pull.ready = ready;
  }, { passive: false });
  const finish = () => {
    if (!pull) return;
    const doLoad = pull.ready;
    pull = null;
    tip.classList.remove("drag", "ready");
    if (doLoad) loadEarlier();   // loadEarlier 会瞬间收平提示并弹出加载 toast
    else resetPullTip();          // 未过阈值：带过渡地回弹到 0，清掉 ready/end
  };
  viewer.addEventListener("touchend", finish, { passive: true });
  viewer.addEventListener("touchcancel", finish, { passive: true });
}

// live 事件：内容以 rollout tail（snapshot/event）为准；live 负责运行状态、
// 失败提示与 agent message delta 的流式预览（tail 到达即替换，不重复渲染）
function onLive(event, params) {
  if (event === "turn/started") { setRunning(true, "daemon"); return; }
  if (event === "turn/completed") {
    setRunning(false);
    // 草稿保留到 tail 的完整消息到达（renderInto 里 endStream），只摘掉光标
    app.stream?.el.querySelector(".cursor")?.remove();
    // Claude 无 task_complete 落盘事件（不像 codex 排在 tail 里）：靠这条 live 事件收组，把末尾结论挪出
    // 「处理过程」组外；随后到达的 assistant 因 app.proc 已空而落在组外。（总结行由 tail 的 end_turn 条目就地钉。）
    if (app.agent === "claude") procFinish(null);
    refreshTitle();
    return;
  }
  const norm = String(event).toLowerCase().replace(/[/_.-]/g, "");
  if (norm.includes("turnfailed") || norm.includes("turnerror")) {
    setRunning(false);
    endStream();
    procFinish(null, true); // 失败的轮次 rollout 里未必有收尾事件，这里兜底收组
    showBanner(t("banner.turnfail"));
    return;
  }
  if (norm.includes("turnaborted")) { setRunning(false); endStream(); procFinish(null, true); return; }
  if (norm.includes("agentmessage") && norm.includes("delta")) {
    const delta = params?.delta ?? params?.text ?? params?.chunk;
    if (typeof delta === "string" && delta) {
      app.actVerb = t("act.reply");
      updateActLine();
      appendStream(delta);
    }
  }
}

function renderFullSnapshotItems(items, { snapshotEnd = false, loadedCount = null } = {}) {
  if (!app.replayMode && loadedCount != null) setHistoryLoadedCount(loadedCount);
  $("log").innerHTML = "";
  app.toolNodes.clear(); app.questionNodes.clear(); app.todoNode = null; app.todoCalls.clear(); app.pendingTodos = null; app.tasks.clear(); app.taskCreates.clear(); app.taskPeeks.clear(); app.taskMode = false; clearTimeout(app.desktopIdle); app.desktopIdle = null; app.turnStartTs = 0; app.turnSummarized = false;
  app.seenImages.clear(); // 快照重放会重发同批 imageRef
  app.stream = null; // 元素已随 log 清空
  app.proc = null;
  renderInto(items);
  for (const e of app.echoes) $("log").appendChild(e.el); // 未被确认的乐观气泡重新挂上
  renderApprovals(); // snapshot 清空了 log，内嵌审批卡重挂
  if (!$("log").childElementCount) {
    // 新会话空态：给一句引导而不是一片空白（有 id，首条消息渲染时由 renderInto 清掉）
    $("log").innerHTML = `<div class="notice" id="emptyhint">${t("empty.hint")}</div>`;
  }
  // 加载更早触发的快照：不落底，等分片到齐后把滚动锚回原处；否则（首屏/重连）落底
  // 回放模式（从头读）：首屏就是开头，停在顶部开始阅读，不落底
  if (app.loadingEarlier) scheduleEarlierSettle(snapshotEnd);
  else if (app.replayMode) window.scrollTo(0, 0);
  else scrollToBottom();
  updateEarlierHint();
  updateReplayMore();
}

function finishDeferredFullSnapshot(s) {
  const merged = mergeFullSnapshotFromCache(s);
  if (merged) {
    setHistoryLoadedCount(merged.items.length);
    if (merged.added.length) renderInto(merged.added);
    updateEarlierHint();
    updateReplayMore();
    return;
  }
  commitSnapshotCache(s);
  renderFullSnapshotItems(s.items, { snapshotEnd: true, loadedCount: s.items.length });
}

function handleNotify(msg) {
  // 隐藏超过 15s、已暂停 watch 后不再消费 transcript/live 帧；若浏览器先被冻结，daemon
  // 的 60s 租约会兜底停流。回前台用 have 游标补齐，不在长期后台做 DOM/缓存工作。
  if (document.visibilityState !== "visible" && backgroundWatchSuspended &&
      (msg.method === "session.snapshot" || msg.method === "session.event" || msg.method === "session.live")) {
    return;
  }
  if (msg.method === "session.snapshot" && msg.params.sessionId === app.currentId) {
    const p = msg.params;
    // 被顶替的旧 watch 在途帧（快速重开同一会话时 sessionId 相同）：凭 wt 丢弃。
    // 旧 daemon 帧不带 wt，照常放行（无此保护，同旧行为）
    if (p.wt && p.wt !== app.watchToken) return;
    if (typeof p.total === "number") app.histTotal = p.total;
    if (p.append) {
      // 断点续传命中：这是补缺快照（[旧total, 新total) 的增量），已渲染的内容原样保留，
      // 新条目直接续在末尾——不清屏、不重放，重连/重开不再闪屏。
      // 缓存提交走暂存（收到 end 才落地，见 snapStage）；histLimit 同步推进——
      // 这些条目已在屏上，不推进会误报"上面还有更早"，下拉触发全量快照白闪一次
      app.histLimit += p.items.length;
      if (!app.isViewer && !app.replayMode) snapStage(p);
      if (p.items.length) renderInto(p.items); // 智能滚动由 renderInto 自理（贴底才跟随）
      updateEarlierHint();
      return;
    }
    // 全量快照：经暂存重建 transcript 缓存（end 到齐才提交为续传凭据）
    if (!app.isViewer && !app.replayMode) {
      const staged = snapStage(p, { deferRender: shouldPreserveFullSnapshot(p) });
      if (snapPending?.deferRender) return; // 多分片全量快照：等 end 后再决定是否清屏
      if (staged?.deferRender) { finishDeferredFullSnapshot(staged); return; }
    }
    const loadedCount = (p.end || !p.wt) ? p.items.length : null;
    renderFullSnapshotItems(p.items, { snapshotEnd: !!p.end, loadedCount });
  } else if (msg.method === "session.event" && msg.params.sessionId === app.currentId) {
    const p = msg.params;
    if (p.wt && p.wt !== app.watchToken) return; // 被顶替的旧 watch 在途帧：丢弃（同上）
    let loadedCount = null;
    if (p.cont) {
      // 快照续块（同一快照的后续分片）：是历史回填不是 live 增量，不计 token；
      // 并入快照暂存（end 到齐才提交缓存），不直接进已提交缓存。
      // append 快照的续块同样已在屏上，histLimit 跟着推进
      if (snapPending && snapPending.sid === p.sessionId) {
        snapPending.items.push(...p.items);
        if (snapPending.append) app.histLimit += p.items.length;
        if (p.end) {
          if (!snapPending.append) loadedCount = snapPending.items.length;
          const staged = snapCommit();
          if (staged?.deferRender) { finishDeferredFullSnapshot(staged); return; }
        }
        if (snapPending?.deferRender) return;
      }
    } else if (!app.isViewer && !app.replayMode) {
      // 真实 tail 追加：推进续传 total 游标
      transcriptAppend(p.sessionId, p.items, true);
    }
    renderInto(p.items, !p.cont); // live 增量：Claude token 才在此累计（快照/历史回填不计）
    if (loadedCount != null && !app.replayMode) {
      setHistoryLoadedCount(loadedCount);
      updateEarlierHint();
    }
    if (app.loadingEarlier) {
      if (p.cont) scheduleEarlierSettle(!!p.end); // 快照余下分片，end 到达后再解除加载态
      else restoreEarlierScroll(); // 普通实时增量不参与 session.more 收尾，避免打断 end 定时器
    }
  } else if (msg.method === "session.live" && msg.params.sessionId === app.currentId) {
    if (msg.params.wt && msg.params.wt !== app.watchToken) return;
    onLive(msg.params.event, msg.params.params);
  } else if (msg.method === "image.chunk") {
    onImageChunk(msg.params); // 图片推送流：按 id 拼装，不与当前会话绑定（跨视图仍有效）
  } else if (msg.method === "approval.request") {
    if (app.isViewer) return; // 第二道保险：旧 daemon 可能没过滤，观众端不渲染审批
    showApproval(msg.params); // 全局：任何页面都显示
  } else if (msg.method === "approval.resolved") {
    if (app.isViewer) return;
    resolveApproval(msg.params.approvalKey); // 其他设备处理后同步消失
  } else if (msg.method === "board.changed") {
    if (app.isViewer) return; // 携带其他会话状态；观众运行态走 live/tail
    // 看板已带上该会话的 {running, approvals}：就地打补丁——更新该会话，并按精确增量
    // 调整其所属项目的徽标（runningCount/approvals 是整数，故可 O(1) 增量），不重拉任何列表。
    const bp = msg.params || {};
    if (bp.archived === true) {
      removeSessionFromLists(bp.sessionId);
      scheduleListRefresh(); // 项目计数/最新会话等聚合信息后台对齐
      if (bp.sessionId === app.currentId && app.view === "session" && !app.isViewer && app.archivingSessionId !== bp.sessionId) {
        history.back();
      }
      if (app.view === "list") renderList();
      return;
    }
    if (bp.archived === false) {
      scheduleListRefresh(); // 取消归档后让未归档列表重新出现该会话
    }
    const known = app.knownById.get(bp.sessionId);
    if (known) {
      const dA = (bp.approvals || 0) - (known.approvals || 0);
      const dR = (bp.running ? 1 : 0) - (known.running ? 1 : 0);
      known.approvals = bp.approvals || 0;
      known.running = !!bp.running;
      // daemon 权威宣告轮次结束：文件 mtime 的余温（active）是本轮自己写的，
      // 不该再以"桌面活动"续亮 60 秒；若桌面真在驱动，下次刷新会重新点亮
      if (dR < 0) known.active = false;
      const p = app.projByCwd.get(normSep(known.cwd));
      if (p) { p.approvals = Math.max(0, (p.approvals || 0) + dA); p.runningCount = Math.max(0, (p.runningCount || 0) + dR); }
      if (app.view === "list") renderList();
    } else {
      scheduleListRefresh(); // 本地还没有的新会话：拉一次（payload 无 cwd）补齐项目/元数据
    }
    // 当前会话的 daemon 驱动状态以看板为准（覆盖 tail 推断）
    if (msg.params?.sessionId === app.currentId && app.view === "session") {
      if (msg.params.running) setRunning(true, "daemon");
      else if (app.driver === "daemon") setRunning(false);
    }
  } else if (msg.method === "viewer.count") {
    if (msg.params?.sessionId !== app.currentId) return;
    app.viewerCount = msg.params.count ?? 0;
    if (app.isViewer) {
      // 事件感的一半来自同伴在场（count 含自己）
      const others = Math.max(0, app.viewerCount - 1);
      $("vcount").textContent = others > 0 ? t("viewer.others", others) : "";
    } else {
      updateStatusStrip(); // "N 人围观中"——声望感需要被分享者看见
      if (msg.params.congested && !app.congestedShown) {
        app.congestedShown = true;
        showBanner(t("banner.congested"), () => showBanner(""));
      } else if (!msg.params.congested && app.congestedShown) {
        app.congestedShown = false;
        showBanner("");
      }
    }
  } else if (msg.method === "share.reaction") {
    if (msg.params?.sessionId === app.currentId) floatReaction(msg.params.emoji, msg.params.count);
  } else if (msg.method === "share.summary") {
    if (app.isViewer) return;
    const p = msg.params ?? {};
    showBanner(t("banner.sharesummary", p.visitors, p.peak, p.reactions),
      () => showBanner(""));
  } else if (msg.method === "daemon.status") {
    net.engine = msg.params?.engine ?? null; // 引擎掉线/恢复（分层诊断）
    updateStatusPill();
  } else if (typeof msg.method === "string" && msg.method.startsWith("terminal.")) {
    handleTermNotify(msg); // Terminal Mode 帧（output/snapshot/exited/…）统一入口
  }
}

// 喝彩飘浮：双端同款，锚在底栏上方随机横移，动画完自清
function floatReaction(emoji, count) {
  if (app.view !== "session") return;
  const el = document.createElement("span");
  el.className = "vfloat";
  el.textContent = emoji;
  if (count > 1) {
    const n = document.createElement("span");
    n.className = "vn";
    n.textContent = `×${count}`;
    el.appendChild(n);
  }
  el.style.left = `${Math.round(20 + Math.random() * 60)}%`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

function autoGrow() {
  const el = $("input");
  el.style.height = "auto";
  // composer 还没显示时 scrollHeight 为 0（openSession 先填草稿后开卡片），
  // 这时不写死高度，交给 CSS 的 min-height，避免输入框被压成 0
  if (!el.scrollHeight) return;
  // 上限约四成屏高：写长任务描述不憋屈，超出后内部滚动
  el.style.height = `${Math.min(el.scrollHeight, Math.round(window.innerHeight * 0.4))}px`;
}

// —— 多电脑切换 ——
function updateChevron() {
  // 标题区域仍可点击切换电脑，但不再显示额外的下拉标记。

function removeDaemon(id) {
  const daemons = loadStore();
  delete daemons[id];
  localStorage.setItem("czr-daemons", JSON.stringify(daemons));
  dropBoardSnapshots(id); // 一并清列表快照：死令牌的缓存无留存价值，也防下次配对闪现旧列表
  updateChevron();

}

function openSheet() {
  const daemons = listDaemons();
  if (!daemons.length) return; // 未配对时无从管理
  const active = app.session?.info.id;
  const box = $("daemonlist");
  box.innerHTML = "";
  for (const d of daemons) {
    const row = document.createElement("div");
    row.className = `drow${d.id === active ? " active" : ""}`;
    const dot = document.createElement("span"); dot.className = "ddot";
    const name = document.createElement("span"); name.className = "dname"; name.textContent = d.name || t("diag.pc");
    row.append(dot, name);
    if (d.id === active) {
      const c = document.createElement("span"); c.className = "dcur"; c.textContent = t("common.current"); row.append(c);
    } else {
      row.onclick = () => { $("sheet").classList.remove("open"); switchDaemon(d.id); };
      // 删除本机的配对记录（换机/重装后清理残留；电脑侧撤销授权在电脑端做）
      const del = document.createElement("button");
      del.className = "ddel";
      del.textContent = "✕";
      del.setAttribute("aria-label", t("a11y.delpairing"));
      del.onclick = (e) => {
        e.stopPropagation();
        if (confirm(t("confirm.delpairing", d.name || t("diag.pc")))) {
          removeDaemon(d.id);
        }
      };
      row.appendChild(del);
    }
    box.appendChild(row);
  }
  const note = document.createElement("div");
  note.className = "sheetnote";
  note.textContent = t("sheet.addpc");
  box.appendChild(note);
  $("sheet").classList.add("open");
}

async function switchDaemon(id) {
  const daemons = loadStore();
  const info = daemons[id];

  if (app.session) { app.session.closedByUser = true; app.session.closeRtc(); app.session.ws?.close(); }
  Object.assign(net, { link: "connecting", daemon: null, engine: null, lastSeen: null, direct: false });
  updateStatusPill();
  app.view = "list"; app.currentId = null;
  app.echoes = [];
  app.toolNodes.clear(); app.questionNodes.clear(); app.todoNode = null; app.todoCalls.clear(); app.pendingTodos = null; app.tasks.clear(); app.taskCreates.clear(); app.taskPeeks.clear(); app.taskMode = false; clearTimeout(app.desktopIdle); app.desktopIdle = null; app.turnStartTs = 0; app.turnSummarized = false;
  app.seenImages.clear();
  app.stream = null;
  app.proc = null;
  app.filter = "";
  $("search").value = "";
  app.drafts.clear();
  $("input").value = "";
  setRunning(false);
  updateJump();
  app.approvals.clear();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active"); $("composer").classList.remove("active");
  $("back").style.display = "none"; $("log").innerHTML = "";
  renderApprovals();
  $("list").classList.remove("hidden");
  $("list").innerHTML = `<div class="notice">${t("common.connecting")}</div>`;
  startSession(info);
}

// 围观终态（被踢/链接过期/会话不存在）：中性文案，不渲染成报错；
// 身份栏与获客入口保留——被踢的瞬间恰是转化时机。
function showViewerEnded(reason) {
  if (app.viewerEnded) return; // 终态只进一次：watch 失败路径重连会反复到这里，防卡片堆叠
  app.viewerEnded = true;
  // 真终态：停掉连接层。被踢/403 路径 session 已 dead，但 watch 失败（会话
  // 404/超时）时连接还活着，不关掉就会无限重连、反复触发本函数
  if (app.session) {
    app.session.closedByUser = true;
    app.session.closeRtc(); // 观众本不升级直连，此处是防御性收尾
    try { app.session.ws?.close(); } catch {}
  }
  // 打开已撤销/过期链接时鉴权失败发生在进会话视图之前（view 还是 list，
  // 显示「正在打开围观…」）：把壳切到会话区，终态卡与获客入口才看得见
  if (app.isViewer && app.view !== "session") {
    app.view = "session";
    $("list").classList.add("hidden");
    $("viewer").classList.add("active");
    $("composer").classList.add("active"); // 身份栏（获客入口）在 composer 里
    document.body.classList.add("insession");
  }
  app.replayMode = false;
  updateReplayMore();
  setRunning(false);
  try { sessionStorage.removeItem("czr-viewer"); } catch {}
  $("sstatus").style.display = "none";
  const card = document.createElement("div");
  card.className = "vend";
  const ttl = document.createElement("div");
  ttl.className = "vtitle";
  ttl.textContent = t("viewer.ended");
  const sub = document.createElement("div");
  sub.textContent = reason || t("viewer.ended_sub");
  card.append(ttl, sub);
  $("log").appendChild(card);
  $("status").textContent = t("status.ended");
  $("status").className = "";
}

// 令牌被电脑端撤销/失效（403）：终态。这台的设备令牌永远失效，清掉死记录，
// 有其它已配对电脑就切过去，否则回到未配对引导——而不是无限「重连中…」
function handleRevoked(info, err) {
  const name = info?.name || t("diag.pc");
  removeDaemon(info.id); // 死令牌无留存价值（电脑端已撤销），从本机移除
  const next = loadDaemonInfo();
  if (next) {
    showBanner(t("banner.revoked_switched", name, next.name || t("diag.pc")));
    startSession(next);
    return;
  }
  app.session = null;
  document.body.classList.remove("paired");
  setTitle(t("brand"));
  updateChevron();
  renderOnboarding();
  $("status").textContent = t("status.unpaired");
  $("status").className = "";
  showBanner(t("banner.revoked_rescan", name));
}

// —— 启动会话（可反复调用以切换电脑）——
function startSession(info) {
  // 标题固定，电脑名走副标题（updateStatusPill）；未配对态没有底栏/菜单
  if (app.view === "list") setTitle(t("brand"));
  document.body.classList.add("paired");
  // 观众态：同一套页面按角色收掉操作性镶边（CSS body.viewer 作用域）
  app.isViewer = !!info.viewer;
  if (app.isViewer) {
    info.agent = info.agent || "codex";
    app.agent = info.agent;
  }
  document.body.classList.toggle("viewer", app.isViewer);
  if (app.isViewer) {
    setTitle(info.sname || t("viewer.title"));
    $("list").innerHTML = `<div class="notice">${t("common.opening_view")}</div>`;
  }
  updateChevron();
  const session = new Session(info);
  app.session = session;
  app.models = null; // 模型列表随电脑走，切换后重新取
  app.modelState = null;
  if (!app.isViewer) {
    resetListModel();              // 换绑电脑：上一台的列表数据不跨 daemon
    hydrateAgentSnapshot(info.id); // 先渲染上次可用 agent（秒出切换器），联上后 agents.list 覆盖
    hydrateBoardSnapshot(info.id); // 先渲染上次快照（秒开），联上后 refreshList 全量覆盖
  }
  session.onStatus = (patch) => {
    Object.assign(net, patch);
    updateStatusPill();
    // 终端页断线态：保留画面、亮"正在恢复"（重连成功由 onReady 的 attach 解除）
    if (app.term && (patch.link === "down" || patch.daemon === false)) {
      app.term.reconnecting = true;
      updateTermNotice();
    }
  };
  session.onNotify = handleNotify;
  // 观众的 403 不是"设备被移除"：进入"围观已结束"终态，不动 czr-daemons
  session.onAuthFail = (err) => {
    if (info.viewer) showViewerEnded();
    else handleRevoked(session.info, err);
  };
  session.onReady = async (auth) => {
    net.link = "ok";
    net.engine = auth?.engine ?? null;
    updateStatusPill();
    showBanner("");
    updateChevron();
    // 断线时半途而废的图片拼装缓冲全部作废（daemon 端推送随 dispose 停发，eof 永不会来；
    // 重连后 daemon 对新连接从 offset:0 重推，会重开缓冲）——不清会随断连次数单调涨内存
    imgRx.clear();
    if (info.viewer) {
      // 观众无看板：鉴权即直进会话只读视图（会话 id/名以 daemon 为准，链接字段仅兜底）
      const agent = auth?.scope?.agent || info.agent || "codex";
      app.agent = agent;
      session.info = { ...session.info, agent };
      const sid = auth?.scope?.sessionId || info.sid;
      const name = auth?.sessionName || info.sname || t("viewer.title");
      if (!sid) { showViewerEnded(t("viewer.badlink")); return; }
      try {
        if (app.view === "session" && app.currentId === sid) {
          // 重连恢复：重新 watch；回放进度归零，daemon 端 offset 也已重置。
          await watchCurrentSession(session, { resetReplay: true });
        } else {
          await openSession(sid, name, { viewer: true });
        }
      } catch (err) {
        // 终态只认 403（链接撤销/过期）/404（会话没了）；409/断线等瞬时错误
        // 会由下一次重连的 onReady 重 watch 恢复，不能一次抖断就判死围观页
        if (err?.code === 403 || err?.code === 404) showViewerEnded(t("viewer.gone"));
      }
      return;
    }
    loadAgents();     // 优先填充 agent 切换器（失败静默，仅 codex；<2 后端时隐藏）
    prefetchModels(); // 静默：给模型胶囊补上电脑端默认模型号
    updateHomeTab();  // 终端能力随本次 auth 的 caps 刷新（换绑电脑/开关变化）
    try {
      if (app.view === "terminal" && app.term) {
        // 重连后恢复终端订阅：带 generation+haveSeq，daemon ring 命中则增量续传。
        // reconnecting 保持到 attach 成功才由 attachTerminal 清（失败则续显"正在恢复"并重试）
        attachTerminal().catch(() => {});
        return;
      }
      // 终端通知深链：连上后直达终端页；落地非 owner 时 attach 流程会亮出接管入口
      if (app.deepLinkTerminal && termCapable()) {
        const tid = app.deepLinkTerminal;
        app.deepLinkTerminal = null;
        setHomeTab("term");
        await openTerminal(tid);
        return;
      }
      if (app.view === "session" && app.currentId && !isDraftSession()) {
        // 重连后恢复当前会话实时订阅；带 have 游标只补断线期间的缺口。
        await watchCurrentSession(session);
      } else {
        await refreshList();
        // 通知深链：连上后直达对应会话
        if (app.deepLink) {
          const id = app.deepLink;
          app.deepLink = null;
          // 通知深链带 agent：先切到该后端再开会话，否则 Claude 会话会被当 codex 会话打开而落空
          const da = app.deepLinkAgent; app.deepLinkAgent = null;
          if (da && da !== app.agent && AGENT_UI_READY.has(da)) { app.agent = da; renderAgentPick(); }
          openSession(id, app.sessionNames.get(id) || t("session.fallback"));
        }
      }
    } catch (err) {
      if (err.code !== 409) showBanner(t("banner.load_fail", err.message)); // 409=已被新 watch 接管，非故障
    }
  };
  session.start().catch((err) => showBanner(t("banner.conn_fail", err.message)));
}

// —— 分享围观（创作者侧）——
// 决策：先展示该会话已存在的链接（时效/在线观众/复制/撤销），"再生成一条"是显式动作，
// 打开弹窗绝不铸造令牌。

function fmtExpiry(expiresAt) {
  if (!expiresAt) return t("expiry.forever");
  const left = expiresAt - Date.now();
  if (left <= 0) return t("expiry.expired");
  const h = Math.floor(left / 3600_000);
  return h >= 1 ? t("expiry.hours", h) : t("expiry.minutes", Math.max(1, Math.floor(left / 60_000)));
}

async function openShareSheet() {
  if (!app.currentId || app.isViewer || isDraftSession()) return;
  $("sharesheet").classList.add("open");
  const box = $("sharelist");
  box.innerHTML = `<div class="notice">${t("common.loading")}</div>`;
  try {
    const { links } = await app.session.request("share.list", { sessionId: app.currentId });
    renderShareSheet(links ?? []);
  } catch (err) {
    box.innerHTML = "";
    const note = document.createElement("div");
    note.className = "sheetnote";
    note.textContent = /未知方法/.test(err.message)
      ? t("share.oldremote")
      : t("banner.load_fail", err.message);
    box.appendChild(note);
  }
}

function renderShareSheet(links, freshUrl) {
  const box = $("sharelist");
  box.innerHTML = "";

  for (const link of links) {
    const row = document.createElement("div");
    row.className = "sharerow";
    const main = document.createElement("div");
    main.className = "smain";
    const name = document.createElement("div");
    name.className = "sname";
    name.textContent = t("share.linklabel", fmtExpiry(link.expiresAt));
    main.appendChild(name);
    // 有人围观才显示计数；没人时不留任何文案（也不留空行）
    if (link.viewers > 0) {
      const sub = document.createElement("div");
      sub.className = "ssub";
      sub.textContent = t("share.viewingN", link.viewers);
      main.appendChild(sub);
    }
    row.appendChild(main);
    if (link.url) {
      const copy = document.createElement("button");
      copy.textContent = t("common.copy");
      copy.onclick = async () => {
        showToast((await copyText(link.url)) ? t("toast.linkcopied") : t("toast.copyfail_hold"));
      };
      row.appendChild(copy);
    }
    // 按链接静音全部互动（喝彩等）：防打扰是底线
    const mute = document.createElement("button");
    mute.textContent = link.muted ? t("share.muted") : t("share.mute");
    mute.onclick = async () => {
      try {
        await app.session.request("share.mute", { deviceId: link.deviceId, muted: !link.muted });
        openShareSheet();
      } catch (err) {
        showBanner(t("banner.set_fail", err.message));
      }
    };
    row.appendChild(mute);
    const revoke = document.createElement("button");
    revoke.className = "srevoke";
    revoke.textContent = t("share.revoke");
    revoke.onclick = async () => {
      if (!confirm(t("confirm.revoke"))) return;
      try {
        await app.session.request("share.revoke", { deviceId: link.deviceId });
        showToast(t("toast.revoked"));
        openShareSheet(); // 重拉列表
      } catch (err) {
        showBanner(t("banner.revoke_fail", err.message));
      }
    };
    row.appendChild(revoke);
    box.appendChild(row);
  }

  // 显式生成：ttl 两档（24 小时 / 永久），生成后结果区提供复制 / 系统分享 / 二维码
  const gen = document.createElement("div");
  gen.className = "sharegen";
  for (const [label, ttl] of [[t("share.gen24"), "24h"], [t("share.genforever"), null]]) {
    const b = document.createElement("button");
    b.textContent = links.length ? t("share.again", label) : label;
    b.onclick = async () => {
      b.disabled = true;
      try {
        const r = await app.session.request("share.create", { sessionId: app.currentId, ttl });
        const { links: fresh } = await app.session.request("share.list", { sessionId: app.currentId });
        renderShareSheet(fresh ?? [], r.url);
      } catch (err) {
        showBanner(t("banner.gen_fail", err.message));
        b.disabled = false;
      }
    };
    gen.appendChild(b);
  }
  box.appendChild(gen);

  if (freshUrl) {
    const acts = document.createElement("div");
    acts.className = "sharegen";
    const copy = document.createElement("button");
    copy.textContent = t("share.copylink");
    copy.onclick = async () => {
      showToast((await copyText(freshUrl)) ? t("toast.linkcopied_share") : t("toast.copyfail"));
    };
    acts.appendChild(copy);
    if (navigator.share) {
      const sys = document.createElement("button");
      sys.textContent = t("share.system");
      sys.onclick = () => navigator.share({ title: t("share.systitle"), url: freshUrl }).catch(() => {});
      acts.appendChild(sys);
    }
    box.appendChild(acts);
    // 二维码本地生成（链接含只读令牌，绝不可经第三方服务）；扫不动时复制链接是主路径
    try {
      const qr = qrcode(0, "L");
      qr.addData(freshUrl, "Byte");
      qr.make();
      const n = qr.getModuleCount();
      const scale = Math.max(2, Math.floor(240 / n));
      const canvas = document.createElement("canvas");
      canvas.id = "shareqr";
      canvas.width = canvas.height = n * scale;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(c * scale, r * scale, scale, scale);
        }
      }
      box.appendChild(canvas);
    } catch {
      // 载荷超出二维码容量等罕见情形：复制路径仍可用
    }
    const tip = document.createElement("div");
    tip.className = "sheetnote";
    tip.textContent = t("share.tip");
    box.appendChild(tip);
  }
}

// xterm 静态资源懒加载：300KB 不进首屏；<script src> 本地 vendor（§14.1）
let xtermLoadPromise = null;
function loadXterm() {
  if (window.Terminal && window.FitAddon) return Promise.resolve();
  if (xtermLoadPromise) return xtermLoadPromise;
  xtermLoadPromise = new Promise((resolve, reject) => {
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "vendor/xterm/xterm.css";
    document.head.appendChild(css);
    let left = 3;
    for (const src of ["vendor/xterm/xterm.js", "vendor/xterm/addon-fit.js", "vendor/xterm/addon-unicode11.js"]) {
      const s = document.createElement("script");
      s.src = src;
      s.onload = () => { if (--left === 0) resolve(); };
      s.onerror = () => { xtermLoadPromise = null; reject(new Error(t("term.load_fail"))); };
      document.head.appendChild(s);
    }
  });
  return xtermLoadPromise;
}

function myDeviceId() {

function termCapable() {
  return !app.isViewer && app.session?.serverCaps?.terminal === 1;

// 不再是独立二段条——切换入口统一在左上角下拉，由 renderAgentPick 呈现。
function updateHomeTab() {

async function refreshTerminals() {
  if (!termCapable()) return;
  try {
    const r = await app.session.request("terminal.list");
    app.terminals = r?.terminals ?? [];
    renderTermList();
  } catch (err) {
    // 403 = 本设备未授权：显示权限锁定页而非通用错误（§4.1）
    if (err.code === 403) {
      $("termlist").innerHTML = `<div class="termlocked">${t("term.locked")}</div>`;
    }
