name = "codex-zh-relay"
main = "src/worker.official.mjs"
compatibility_date = "2026-06-01"

# CXX internal official deployment for the shared relay.wokey.ai hostname.
#
# The live shared hostname is currently owned by the codex-zh-relay Worker.
# Keep that script name here so deploying this config updates the current shared
# relay in place instead of migrating the route/DO namespace back to cxx-relay.
# Rename only as an explicit route migration.
#
# The official instance uses a zone route because workers.dev is unreliable in
# some networks and custom_domain conflicts with the existing proxied DNS record.
routes = [{ pattern = "relay.wokey.ai/*", zone_name = "wokey.ai" }]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom"]

# Connection lifecycle metrics dataset. First write creates it automatically.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "relay_events"

[vars]
# Non-sensitive account identifier used by /admin/stats for Analytics Engine SQL reads.
CF_ACCOUNT_ID = "8ba0c2c3687f2cfbe841edc87622b477"

# Set STATS_TOKEN, CF_API_TOKEN, and optional TG_BOT_TOKEN/TG_CHAT_ID with
# Wrangler secrets. No credentials are stored in this tracked config.
